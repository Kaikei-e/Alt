# compose/core.yaml - Core application services
# nginx, frontend, backend, migrations

include:
  - base.yaml
  - bff.yaml
  - pki.yaml

# Shared base for cert provisioning sidecars. Runs as root so it can write
# into fresh named volumes; the cert/key are then chmod'd to world-readable
# (cert) and user-readable (key) for the app container to consume.
x-tls-cert-sidecar: &tls-cert-sidecar
  image: smallstep/step-ca:0.27.5
  user: "0:0"
  secrets:
    - step_ca_root_password
  networks:
    - alt-network
  labels:
    - rask.group=pki
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  nginx:
    image: nginx:latest
    restart: always
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:80"
      - "8080:8080"  # Metrics endpoint for nginx-exporter
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:rw
      - ../nginx/docker-entrypoint.d:/docker-entrypoint.d:ro
      - ../alt-frontend-sv/static/favicon.svg:/usr/share/nginx/html/favicon.svg:ro
      - nginx-image-cache:/var/cache/nginx/image_proxy
    depends_on:
      alt-frontend-sv:
        condition: service_healthy
      alt-backend:
        condition: service_healthy
      auth-hub:
        condition: service_healthy
    networks:
      - alt-network
    deploy:
      resources:
        reservations:
          memory: 256M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    tty: true
    labels:
      - rask.group=alt-frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alt-frontend-sv:
    env_file:
      - ../.env
    build:
      context: ../alt-frontend-sv
      dockerfile: Dockerfile
    environment:
      - PORT=4173
      - ORIGIN=${ORIGIN:-http://localhost:4173}
      - BODY_SIZE_LIMIT=Infinity
      - KRATOS_INTERNAL_URL=${KRATOS_INTERNAL_URL:-http://kratos:4433}
      - KRATOS_PUBLIC_URL=${KRATOS_PUBLIC_URL:-http://localhost/ory}
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://localhost:9000}
      - BACKEND_CONNECT_URL=${BACKEND_CONNECT_URL:-http://alt-butterfly-facade:9250}
      - AUTH_HUB_INTERNAL_URL=${AUTH_HUB_INTERNAL_URL:-http://auth-hub:8888}
      - PUBLIC_USE_CONNECT_STREAMING=${PUBLIC_USE_CONNECT_STREAMING:-false}
      - SOVEREIGN_METRICS_URL=${SOVEREIGN_METRICS_URL:-http://knowledge-sovereign:9501}
    ports:
      - "4173:4173"
    restart: always
    mem_limit: 512m
    depends_on:
      alt-butterfly-facade:
        condition: service_healthy
    networks:
      - alt-network
    deploy:
      resources:
        reservations:
          memory: 256M
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const n=require('net');const s=n.createConnection(4173,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - rask.group=alt-frontend-sv
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alt-backend-cert-init:
    <<: *tls-cert-sidecar
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -e
        if [ -f /certs/svc-cert.pem ]; then
          echo "alt-backend-cert-init: cert already present, skipping"
          exit 0
        fi
        echo "alt-backend-cert-init: requesting cert from step-ca..."
        TOKEN=$$(step ca token "alt-backend" \
          --san alt-backend --san localhost \
          --ca-url https://step-ca:9000 \
          --root /trust/ca-bundle.pem \
          --provisioner bootstrap \
          --password-file /run/secrets/step_ca_root_password 2>/dev/null)
        step ca certificate "alt-backend" /certs/svc-cert.pem /certs/svc-key.pem \
          --ca-url https://step-ca:9000 \
          --root /trust/ca-bundle.pem \
          --token "$$TOKEN" --force
        chmod 0644 /certs/svc-cert.pem /certs/svc-key.pem
        echo "alt-backend-cert-init: cert issued"
    volumes:
      - alt_backend_certs:/certs
      - pki_trust_bundle:/trust:ro
    depends_on:
      step-ca-bootstrap:
        condition: service_completed_successfully

  alt-backend-cert-renewer:
    <<: *tls-cert-sidecar
    restart: unless-stopped
    entrypoint:
      - step
    command:
      - ca
      - renew
      - --ca-url=https://step-ca:9000
      - --root=/trust/ca-bundle.pem
      - --daemon
      - --expires-in=8h
      - /certs/svc-cert.pem
      - /certs/svc-key.pem
    volumes:
      - alt_backend_certs:/certs
      - pki_trust_bundle:/trust:ro
    depends_on:
      alt-backend-cert-init:
        condition: service_completed_successfully

  alt-backend:
    env_file:
      - ../.env
    build:
      context: ../alt-backend
      dockerfile: Dockerfile.backend
    restart: always
    ports:
      - "9000:9000"
      - "9101:9101"
      - "9443:9443"
    networks:
      - alt-network
    volumes:
      - ../.env:/app/.env
      - alt_backend_certs:/certs:ro
      - pki_trust_bundle:/trust:ro
    depends_on:
      mq-hub:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      knowledge-sovereign:
        condition: service_healthy
      search-indexer:
        condition: service_healthy
      alt-backend-cert-init:
        condition: service_completed_successfully
    environment:
      - CONNECT_PORT=9101
      - MTLS_LISTEN=${MTLS_LISTEN:-true}
      - MTLS_PORT=9443
      - MTLS_CERT_FILE=/certs/svc-cert.pem
      - MTLS_KEY_FILE=/certs/svc-key.pem
      - MTLS_CA_FILE=/trust/ca-bundle.pem
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_USER=${DB_USER}
      - DB_PASSWORD_FILE=/run/secrets/postgres_password
      - DB_NAME=${POSTGRES_DB}
      - DB_SSL_MODE=prefer
      - CSRF_SECRET_FILE=/run/secrets/csrf_secret
      - SERVICE_SECRET_FILE=/run/secrets/service_secret
      - BACKEND_TOKEN_SECRET_FILE=/run/secrets/backend_token_secret
      - BACKEND_TOKEN_ISSUER=auth-hub
      - BACKEND_TOKEN_AUDIENCE=alt-backend
      - AUTH_HUB_URL=http://auth-hub:8888
      - MQHUB_ENABLED=true
      - MQHUB_CONNECT_URL=http://mq-hub:9500
      - SOVEREIGN_URL=http://knowledge-sovereign:9500
      - DB_MAX_CONNS=30
      - DB_MIN_CONNS=5
      - IMAGE_PROXY_SECRET_FILE=/run/secrets/image_proxy_secret
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://rask-log-aggregator:4318
      - OTEL_SERVICE_NAME=alt-backend
      # Admin observability (Prometheus-backed Admin UI). Off by default.
      - ADMIN_MONITOR_ENABLED=${ADMIN_MONITOR_ENABLED:-false}
      - ADMIN_MONITOR_PROMETHEUS_URL=${ADMIN_MONITOR_PROMETHEUS_URL:-http://prometheus:9090}
      - ADMIN_MONITOR_QUERY_TIMEOUT=${ADMIN_MONITOR_QUERY_TIMEOUT:-3s}
      - ADMIN_MONITOR_CACHE_TTL=${ADMIN_MONITOR_CACHE_TTL:-10s}
      - ADMIN_MONITOR_RATE_LIMIT_RPS=${ADMIN_MONITOR_RATE_LIMIT_RPS:-5}
      - ADMIN_MONITOR_RATE_LIMIT_BURST=${ADMIN_MONITOR_RATE_LIMIT_BURST:-10}
      - ADMIN_MONITOR_STREAM_INTERVAL=${ADMIN_MONITOR_STREAM_INTERVAL:-5s}
    secrets:
      - backend_token_secret
      - postgres_password
      - csrf_secret
      - service_secret
      - image_proxy_secret
    deploy:
      resources:
        limits:
          cpus: '4.0'
        reservations:
          memory: 2G
          cpus: '2.0'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/v1/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    tty: true
    labels:
      - rask.group=alt-backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    env_file:
      - ../.env
    build:
      context: ../migrations-atlas
      dockerfile: docker/Dockerfile
    container_name: db_migrator
    entrypoint:
      - /bin/sh
      - -c
      - |
        DB_PASS=$$(cat /run/secrets/postgres_password)
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@$${DB_HOST}:$${DB_PORT}/$${DB_NAME}?sslmode=disable"
        exec /scripts/migrate.sh "$$@"
      - --
    command: ["apply"]
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_NAME: ${POSTGRES_DB}
      MIGRATE_MAX_RETRIES: "12"
      MIGRATE_RETRY_INTERVAL: "5"
      MIGRATE_BASELINE_VERSION: ${MIGRATE_BASELINE_VERSION:-}
      ATLAS_ENV: ${ATLAS_ENV:-kubernetes}
      ATLAS_REVISIONS_SCHEMA: "public"
    secrets:
      - postgres_password
    volumes:
      - ../migrations-atlas/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - alt-network
