# compose/workers.yaml - Background worker services
# pre-processor-sidecar, search-indexer, tag-generator, auth-token-manager

include:
  - base.yaml
  - pki.yaml

# Cert lifecycle for search-indexer / tag-generator is owned by
# pki-agent-search-indexer / pki-agent-tag-generator in compose/pki.yaml.

services:
  pre-processor-sidecar:
    env_file:
      - ../.env
    mem_limit: 128m
    build:
      context: ../pre-processor-sidecar
      dockerfile: Dockerfile
    depends_on:
      oauth-token-init:
        condition: service_completed_successfully
      pre-processor-db:
        condition: service_healthy
      pre-processor-db-migrator:
        condition: service_completed_successfully
    environment:
      - DB_HOST=pre-processor-db
      - DB_PORT=5432
      - DB_NAME=${PP_DB_NAME:-pre_processor}
      - PRE_PROCESSOR_SIDECAR_DB_USER=${PP_DB_USER:-pp_user}
      - PRE_PROCESSOR_SIDECAR_DB_PASSWORD_FILE=/run/secrets/pp_db_password
      - INOREADER_CLIENT_ID_FILE=/run/secrets/inoreader_client_id
      - INOREADER_CLIENT_SECRET_FILE=/run/secrets/inoreader_client_secret
      - LOG_LEVEL=info
      - SERVICE_NAME=pre-processor-sidecar
      - TOKEN_STORAGE_TYPE=file
      - TOKEN_STORAGE_PATH=/app/secrets/oauth2_token.env
      - INOREADER_REFRESH_TOKEN_FILE=/app/secrets/oauth2_token.env
    secrets:
      - pp_db_password
      - inoreader_client_id
      - inoreader_client_secret
    volumes:
      - oauth_token_data:/app/secrets
    restart: always
    networks:
      - alt-network
    tty: true
    labels:
      - rask.group=pre-processor-sidecar
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  search-indexer:
    env_file:
      - ../.env
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-search-indexer:${IMAGE_TAG:-main}
    build:
      context: ../search-indexer
      dockerfile: Dockerfile.search-indexer
    restart: always
    depends_on:
      redis-streams:
        condition: service_healthy
      pki-agent-search-indexer:
        condition: service_healthy
    environment:
      - MTLS_LISTEN=${MTLS_LISTEN:-true}
      - MTLS_PORT=9443
      - MTLS_CERT_FILE=/certs/svc-cert.pem
      - MTLS_KEY_FILE=/certs/svc-key.pem
      - MTLS_CA_FILE=/trust/ca-bundle.pem
      - MTLS_CLIENT_AUTH=${SEARCH_INDEXER_MTLS_CLIENT_AUTH:-}
      - MTLS_ALLOWED_PEERS=${SEARCH_INDEXER_MTLS_ALLOWED_PEERS:-}
      - MTLS_ENFORCE=${SEARCH_INDEXER_MTLS_ENFORCE:-true}
      - BACKEND_API_MTLS_URL=https://alt-backend:9443
      - BACKEND_MTLS_SERVER_NAME=alt-backend
      # Backend API mode (replaces direct DB access)
      - BACKEND_API_URL=http://alt-backend:9101
      - MEILISEARCH_HOST=${MEILISEARCH_HOST}
      - MEILISEARCH_API_KEY_FILE=/run/secrets/meili_master_key
      - MEILISEARCH_SEARCH_API_KEY_FILE=/run/secrets/meili_search_key
      - MEILI_MASTER_KEY_FILE=/run/secrets/meili_master_key
      - REDIS_STREAMS_URL=redis://redis-streams:6379
      - CONSUMER_ENABLED=true
      - CONSUMER_GROUP=search-indexer-group
      - CONSUMER_NAME=search-indexer-1
      # Recap indexing (polls recap-worker for Meilisearch indexing)
      - RECAP_WORKER_URL=http://recap-worker:9005
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://rask-log-aggregator:4318
      - OTEL_SERVICE_NAME=search-indexer
    secrets:
      - meili_master_key
      - meili_search_key
    networks:
      - alt-network
    volumes:
      - search_indexer_certs:/certs:ro
      - pki_trust_bundle:/trust:ro
    ports:
      - "9300:9300"   # REST API
      - "9301:9301"   # Connect-RPC
      # mTLS :9443 intentionally not published (internal east-west only)
    healthcheck:
      test: ["CMD", "/search-indexer", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    tty: true
    labels:
      - rask.group=search-indexer
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # nginx TLS sidecar replaced by pki-agent proxy mode (ADR-000747, F-007).
  # pki-agent-tag-generator in compose/pki.yaml handles both cert lifecycle
  # AND mTLS reverse proxy (:9443 → :9400).

  tag-generator:
    env_file:
      - ../.env
    mem_limit: 3g
    build:
      context: ../tag-generator
      dockerfile: Dockerfile.tag-generator
    depends_on:
      redis-streams:
        condition: service_healthy
    networks:
      - alt-network
    ports:
      - "9400:9400"
      # mTLS :9443 served by pki-agent-tag-generator (shares net ns via network_mode)
    environment:
      # Backend API mode (replaces direct DB access for article/tag operations)
      - BACKEND_API_URL=http://alt-backend:9101
      - MTLS_ENFORCE=${TAG_GENERATOR_MTLS_ENFORCE:-false}
      - MTLS_CERT_FILE=/certs/svc-cert.pem
      - MTLS_KEY_FILE=/certs/svc-key.pem
      - MTLS_CA_FILE=/trust/ca-bundle.pem
      # trust X-Alt-Peer-Identity header iff the sidecar above
      # enforces client certs. Must track TAG_GENERATOR_VERIFY_CLIENT.
      - PEER_IDENTITY_TRUSTED=${TAG_GENERATOR_VERIFY_CLIENT:-on}
      - BACKEND_API_MTLS_URL=https://alt-backend:9443
      - PORT=9400
      - CUDA_VISIBLE_DEVICES=""
      - REDIS_STREAMS_URL=redis://redis-streams:6379
      - CONSUMER_ENABLED=true
      - CONSUMER_GROUP=tag-generator-group
      - CONSUMER_NAME=tag-generator-1
      # PyTorch thread limiting (prevent CPU explosion)
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - TORCH_NUM_THREADS=4
      - TOKENIZERS_PARALLELISM=false
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://rask-log-aggregator:4318
      - OTEL_SERVICE_NAME=tag-generator
    volumes:
      - ../scripts:/scripts:ro
      - ../tag-generator/models/onnx:/models/onnx:ro
      - tag_generator_certs:/certs:ro
      - pki_trust_bundle:/trust:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9400/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    tty: true
    restart: unless-stopped
    labels:
      - rask.group=tag-generator
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  oauth-token-init:
    image: alpine:latest
    volumes:
      - oauth_token_data:/data
    command: ["sh", "-c", "chown -R 65532:65532 /data && chmod 755 /data"]
    restart: "no"
    networks:
      - alt-network

  auth-token-manager:
    build:
      context: ../auth-token-manager
      dockerfile: Dockerfile
    mem_limit: 128m
    depends_on:
      oauth-token-init:
        condition: service_completed_successfully
    volumes:
      - oauth_token_data:/app/secrets
      - ../secrets/inoreader_client_id.txt:/run/secrets/inoreader_client_id
      - ../secrets/inoreader_client_secret.txt:/run/secrets/inoreader_client_secret
    environment:
      - INOREADER_CLIENT_ID_FILE=/run/secrets/inoreader_client_id
      - INOREADER_CLIENT_SECRET_FILE=/run/secrets/inoreader_client_secret
      - INOREADER_REDIRECT_URI=http://127.0.0.1:9201/callback
      - TOKEN_STORAGE_PATH=/app/secrets/oauth2_token.env
      - LOG_LEVEL=info
    restart: always
    ports:
      - "9201:9201"
    networks:
      - alt-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
