# compose/logging.yaml - Logging infrastructure
# Rask log aggregator and forwarders

include:
  - base.yaml

# Shared forwarder definition. TARGET_SERVICE (and optional mem_limit) are
# overridden per service. DOCKER_GROUP_ID has no host-magic fallback — inject
# via `export DOCKER_GROUP_ID=$(./scripts/get-docker-gid.sh)` (start.sh does this).
x-rask-forwarder: &rask-forwarder
  image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-rask-log-forwarder:${IMAGE_TAG:-main}
  build:
    context: ../rask-log-forwarder
    dockerfile: Dockerfile.rask-log-forwarder
  mem_limit: 64m
  networks:
    - alt-network
  depends_on:
    rask-log-aggregator:
      condition: service_healthy
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
  group_add:
    # Fail-fast when unset: a wrong fallback GID silently breaks sock access.
    - "${DOCKER_GROUP_ID:?DOCKER_GROUP_ID must be set (run: export DOCKER_GROUP_ID=$(./scripts/get-docker-gid.sh))}"
  restart: unless-stopped
  stop_grace_period: 12s
  healthcheck:
    test: ["CMD", "/rask-log-forwarder", "healthcheck"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

x-rask-forwarder-env: &rask-forwarder-env
  DOCKER_HOST: "unix:///var/run/docker.sock"
  LOG_LEVEL: "info"
  RUST_LOG: "info"
  RASK_ENDPOINT: "http://rask-log-aggregator:9600/v1/aggregate"
  BATCH_SIZE: "1000"
  FLUSH_INTERVAL_MS: "500"
  BUFFER_CAPACITY: "100000"

services:
  rask-log-aggregator:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-rask-log-aggregator:${IMAGE_TAG:-main}
    build:
      context: ../rask-log-aggregator
      dockerfile: Dockerfile.rask-log-aggregator
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - alt-network
    tty: true
    labels:
      - rask.group=rask-log-aggregator
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # ClickHouse接続
      APP_CLICKHOUSE_HOST: clickhouse
      APP_CLICKHOUSE_PORT: 8123
      APP_CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      APP_CLICKHOUSE_PASSWORD_FILE: /run/secrets/clickhouse_password
      APP_CLICKHOUSE_DATABASE: ${CLICKHOUSE_DB}
      # OTLPポート設定
      OTLP_GRPC_PORT: 4317
      OTLP_HTTP_PORT: 4318
      HTTP_PORT: 9600
    secrets:
      - clickhouse_password
    healthcheck:
      test: ["CMD", "/rask-log-aggregator", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx-logs:
    <<: *rask-forwarder
    mem_limit: 128m
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "${NGINX_TARGET:-plecto-proxy}"

  alt-backend-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "${ALT_BACKEND_TARGET:-alt-backend}"

  auth-hub-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "auth-hub"

  tag-generator-logs:
    <<: *rask-forwarder
    mem_limit: 128m
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "tag-generator"

  pre-processor-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "pre-processor"

  search-indexer-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "search-indexer"

  news-creator-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "news-creator"

  # ADR-091: news-creator-backend (Ollama) ログ収集
  news-creator-backend-logs:
    <<: *rask-forwarder
    mem_limit: 128m
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "news-creator-backend"

  # NOTE: meilisearch-logs removed - noisy logs with low observability value

  # Recap stack forwarders
  # NOTE: db-logs removed - SQL query fragments provide low observability value (74% of all logs)
  recap-worker-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "recap-worker"

  recap-subworker-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "recap-subworker"

  dashboard-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "dashboard"

  recap-evaluator-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "recap-evaluator"

  # RAG stack forwarders
  # NOTE: recap-db-logs removed - SQL query fragments provide low observability value
  rag-orchestrator-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "rag-orchestrator"

  mq-hub-logs:
    <<: *rask-forwarder
    environment:
      <<: *rask-forwarder-env
      TARGET_SERVICE: "mq-hub"

  # NOTE: rag-db-logs removed - SQL query fragments provide low observability value

  # Example OTLP-mode forwarder (opt-in via PROTOCOL=otlp)
  # To enable OTLP for a service, override PROTOCOL and OTLP_ENDPOINT:
  #
  # alt-backend-logs-otlp:
  #   extends:
  #     service: alt-backend-logs
  #   environment:
  #     PROTOCOL: "otlp"
  #     OTLP_ENDPOINT: "http://rask-log-aggregator:4318/v1/logs"
