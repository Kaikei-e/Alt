# compose/pki.yaml - Internal PKI for east-west mTLS
# step-ca issues short-lived leaf certs; step-ca-bootstrap publishes the root
# CA bundle to a shared volume so other services can build trust stores.
# pki-agent sidecars own the cert lifecycle for each consumer service,
# replacing the prior compose-embedded shell cert-init + cert-renewer pair.

include:
  - base.yaml

# Shared config for pki-agent sidecars. One sidecar per consumer service;
# each owns exactly one cert volume. Runs as root so it can chown the cert
# files to the consumer's uid (65532 / 999) before atomic rename.
x-pki-agent: &pki-agent
  image: alt/pki-agent:latest
  build:
    context: ../pki-agent
    dockerfile: Dockerfile
  restart: unless-stopped
  user: "0:0"
  secrets:
    - step_ca_root_password
  networks:
    - alt-network
  labels:
    - rask.group=pki
  depends_on:
    step-ca-bootstrap:
      condition: service_completed_successfully
  healthcheck:
    test: ["CMD", "/usr/local/bin/pki-agent", "healthcheck"]
    interval: 15s
    timeout: 3s
    retries: 3
    start_period: 30s
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  step-ca:
    image: smallstep/step-ca:0.27.5
    restart: unless-stopped
    mem_limit: 128m
    environment:
      DOCKER_STEPCA_INIT_NAME: alt-ca
      DOCKER_STEPCA_INIT_DNS_NAMES: step-ca,localhost
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: bootstrap
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/secrets/step_ca_root_password
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "false"
      DOCKER_STEPCA_INIT_ACME: "false"
    secrets:
      - step_ca_root_password
    volumes:
      - step_ca_data:/home/step
    healthcheck:
      test:
        - CMD
        - step
        - ca
        - health
        - --ca-url
        - https://localhost:9000
        - --root
        - /home/step/certs/root_ca.crt
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - alt-network
    labels:
      - rask.group=pki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  step-ca-bootstrap:
    image: smallstep/step-ca:0.27.5
    restart: "no"
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -e
        until [ -f /home/step/certs/root_ca.crt ]; do
          echo "step-ca-bootstrap: waiting for root_ca.crt..."
          sleep 2
        done
        cp /home/step/certs/root_ca.crt /trust/ca-bundle.pem
        chmod 0444 /trust/ca-bundle.pem
        echo "step-ca-bootstrap: trust bundle published to /trust/ca-bundle.pem"
    volumes:
      - step_ca_data:/home/step:ro
      - pki_trust_bundle:/trust
    depends_on:
      step-ca:
        condition: service_healthy
    networks:
      - alt-network
    labels:
      - rask.group=pki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- pki-agent sidecars (one per east-west consumer) ----------------------
  # Each sidecar uses the dedicated `pki-agent` JWK provisioner. step-ca
  # enforces an authority-level X.509 policy (allow.dns + allow.cn = 8 east-west
  # subjects + localhost) so a compromised pki-agent cannot forge certs for
  # arbitrary CNs. See docs/review/pki-agent-security-audit-2026-04-16.md
  # F-001 / F-002 and `step-ca-provisioner-init` service above for bootstrap.

  pki-agent-alt-backend:
    <<: *pki-agent
    environment:
      - STEP_CA_URL=https://step-ca:9000
      - STEP_CA_ROOT_FILE=/trust/ca-bundle.pem
      - STEP_CA_PROVISIONER=pki-agent
      - STEP_CA_PROVISIONER_PASSWORD_FILE=/run/secrets/step_ca_root_password
      - CERT_SUBJECT=alt-backend
      - CERT_SANS=alt-backend,localhost
      - CERT_PATH=/certs/svc-cert.pem
      - KEY_PATH=/certs/svc-key.pem
      - CERT_OWNER_UID=65532
      - CERT_OWNER_GID=65532
      - RENEW_AT_FRACTION=0.66
      - TICK_INTERVAL=5m
      - METRICS_ADDR=:9510
    volumes:
      - alt_backend_certs:/certs
      - pki_trust_bundle:/trust:ro

  pki-agent-alt-butterfly-facade:
    <<: *pki-agent
    environment:
      - STEP_CA_URL=https://step-ca:9000
      - STEP_CA_ROOT_FILE=/trust/ca-bundle.pem
      - STEP_CA_PROVISIONER=pki-agent
      - STEP_CA_PROVISIONER_PASSWORD_FILE=/run/secrets/step_ca_root_password
      - CERT_SUBJECT=alt-butterfly-facade
      - CERT_SANS=alt-butterfly-facade,localhost
      - CERT_PATH=/certs/svc-cert.pem
      - KEY_PATH=/certs/svc-key.pem
      - CERT_OWNER_UID=65532
      - CERT_OWNER_GID=65532
      - RENEW_AT_FRACTION=0.66
      - TICK_INTERVAL=5m
      - METRICS_ADDR=:9510
    volumes:
      - alt_butterfly_facade_certs:/certs
      - pki_trust_bundle:/trust:ro

  pki-agent-auth-hub:
    <<: *pki-agent
    environment:
      - STEP_CA_URL=https://step-ca:9000
      - STEP_CA_ROOT_FILE=/trust/ca-bundle.pem
      - STEP_CA_PROVISIONER=pki-agent
      - STEP_CA_PROVISIONER_PASSWORD_FILE=/run/secrets/step_ca_root_password
      - CERT_SUBJECT=auth-hub
      - CERT_SANS=auth-hub,localhost
      - CERT_PATH=/certs/svc-cert.pem
      - KEY_PATH=/certs/svc-key.pem
      - CERT_OWNER_UID=65532
      - CERT_OWNER_GID=65532
      - RENEW_AT_FRACTION=0.66
      - TICK_INTERVAL=5m
      - METRICS_ADDR=:9510
    volumes:
      - auth_hub_certs:/certs
      - pki_trust_bundle:/trust:ro

  pki-agent-pre-processor:
    <<: *pki-agent
    environment:
      - STEP_CA_URL=https://step-ca:9000
      - STEP_CA_ROOT_FILE=/trust/ca-bundle.pem
      - STEP_CA_PROVISIONER=pki-agent
      - STEP_CA_PROVISIONER_PASSWORD_FILE=/run/secrets/step_ca_root_password
      - CERT_SUBJECT=pre-processor
      - CERT_SANS=pre-processor,localhost
      - CERT_PATH=/certs/svc-cert.pem
      - KEY_PATH=/certs/svc-key.pem
      - CERT_OWNER_UID=65532
      - CERT_OWNER_GID=65532
      - RENEW_AT_FRACTION=0.66
      - TICK_INTERVAL=5m
      - METRICS_ADDR=:9510
    volumes:
      - pre_processor_certs:/certs
      - pki_trust_bundle:/trust:ro

  pki-agent-search-indexer:
    <<: *pki-agent
    environment:
      - STEP_CA_URL=https://step-ca:9000
      - STEP_CA_ROOT_FILE=/trust/ca-bundle.pem
      - STEP_CA_PROVISIONER=pki-agent
      - STEP_CA_PROVISIONER_PASSWORD_FILE=/run/secrets/step_ca_root_password
      - CERT_SUBJECT=search-indexer
      - CERT_SANS=search-indexer,localhost
      - CERT_PATH=/certs/svc-cert.pem
      - KEY_PATH=/certs/svc-key.pem
      - CERT_OWNER_UID=65532
      - CERT_OWNER_GID=65532
      - RENEW_AT_FRACTION=0.66
      - TICK_INTERVAL=5m
      - METRICS_ADDR=:9510
    volumes:
      - search_indexer_certs:/certs
      - pki_trust_bundle:/trust:ro

  pki-agent-tag-generator:
    <<: *pki-agent
    network_mode: "service:tag-generator"
    networks: !override []
    depends_on:
      # restart: true re-creates this sidecar whenever tag-generator is
      # recreated (compose v2.30+). Without it, `network_mode: service:X`
      # leaves the sidecar joined to the parent's old netns and its
      # reverse-proxy listener becomes unreachable from the new IP.
      tag-generator:
        condition: service_healthy
        restart: true
      step-ca:
        condition: service_healthy
    environment:
      - STEP_CA_URL=https://step-ca:9000
      - STEP_CA_ROOT_FILE=/trust/ca-bundle.pem
      - STEP_CA_PROVISIONER=pki-agent
      - STEP_CA_PROVISIONER_PASSWORD_FILE=/run/secrets/step_ca_root_password
      - CERT_SUBJECT=tag-generator
      - CERT_SANS=tag-generator,localhost
      - CERT_PATH=/certs/svc-cert.pem
      - KEY_PATH=/certs/svc-key.pem
      - CERT_OWNER_UID=0
      - CERT_OWNER_GID=0
      - RENEW_AT_FRACTION=0.66
      - TICK_INTERVAL=5m
      - METRICS_ADDR=:9510
      - PROXY_LISTEN=:9443
      - PROXY_UPSTREAM=http://127.0.0.1:9400
      - PROXY_VERIFY_CLIENT=${TAG_GENERATOR_VERIFY_CLIENT:-on}
      - PROXY_ALLOWED_PEERS=${TAG_GENERATOR_MTLS_ALLOWED_PEERS:-alt-butterfly-facade,alt-backend,search-indexer}
      - PROXY_CA_FILE=/trust/ca-bundle.pem
    volumes:
      - tag_generator_certs:/certs
      - pki_trust_bundle:/trust:ro

  pki-agent-recap-worker:
    <<: *pki-agent
    environment:
      - STEP_CA_URL=https://step-ca:9000
      - STEP_CA_ROOT_FILE=/trust/ca-bundle.pem
      - STEP_CA_PROVISIONER=pki-agent
      - STEP_CA_PROVISIONER_PASSWORD_FILE=/run/secrets/step_ca_root_password
      - CERT_SUBJECT=recap-worker
      - CERT_SANS=recap-worker,localhost
      - CERT_PATH=/certs/svc-cert.pem
      - KEY_PATH=/certs/svc-key.pem
      # recap-worker runs as uid 999 (see fa771b1e5).
      - CERT_OWNER_UID=999
      - CERT_OWNER_GID=999
      - RENEW_AT_FRACTION=0.66
      - TICK_INTERVAL=5m
      - METRICS_ADDR=:9510
    volumes:
      - recap_worker_certs:/certs
      - pki_trust_bundle:/trust:ro

  pki-agent-acolyte-orchestrator:
    <<: *pki-agent
    network_mode: "service:acolyte-orchestrator"
    networks: !override []
    depends_on:
      # See pki-agent-tag-generator for the rationale behind restart: true.
      acolyte-orchestrator:
        condition: service_healthy
        restart: true
      step-ca:
        condition: service_healthy
    environment:
      - STEP_CA_URL=https://step-ca:9000
      - STEP_CA_ROOT_FILE=/trust/ca-bundle.pem
      - STEP_CA_PROVISIONER=pki-agent
      - STEP_CA_PROVISIONER_PASSWORD_FILE=/run/secrets/step_ca_root_password
      - CERT_SUBJECT=acolyte-orchestrator
      - CERT_SANS=acolyte-orchestrator,localhost
      - CERT_PATH=/certs/svc-cert.pem
      - KEY_PATH=/certs/svc-key.pem
      - CERT_OWNER_UID=0
      - CERT_OWNER_GID=0
      - RENEW_AT_FRACTION=0.66
      - TICK_INTERVAL=5m
      - METRICS_ADDR=:9510
      - PROXY_LISTEN=:9443
      - PROXY_UPSTREAM=http://127.0.0.1:8090
      - PROXY_VERIFY_CLIENT=${ACOLYTE_ORCHESTRATOR_VERIFY_CLIENT:-on}
      - PROXY_ALLOWED_PEERS=${ACOLYTE_ORCHESTRATOR_MTLS_ALLOWED_PEERS:-alt-butterfly-facade}
      - PROXY_CA_FILE=/trust/ca-bundle.pem
    volumes:
      - acolyte_orchestrator_certs:/certs
      - pki_trust_bundle:/trust:ro
