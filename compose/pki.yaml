    environment:
      - STEP_CA_URL=https://step-ca:9000
      - STEP_CA_ROOT_FILE=/trust/ca-bundle.pem
      - STEP_CA_PROVISIONER=bootstrap
      - STEP_CA_PROVISIONER_PASSWORD_FILE=/run/secrets/step_ca_root_password
      - CERT_SUBJECT=auth-hub
      - CERT_SANS=auth-hub,localhost
      - CERT_PATH=/certs/svc-cert.pem
      - KEY_PATH=/certs/svc-key.pem
      - CERT_OWNER_UID=65532
      - CERT_OWNER_GID=65532
      - RENEW_AT_FRACTION=0.66
      - TICK_INTERVAL=5m
      - METRICS_ADDR=:9510
    volumes:
