# compose/sovereign.yaml - Knowledge Sovereign service + DB

services:
  knowledge-sovereign-db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - POSTGRES_DB=knowledge_sovereign
      - POSTGRES_USER=sovereign
      - POSTGRES_PASSWORD_FILE=/run/secrets/sovereign_db_password
    volumes:
      - knowledge-sovereign-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5438:5432"
    secrets:
      - sovereign_db_password
    networks:
      - alt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign -d knowledge_sovereign"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Atlas migrator for knowledge-sovereign-db
  knowledge-sovereign-db-migrator:
    build:
      context: ../knowledge-sovereign
      dockerfile: docker/Dockerfile.migrator
    # Short-lived Atlas apply job.
    mem_limit: 256m
    command: ["apply"]
    entrypoint:
      - /bin/sh
      - -c
      - |
        DB_PASS=$$(cat /run/secrets/sovereign_db_password)
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@$${DB_HOST}:$${DB_PORT}/$${DB_NAME}?sslmode=disable"
        exec /scripts/migrate.sh "$$@"
      - --
    environment:
      DB_HOST: knowledge-sovereign-db
      DB_PORT: "5432"
      DB_USER: sovereign
      DB_NAME: knowledge_sovereign
      ATLAS_REVISIONS_SCHEMA: "public"
    secrets:
      - sovereign_db_password
    volumes:
      - ../knowledge-sovereign/migrations:/migrations:ro
    depends_on:
      knowledge-sovereign-db:
        condition: service_healthy
    networks:
      - alt-network
    restart: "no"

  knowledge-sovereign:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-knowledge-sovereign:${IMAGE_TAG:-main}
    build:
      context: ../knowledge-sovereign
      dockerfile: Dockerfile.sovereign
    restart: unless-stopped
    mem_limit: 512m
    # DATABASE_URL is assembled at runtime from the sovereign_db_password secret
    # (same entrypoint-wrapper pattern as knowledge-sovereign-db-migrator
    # above) instead of being interpolated into `environment:`, where it
    # would leak the plaintext password via `docker inspect`. The app's
    # config.Load() (knowledge-sovereign/app/config/config.go) only reads
    # os.Getenv("DATABASE_URL"), so no Go code changes are needed — the
    # shell wrapper builds the same value the process would have received.
    entrypoint:
      - /bin/sh
      - -c
      - |
        DB_PASS=$$(cat /run/secrets/sovereign_db_password)
        export DATABASE_URL="postgres://sovereign:$${DB_PASS}@knowledge-sovereign-db:5432/knowledge_sovereign?sslmode=disable"
        exec /server
    environment:
      - LISTEN_ADDR=:9500
      - METRICS_ADDR=:9501
      - SNAPSHOT_DIR=/tmp/snapshots
      - KNOWLEDGE_SOVEREIGN_PLANNER_BATCH_SIZE=${KNOWLEDGE_SOVEREIGN_PLANNER_BATCH_SIZE:-8192}
      - KNOWLEDGE_SOVEREIGN_PLANNER_MAX_BATCHES_PER_TICK=${KNOWLEDGE_SOVEREIGN_PLANNER_MAX_BATCHES_PER_TICK:-8}
      # ADR-000914 §Δ5: Knowledge Loop projector throughput. Defaults are
      # 500 events / batch × 4 batches per 5 s tick = 400 events / sec.
      # Bump KNOWLEDGE_SOVEREIGN_LOOP_PROJECTOR_MAX_BATCHES_PER_TICK to ~20
      # during a reproject to hit ~2 000 events / sec without a code
      # change; revert after the run so steady-state stays bounded.
      - KNOWLEDGE_SOVEREIGN_LOOP_PROJECTOR_BATCH_SIZE=${KNOWLEDGE_SOVEREIGN_LOOP_PROJECTOR_BATCH_SIZE:-500}
      - KNOWLEDGE_SOVEREIGN_LOOP_PROJECTOR_MAX_BATCHES_PER_TICK=${KNOWLEDGE_SOVEREIGN_LOOP_PROJECTOR_MAX_BATCHES_PER_TICK:-4}
    ports:
      - "9510:9500"
      - "9511:9501"
    volumes:
      - ../backups/sovereign-snapshots:/tmp/snapshots
    secrets:
      - sovereign_db_password
    depends_on:
      knowledge-sovereign-db:
        condition: service_healthy
      knowledge-sovereign-db-migrator:
        condition: service_completed_successfully
    networks:
      - alt-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9501/health"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  knowledge-sovereign-db-data:
