# compose/sovereign.yaml - Knowledge Sovereign service + DB

services:
  knowledge-sovereign-db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - POSTGRES_DB=knowledge_sovereign
      - POSTGRES_USER=sovereign
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    volumes:
      - knowledge-sovereign-db-data:/var/lib/postgresql/data
    ports:
      - "5438:5432"
    secrets:
      - postgres_password
    networks:
      - alt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign -d knowledge_sovereign"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Atlas migrator for knowledge-sovereign-db
  knowledge-sovereign-db-migrator:
    build:
      context: ../knowledge-sovereign
      dockerfile: docker/Dockerfile.migrator
    command: ["apply"]
    entrypoint:
      - /bin/sh
      - -c
      - |
        DB_PASS=$$(cat /run/secrets/postgres_password)
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@$${DB_HOST}:$${DB_PORT}/$${DB_NAME}?sslmode=disable"
        exec /scripts/migrate.sh "$$@"
      - --
    environment:
      DB_HOST: knowledge-sovereign-db
      DB_PORT: "5432"
      DB_USER: sovereign
      DB_NAME: knowledge_sovereign
      ATLAS_REVISIONS_SCHEMA: "public"
    secrets:
      - postgres_password
    volumes:
      - ../knowledge-sovereign/migrations:/migrations:ro
    depends_on:
      knowledge-sovereign-db:
        condition: service_healthy
    networks:
      - alt-network
    restart: "no"

  knowledge-sovereign:
    build:
      context: ../knowledge-sovereign
      dockerfile: Dockerfile.sovereign
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - DATABASE_URL=postgres://sovereign:${POSTGRES_PASSWORD}@knowledge-sovereign-db:5432/knowledge_sovereign?sslmode=disable
      - SERVICE_SECRET_FILE=/run/secrets/service_secret
      - LISTEN_ADDR=:9500
      - METRICS_ADDR=:9501
    ports:
      - "9510:9500"
      - "9511:9501"
    depends_on:
      knowledge-sovereign-db:
        condition: service_healthy
      knowledge-sovereign-db-migrator:
        condition: service_completed_successfully
    secrets:
      - service_secret
    networks:
      - alt-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9501/health"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  knowledge-sovereign-db-data:
