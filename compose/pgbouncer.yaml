# compose/pgbouncer.yaml - PgBouncer connection pooling
# Transaction-mode pooling to reduce PostgreSQL connection count
#
# Reads passwords from Docker secrets at startup via wrapper entrypoint.

include:
  - base.yaml

services:
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: always
    mem_limit: 256m
    entrypoint:
      - /bin/sh
      - -c
      - |
        DB_PASS=$$(cat /run/secrets/postgres_password)
        export DATABASE_URL="postgres://$${DB_USER}:$${DB_PASS}@db:5432/$${POSTGRES_DB}"
        exec /entrypoint.sh /usr/bin/pgbouncer /etc/pgbouncer/pgbouncer.ini
    environment:
      - DB_USER=${DB_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - LISTEN_PORT=6432
      - AUTH_TYPE=plain
      - POOL_MODE=transaction
      - DEFAULT_POOL_SIZE=30
      - MIN_POOL_SIZE=5
      - MAX_DB_CONNECTIONS=100
      - MAX_CLIENT_CONN=1000
      - MAX_PREPARED_STATEMENTS=0
      - SERVER_RESET_QUERY=DISCARD ALL
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,search_path,prepared_statements
      - QUERY_WAIT_TIMEOUT=30
    secrets:
      - postgres_password
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${DB_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - alt-network
    labels:
      - rask.group=pgbouncer
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgbouncer-kratos:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: always
    mem_limit: 128m
    entrypoint:
      - /bin/sh
      - -c
      - |
        KRATOS_PASS=$$(cat /run/secrets/kratos_db_password)
        export DATABASE_URL="postgres://$${KRATOS_DB_USER}:$${KRATOS_PASS}@kratos-db:5432/$${KRATOS_DB_NAME}"
        exec /entrypoint.sh /usr/bin/pgbouncer /etc/pgbouncer/pgbouncer.ini
    environment:
      - KRATOS_DB_USER=${KRATOS_DB_USER:-kratos_user}
      - KRATOS_DB_NAME=${KRATOS_DB_NAME:-kratos}
      - LISTEN_PORT=6432
      - AUTH_TYPE=plain
      - POOL_MODE=transaction
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
      - MAX_DB_CONNECTIONS=60
      - MAX_CLIENT_CONN=500
      # PgBouncer 1.21+: prepared statement tracking for transaction pooling
      - MAX_PREPARED_STATEMENTS=256
      - SERVER_RESET_QUERY=DISCARD ALL
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,search_path,prepared_statements
      - QUERY_WAIT_TIMEOUT=30
    secrets:
      - kratos_db_password
    depends_on:
      kratos-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - alt-network
    labels:
      - rask.group=pgbouncer-kratos
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
