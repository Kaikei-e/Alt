# compose/base.yaml - Shared resources for Alt platform
# This file contains secrets, networks, volumes, and YAML anchors
# Used by all other compose files via 'include' directive

name: alt

secrets:
  backend_token_secret:
    file: ../secrets/backend_token_secret.txt
  postgres_password:
    file: ../secrets/postgres_password.txt
  db_password:
    file: ../secrets/db_password.txt
  pre_processor_sidecar_db_password:
    file: ../secrets/pre_processor_sidecar_db_password.txt
  recap_db_password:
    file: ../secrets/recap_db_password.txt
  rag_db_password:
    file: ../secrets/rag_db_password.txt
  kratos_db_password:
    file: ../secrets/kratos_db_password.txt
  kratos_cookie_secret:
    file: ../secrets/kratos_cookie_secret.txt
  kratos_cipher_secret:
    file: ../secrets/kratos_cipher_secret.txt
  meili_master_key:
    file: ../secrets/meili_master_key.txt
  meili_search_key:
    file: ../secrets/meili_search_key.txt
  clickhouse_password:
    file: ../secrets/clickhouse_password.txt
  csrf_secret:
    file: ../secrets/csrf_secret.txt
  hugging_face_token:
    file: ../secrets/hugging_face_token.txt
  inoreader_client_id:
    file: ../secrets/inoreader_client_id.txt
  inoreader_client_secret:
    file: ../secrets/inoreader_client_secret.txt
  grafana_admin_password:
    file: ../secrets/grafana_admin_password.txt
  restic_password:
    file: ../secrets/restic_password.txt
  acolyte_db_password:
    file: ../secrets/acolyte_db_password.txt
  pp_db_password:
    file: ../secrets/pp_db_password.txt
  image_proxy_secret:
    file: ../secrets/image_proxy_secret.txt
  step_ca_root_password:
    file: ../secrets/step_ca_root_password.txt
  pact_broker_basic_auth_password:
    file: ../secrets/pact_broker_basic_auth_password.txt

networks:
  alt-network:

volumes:
  db_data_17:
  kratos_db_data:
  meili_data:
  rask_log_aggregator_data:
  clickhouse_data:
  news_creator_models:
  recap_db_data:
  rag_db_data:
  oauth_token_data:
  prometheus_data:
  grafana_data:
  pre_processor_db_data:
  redis-streams-data:
  nginx-image-cache:
  step_ca_data:
  pki_trust_bundle:
  alt_backend_certs:
  auth_hub_certs:
  pre_processor_certs:
  search_indexer_certs:
  alt_butterfly_facade_certs:
  tag_generator_certs:
  tts_speaker_certs:
  acolyte_orchestrator_certs:
  recap_worker_certs:
  recap_subworker_certs:
  recap_subworker_artifacts:
  news_creator_certs:

x-rask-env: &rask-env
  environment:
    RASK_CONFIG: |
      endpoint = "http://rask-log-aggregator:9600/v1/aggregate"
      batch_size = 1
      flush_interval_ms = 500
      buffer_capacity = 100000
      log_level = "info"

x-rask-forwarder-env: &rask-forwarder-env
  environment:
    DOCKER_HOST: "unix:///var/run/docker.sock"
    LOG_LEVEL: "info"
    RUST_LOG: "info"
    RASK_ENDPOINT: "http://rask-log-aggregator:9600/v1/aggregate"
    BATCH_SIZE: "1000"
    FLUSH_INTERVAL_MS: "500"
    BUFFER_CAPACITY: "100000"

x-shared-env-file: &shared-env-file
  env_file:
    - ../.env

x-logging-config: &logging-config
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

# Healthcheck templates for service startup ordering
x-healthcheck-http: &healthcheck-http
  healthcheck:
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

x-healthcheck-db: &healthcheck-db
  healthcheck:
    interval: 5s
    timeout: 5s
    retries: 10
    start_period: 10s
