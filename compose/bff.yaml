# compose/bff.yaml - Backend for Frontend service
# Transparent proxy between alt-frontend-sv and alt-backend

include:
  - base.yaml
  - pki.yaml

x-tls-cert-sidecar: &tls-cert-sidecar
  image: smallstep/step-ca:0.27.5
  user: "0:0"
  secrets:
    - step_ca_root_password
  networks:
    - alt-network
  labels:
    - rask.group=pki
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  alt-butterfly-facade-cert-init:
    <<: *tls-cert-sidecar
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -e
        if [ -f /certs/svc-cert.pem ]; then
          exit 0
        fi
        TOKEN=$$(step ca token "alt-butterfly-facade" \
          --san alt-butterfly-facade --san localhost \
          --ca-url https://step-ca:9000 \
          --root /trust/ca-bundle.pem \
          --provisioner bootstrap \
          --password-file /run/secrets/step_ca_root_password 2>/dev/null)
        step ca certificate "alt-butterfly-facade" /certs/svc-cert.pem /certs/svc-key.pem \
          --ca-url https://step-ca:9000 \
          --root /trust/ca-bundle.pem \
          --token "$$TOKEN" --force
        chown 65532:65532 /certs /certs/svc-cert.pem /certs/svc-key.pem
        chmod 0444 /certs/svc-cert.pem
        chmod 0400 /certs/svc-key.pem
    volumes:
      - alt_butterfly_facade_certs:/certs
      - pki_trust_bundle:/trust:ro
    depends_on:
      step-ca-bootstrap:
        condition: service_completed_successfully

  alt-butterfly-facade-cert-renewer:
    <<: *tls-cert-sidecar
    restart: unless-stopped
    entrypoint:
      - step
    command:
      - ca
      - renew
      - --ca-url=https://step-ca:9000
      - --root=/trust/ca-bundle.pem
      - --daemon
      - --expires-in=8h
      - /certs/svc-cert.pem
      - /certs/svc-key.pem
    volumes:
      - alt_butterfly_facade_certs:/certs
      - pki_trust_bundle:/trust:ro
    depends_on:
      alt-butterfly-facade-cert-init:
        condition: service_completed_successfully

  alt-butterfly-facade:
    build:
      context: ../alt-butterfly-facade
      dockerfile: Dockerfile
    environment:
      - BFF_PORT=9250
      - BACKEND_CONNECT_URL=http://alt-backend:9101
      - BACKEND_REST_URL=http://alt-backend:9000
      - AUTH_HUB_INTERNAL_URL=http://auth-hub:8888
      - BACKEND_TOKEN_SECRET_FILE=/run/secrets/backend_token_secret
      - BACKEND_TOKEN_ISSUER=auth-hub
      - BACKEND_TOKEN_AUDIENCE=alt-backend
      - BFF_REQUEST_TIMEOUT=30s
      - BFF_STREAMING_TIMEOUT=40m
      - TTS_CONNECT_URL=${TTS_CONNECT_URL:-}
      - ACOLYTE_CONNECT_URL=http://acolyte-orchestrator:8090
      - MTLS_LISTEN=${MTLS_LISTEN:-true}
      - MTLS_PORT=9443
      - MTLS_CERT_FILE=/certs/svc-cert.pem
      - MTLS_KEY_FILE=/certs/svc-key.pem
      - MTLS_CA_FILE=/trust/ca-bundle.pem
      - MTLS_CLIENT_AUTH=${ALT_BUTTERFLY_FACADE_MTLS_CLIENT_AUTH:-}
      - MTLS_ALLOWED_PEERS=${ALT_BUTTERFLY_FACADE_MTLS_ALLOWED_PEERS:-}
      - MTLS_ENFORCE=${ALT_BUTTERFLY_FACADE_MTLS_ENFORCE:-true}
      - BACKEND_CONNECT_MTLS_URL=https://alt-backend:9443
      - BACKEND_MTLS_SERVER_NAME=alt-backend
      # Acolyte and TTS each run an nginx mTLS sidecar on :9443
      - ACOLYTE_CONNECT_MTLS_URL=https://acolyte-orchestrator:9443
      - TTS_CONNECT_MTLS_URL=${TTS_CONNECT_MTLS_URL:-}
    extra_hosts:
      - "tts-external:${TTS_EXTERNAL_HOST:-127.0.0.1}"
    secrets:
      - backend_token_secret
    ports:
      - "9250:9250"
      # mTLS :9443 intentionally not published (internal east-west only)
    volumes:
      - alt_butterfly_facade_certs:/certs:ro
      - pki_trust_bundle:/trust:ro
    depends_on:
      alt-backend:
        condition: service_healthy
      auth-hub:
        condition: service_healthy
      alt-butterfly-facade-cert-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/alt-butterfly-facade", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - alt-network
    deploy:
      resources:
        reservations:
          memory: 64M
    labels:
      - rask.group=alt-bff
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
