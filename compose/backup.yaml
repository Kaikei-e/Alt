# compose/backup.yaml - Backup services for Alt platform
# Provides Restic-based backup with 3-2-1 strategy
#
# Usage:
#   docker compose -f compose/compose.yaml -p alt --profile backup up -d restic-backup
#   docker compose -f compose/compose.yaml -p alt exec restic-backup restic snapshots

include:
  - base.yaml

networks:
  # Internal-only network shared by restic-backup and its docker-socket-proxy.
  # Nothing else on alt-network can reach the proxy's scoped Docker API.
  backup-docker-proxy:
    internal: true

services:
  docker-socket-proxy:
    # Scoped Docker API proxy: restic-backup no longer gets a raw RW bind mount
    # of /var/run/docker.sock (which is host-root-equivalent access — `:ro` on
    # a unix socket mount only stops deletion of the socket file, it does NOT
    # restrict which API verbs are reachable through it). This proxy enforces
    # the real scoping via env vars below, based on the exact operations
    # scripts/backup/*.sh perform:
    #   - `docker ps` (backup-all.sh container-existence checks)
    #   - `docker exec` into alt-db/kratos-db/recap-db/rag-db/pact-db/clickhouse
    #     (pg_dump, psql CHECKPOINT, clickhouse-client BACKUP DATABASE)
    #   - `docker run` + `docker volume create/rm` + `docker exec` + `docker rm -f`
    #     for restore-verify.sh's disposable postgres:17-alpine verification container
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: alt-backup-docker-proxy
    environment:
      # Master switch: without POST=1 only GET/HEAD pass, regardless of the
      # per-section switches below.
      - POST=1
      # docker ps / inspect / create / rm, and the `POST /containers/{id}/exec`
      # half of `docker exec`.
      - CONTAINERS=1
      # the `POST /exec/{id}/start` half of `docker exec`.
      - EXEC=1
      # inspect + pull postgres:17-alpine for restore-verify.sh's temp container.
      - IMAGES=1
      # docker volume create/rm for restore-verify.sh's scratch volumes.
      - VOLUMES=1
      # explicit grant for `POST /containers/{id}/start`, used by `docker run -d`.
      - ALLOW_START=1
    volumes:
      # Real socket, read-only: the proxy is the only thing that talks to it
      # directly, and it enforces the actual scoping above (unlike the RW bind
      # mount this replaces on restic-backup, the read-only direction here is
      # legitimate because docker-socket-proxy is the trusted enforcement point).
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backup-docker-proxy
    profiles:
      - backup
    labels:
      rask.group: backup
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  restic-backup:
    image: restic/restic:0.17.3
    container_name: alt-backup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
          set -e
          apk add --no-cache curl bash jq docker-cli >/dev/null 2>&1
          SC_URL="https://github.com/aptible/supercronic/releases/download/v0.2.33/supercronic-linux-amd64"
          if [ "$$(uname -m)" = "aarch64" ]; then
            SC_URL="https://github.com/aptible/supercronic/releases/download/v0.2.33/supercronic-linux-arm64"
          fi
          curl -fsSL "$$SC_URL" -o /usr/local/bin/supercronic
          chmod +x /usr/local/bin/supercronic
          echo "Starting supercronic scheduler..."
          exec /usr/local/bin/supercronic /scripts/crontab
    env_file:
      - ../scripts/backup/alt-backup.env
    environment:
      - IN_CONTAINER=1
      - RESTIC_REPOSITORY=/backups/restic-repo
      - RESTIC_PASSWORD_FILE=/run/secrets/restic_password
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-rask_user}
      # Docker CLI talks to the scoped docker-socket-proxy instead of a raw
      # RW bind mount of the host socket.
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      # Healthchecks.io integration (optional)
      - HEALTHCHECK_HOURLY_URL=${HEALTHCHECK_HOURLY_URL:-}
      - HEALTHCHECK_DAILY_URL=${HEALTHCHECK_DAILY_URL:-}
      - HEALTHCHECK_OFFSITE_URL=${HEALTHCHECK_OFFSITE_URL:-}
      - HEALTHCHECK_URL=${HEALTHCHECK_URL:-}
    secrets:
      - restic_password
    depends_on:
      docker-socket-proxy:
        condition: service_started
    volumes:
      # Configured SSH keys for remote sync
      - ../secrets/ssh/id_ed25519_backup:/root/.ssh/id_ed25519:ro
      - ../secrets/ssh/known_hosts:/root/.ssh/known_hosts:ro
      # Backup destination
      - ../backups:/backups
      # PostgreSQL logical backups
      - ../backups/postgres:/backups/postgres
      # Volume data (read-only)
      - db_data_17:/data/db_data_17:ro
      - kratos_db_data:/data/kratos_db_data:ro
      - recap_db_data:/data/recap_db_data:ro
      - rag_db_data:/data/rag_db_data:ro
      - meili_data:/data/meili_data:ro
      - clickhouse_data:/data/clickhouse_data:ro
      - redis-streams-data:/data/redis-streams-data:ro
      - oauth_token_data:/data/oauth_token_data:ro
      - prometheus_data:/data/prometheus_data:ro
      - grafana_data:/data/grafana_data:ro
      - pact_db_data:/data/pact_db_data:ro
      # Backup scripts
      - ../scripts/backup:/scripts:ro
    networks:
      - alt-network
      - backup-docker-proxy
    profiles:
      - backup
    labels:
      rask.group: backup
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "restic", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
