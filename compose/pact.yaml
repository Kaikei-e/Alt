# compose/pact.yaml - Pact Broker (always-on; part of default `docker compose up`).
#
# Hosts Consumer-Driven Contract pacts and can-i-deploy state for all Alt
# services. Authentication is basic-auth with a password sourced from the
# `pact_broker_basic_auth_password` Docker secret. Public read is disabled —
# the Broker only accepts authenticated requests on the alt-network.
#
# DB password is a separate secret (`pact_db_password`) so rotating broker
# HTTP credentials does not require recreating the Postgres role/volume.
#
# promoted from `profiles: [pact]` (opt-in) to always-on so
# `scripts/pact-check.sh` and the release-gate workflow can rely on its
# presence without a side-profile toggle.

name: alt

include:
  - base.yaml

services:
  pact-db:
    image: postgres:16-alpine
    # One-shot DB for the Broker; keep footprint small vs app DBs.
    mem_limit: 256m
    environment:
      POSTGRES_USER: pact
      POSTGRES_PASSWORD_FILE: /run/secrets/pact_db_password
      POSTGRES_DB: pact
    secrets:
      - pact_db_password
    volumes:
      - pact_db_data:/var/lib/postgresql/data
    networks:
      - alt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      rask.group: pact
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pact-broker:
    image: pactfoundation/pact-broker:2.139.0-pactbroker2.119.0
    # Broker is mostly idle between can-i-deploy calls.
    mem_limit: 256m
    depends_on:
      pact-db:
        condition: service_healthy
    # Bind on the prod-host Tailscale interface so external alt-builder
    # runners can reach the Broker over the tailnet, AND on 127.0.0.1 so the
    # prod-host shell itself (alt-deploy's `Record deployment per pacticipant`
    # step) can reach it without going through the Tailnet stack. The port
    # stays closed on public / LAN interfaces. Operator sets PROD_TAILNET_IP
    # in .env to the output of `tailscale ip -4` on the prod host. The
    # dev/CI fallback for the first line is 127.0.0.2 (a loopback alias, not
    # a public interface) so it cannot collide with the second 127.0.0.1
    # binding when PROD_TAILNET_IP is unset.
    ports:
      - "${PROD_TAILNET_IP:-127.0.0.2}:9292:9292"
      - "127.0.0.1:9292:9292"
    # pact-broker expects the DB URL inline; we render it from secrets
    # via an entrypoint wrapper that reads DB + basic-auth passwords separately.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        DB_PWD_FILE=/run/secrets/pact_db_password
        AUTH_PWD_FILE=/run/secrets/pact_broker_basic_auth_password
        if [ ! -r "$$DB_PWD_FILE" ]; then
          echo "pact_db_password secret not mounted or not readable" >&2
          exit 1
        fi
        if [ ! -r "$$AUTH_PWD_FILE" ]; then
          echo "pact_broker_basic_auth_password secret not mounted or not readable" >&2
          exit 1
        fi
        DB_PASSWORD=$$(cat "$$DB_PWD_FILE")
        AUTH_PASSWORD=$$(cat "$$AUTH_PWD_FILE")
        export PACT_BROKER_DATABASE_URL="postgres://pact:$${DB_PASSWORD}@pact-db/pact"
        export PACT_BROKER_BASIC_AUTH_PASSWORD="$${AUTH_PASSWORD}"
        cd /pact_broker && exec sh ./entrypoint.sh
    environment:
      PACT_BROKER_BASIC_AUTH_USERNAME: pact
      PACT_BROKER_ALLOW_PUBLIC_READ: "false"
      PACT_BROKER_LOG_LEVEL: INFO
      # Auto-clean (Broker image >= 2.72.0.0) — keep main, currently-deployed,
      # and branches active in the last 30 days; everything else gets pruned
      # nightly. Prevents unbounded DB growth from PR branches.
      PACT_BROKER_DATABASE_CLEAN_ENABLED: "true"
      PACT_BROKER_DATABASE_CLEAN_CRON_SCHEDULE: "0 3 * * *"
      PACT_BROKER_DATABASE_CLEAN_KEEP_VERSION_SELECTORS: '[{"branch": "main"},{"deployed": true},{"released": true},{"maxAgeInDays": 30}]'
      # Automatic branch deletion (Feb 2024 release) — drop ephemeral PR
      # branches that have been stale for 14 days.
      PACT_BROKER_AUTO_DELETE_BRANCHES_ENABLED: "true"
      PACT_BROKER_AUTO_DELETE_BRANCHES_OLDER_THAN_DAYS: "14"
      # Webhook scheme allowlist — refuse any non-HTTPS callback.
      PACT_BROKER_WEBHOOK_SCHEME_WHITELIST: "https"
    secrets:
      - pact_db_password
      - pact_broker_basic_auth_password
    networks:
      - alt-network
    healthcheck:
      # Heartbeat requires basic auth when ALLOW_PUBLIC_READ=false. The image
      # ships BusyBox wget which lacks --user/--password but does accept
      # --header, so we build the Basic auth header from the secret instead
      # of embedding it in the URL. This keeps the password out of the URL
      # that `docker inspect` / wget error messages would otherwise surface.
      test:
        - CMD-SHELL
        - >-
          wget -q --spider
          --header="Authorization: Basic $(printf 'pact:%s' "$(cat /run/secrets/pact_broker_basic_auth_password)" | base64 -w 0)"
          http://127.0.0.1:9292/diagnostic/status/heartbeat
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      rask.group: pact
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pact_db_data:
