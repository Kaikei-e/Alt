# compose/compose.staging.yaml
#
# Ephemeral E2E staging stack — brought up per run of the Hurl suite and
# torn down at the end. Project name `alt-staging` keeps it isolated from
# any prod compose stack that may be running on the same host.
#
# Services are tagged with Compose profiles so each Hurl suite brings up
# only its own dependencies:
#   search-indexer suite       → profile `search-indexer`
#     meilisearch, stub-backend, search-indexer
#   mq-hub suite               → profile `mq-hub`
#     redis-streams, mq-hub
#   knowledge-sovereign suite  → profile `knowledge-sovereign`
#     knowledge-sovereign-db, knowledge-sovereign-db-migrator, knowledge-sovereign
#   tag-generator suite        → profile `tag-generator`
#     redis-streams, stub-backend, mq-hub, tag-generator
#     (round-trips through mq-hub's GenerateTagsForArticle RPC because
#     Hurl cannot XREAD Redis directly)
#   news-creator suite         → profile `news-creator`
#     news-creator-ollama-stub, news-creator
#     (real Ollama needs a GPU; the stub returns a fixed `/api/tags`
#     response so OllamaGateway.list_models() succeeds and the FastAPI
#     contract surface — `/health`, `/queue/status` — can be exercised
#     without LLM inference. `WARMUP_ENABLED=false` keeps lifespan from
#     calling `/api/generate` against the stub during Phase 1.)
#   recap-worker suite         → profile `recap-worker`
#     recap-db, recap-db-migrator, recap-pipeline-stub, recap-worker
#     (the stub container is multi-aliased on alt-staging as
#     recap-subworker, news-creator, alt-backend, and tag-generator so
#     recap-worker's pipeline runs end-to-end without the real
#     GPU-bound services)
#   acolyte-orchestrator suite → profile `acolyte-orchestrator`
#     acolyte-db, acolyte-db-migrator, acolyte-orchestrator
#     (Postgres + Atlas migrator + Starlette/Connect-RPC service.
#     CRUD scenarios run against the migrated DB only; the run-
#     lifecycle scenarios additionally activate the news-creator and
#     search-indexer profiles to drive the LangGraph pipeline.)
#   rag-orchestrator suite    → profile `rag-orchestrator`
#     rag-db, rag-db-migrator, rag-orchestrator
#     (Postgres + pgvector + Atlas migrator + Echo REST /
#     Connect-RPC service. Phase 1 covers health, /connect/health,
#     auth enforcement, and Augur read-only RPCs — the retrieve /
#     answer paths that need news-creator, search-indexer,
#     rerank-external, and alt-backend are deferred to Phase 2.)
#   alt-backend suite          → profile `alt-backend`
#     alt-backend-db, alt-backend-db-migrator, alt-backend-deps-stub,
#     alt-backend
#     (Postgres + Atlas migrator + Echo REST / Connect-RPC service.
#     The deps stub is registered under six network aliases so every
#     upstream alt-backend talks to (search-indexer, pre-processor,
#     recap-worker, rag-orchestrator, knowledge-sovereign, mq-hub)
#     resolves to it without spinning up the real services. A seventh
#     alias, `stub.invalid`, serves a minimal RSS 2.0 document for the
#     registration scenarios.)
# Bring a suite up with:
#   docker compose -f compose.staging.yaml --profile <suite> -p alt-staging up -d --wait
# Services with NO profile are never auto-started (Compose default).
#
# Every secret in this stack is a test fixture committed under
# e2e/fixtures/staging-secrets/ — never reuse these values anywhere else.

name: alt-staging

services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: alt-staging-meilisearch
    profiles: [search-indexer, acolyte-orchestrator]
    environment:
      MEILI_MASTER_KEY: alt-staging-test-master-key
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "17700:7700"
    networks:
      - alt-staging
    healthcheck:
      # Meilisearch binds IPv4 only (0.0.0.0:7700). On hosts where the
      # runtime resolves `localhost` to ::1 first, wget against localhost
      # gets "connection refused" and the container is marked unhealthy
      # forever. Always use 127.0.0.1 for intra-container loopback probes.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:7700/health | grep -q available"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  stub-backend:
    # Nginx returning 200 to every request — search-indexer only probes
    # BACKEND_API_URL for reachability at startup, it doesn't validate the body.
    # tag-generator also uses it as a BACKEND_API_URL stub; the Phase-1
    # scenarios never actually invoke the article-fetch path that would
    # need real Connect-RPC responses.
    image: nginx:1.27-alpine
    container_name: alt-staging-stub-backend
    profiles: [search-indexer, tag-generator, acolyte-orchestrator]
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 2s

  search-indexer:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-search-indexer:${SEARCH_INDEXER_IMAGE_TAG:-main}
    container_name: alt-staging-search-indexer
    profiles: [search-indexer, acolyte-orchestrator]
    depends_on:
      meilisearch:
        condition: service_healthy
      stub-backend:
        condition: service_healthy
    environment:
      - MTLS_LISTEN=false
      - MTLS_ENFORCE=false
      - BACKEND_API_URL=http://stub-backend
      - BACKEND_API_MTLS_URL=http://stub-backend
      - BACKEND_MTLS_SERVER_NAME=stub-backend
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_API_KEY_FILE=/run/secrets/meili_master_key
      - MEILISEARCH_SEARCH_API_KEY_FILE=/run/secrets/meili_master_key
      - MEILI_MASTER_KEY_FILE=/run/secrets/meili_master_key
      - CONSUMER_ENABLED=false
      - REDIS_STREAMS_URL=redis://stub-backend:6379
      - RECAP_WORKER_URL=http://stub-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://stub-backend:4318
      - OTEL_SERVICE_NAME=search-indexer-staging
      - LOG_LEVEL=info
    ports:
      - "19300:9300"
    networks:
      - alt-staging
    secrets:
      - meili_master_key
    healthcheck:
      test: ["CMD", "/search-indexer", "healthcheck"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  # mq-hub suite — Redis Streams + mq-hub broker
  # Redis is shared with the tag-generator suite (tag-generator's
  # consumer joins the alt:events:tags group) and mq-hub itself is
  # reused by scenario 04 of the tag-generator suite.
  redis-streams:
    image: redis:8.4-alpine
    container_name: alt-staging-redis-streams
    profiles: [mq-hub, tag-generator]
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly no
      --save ""
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 2s

  mq-hub:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-mq-hub:${MQ_HUB_IMAGE_TAG:-main}
    container_name: alt-staging-mq-hub
    profiles: [mq-hub, tag-generator]
    depends_on:
      redis-streams:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis-streams:6379
      - CONNECT_PORT=9500
      - LOG_LEVEL=info
      - REDIS_POOL_SIZE=20
      - STREAM_MAX_LEN=10000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://redis-streams:4318
      - OTEL_SERVICE_NAME=mq-hub-staging
    ports:
      - "19500:9500"
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9500/health"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  # knowledge-sovereign suite — Postgres + Atlas migrator + sovereign service
  knowledge-sovereign-db:
    image: postgres:16-alpine
    container_name: alt-staging-knowledge-sovereign-db
    profiles: [knowledge-sovereign]
    # Plain env — staging password is a committed test fixture with no
    # meaning outside the ephemeral alt-staging network (see
    # e2e/fixtures/staging-secrets/README.md). Using env + DATABASE_URL
    # avoids the distroless sovereign image's lack of `cat` for reading
    # a secrets file.
    environment:
      POSTGRES_DB: knowledge_sovereign
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: alt-staging-test-postgres-password
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign -d knowledge_sovereign"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  knowledge-sovereign-db-migrator:
    build:
      context: ../knowledge-sovereign
      dockerfile: docker/Dockerfile.migrator
    container_name: alt-staging-knowledge-sovereign-db-migrator
    profiles: [knowledge-sovereign]
    command: ["apply"]
    entrypoint:
      - /bin/sh
      - -c
      - exec /scripts/migrate.sh "$$@"
      - --
    environment:
      DATABASE_URL: postgres://sovereign:alt-staging-test-postgres-password@knowledge-sovereign-db:5432/knowledge_sovereign?sslmode=disable
      DB_HOST: knowledge-sovereign-db
      DB_PORT: "5432"
      DB_USER: sovereign
      DB_NAME: knowledge_sovereign
      ATLAS_REVISIONS_SCHEMA: "public"
    depends_on:
      knowledge-sovereign-db:
        condition: service_healthy
    networks:
      - alt-staging
    restart: "no"

  knowledge-sovereign:
    build:
      context: ../knowledge-sovereign
      dockerfile: Dockerfile.sovereign
    container_name: alt-staging-knowledge-sovereign
    profiles: [knowledge-sovereign]
    depends_on:
      knowledge-sovereign-db:
        condition: service_healthy
      knowledge-sovereign-db-migrator:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgres://sovereign:alt-staging-test-postgres-password@knowledge-sovereign-db:5432/knowledge_sovereign?sslmode=disable
      - LISTEN_ADDR=:9500
      - METRICS_ADDR=:9501
      - SNAPSHOT_DIR=/tmp/snapshots
      - ARCHIVE_DIR=/tmp/archives
      - BUILD_REF=staging
      - LOG_LEVEL=info
    ports:
      - "19510:9500"
      - "19511:9501"
    tmpfs:
      # Override the Dockerfile's root-owned /tmp/snapshots with a tmpfs
      # mount whose default mode (1777) lets the distroless nonroot user
      # write snapshot + retention artifacts. Ephemeral per run.
      - /tmp/snapshots:mode=1777
      - /tmp/archives:mode=1777
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9501/health"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  # rag-orchestrator suite — rag-db Postgres (pgvector) + Atlas migrator
  # + rag-orchestrator. Phase 1 covers health / auth / Augur read-only
  # RPCs against the migrated DB; retrieve + answer paths are deferred
  # behind stubs for news-creator / search-indexer / rerank-external /
  # alt-backend (out of Phase 1 scope). The rag-db image is the same
  # build context as prod (`../rag-db`) because it bakes pgvector into
  # postgres:18; staging skips the prod postgresql-rag.conf override to
  # keep the slice self-contained.
  rag-db:
    build:
      context: ../rag-db
      dockerfile: Dockerfile
    container_name: alt-staging-rag-db
    profiles: [rag-orchestrator]
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: alt-staging-test-rag-password
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  rag-db-migrator:
    build:
      context: ../rag-migration-atlas
      dockerfile: docker/Dockerfile
    container_name: alt-staging-rag-db-migrator
    profiles: [rag-orchestrator]
    command: ["apply"]
    environment:
      DB_HOST: rag-db
      DB_PORT: "5432"
      DB_USER: rag_user
      DB_NAME: rag_db
      DB_PASSWORD: alt-staging-test-rag-password
      ATLAS_REVISIONS_SCHEMA: "public"
    depends_on:
      rag-db:
        condition: service_healthy
    networks:
      - alt-staging
    restart: "no"

  rag-orchestrator:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-rag-orchestrator:${RAG_ORCHESTRATOR_IMAGE_TAG:-main}
    build:
      context: ../rag-orchestrator
      dockerfile: Dockerfile
    container_name: alt-staging-rag-orchestrator
    profiles: [rag-orchestrator]
    depends_on:
      rag-db:
        condition: service_healthy
      rag-db-migrator:
        condition: service_completed_successfully
    environment:
      - ENV=staging
      - PORT=9010
      - CONNECT_PORT=9011
      - DB_HOST=rag-db
      - DB_PORT=5432
      - DB_USER=rag_user
      - DB_PASSWORD=alt-staging-test-rag-password
      - DB_NAME=rag_db
      # External deps that Phase 1 never exercises. They're set to
      # loopback so config.Load() succeeds; any request path that
      # actually reaches them is out of scope for this suite.
      - EMBEDDER_EXTERNAL=http://127.0.0.1:9
      - EMBEDDER_TIMEOUT=10
      - AUGUR_EXTERNAL=http://127.0.0.1:9
      - AUGUR_KNOWLEDGE_MODEL=gemma4-e4b-12k
      - SEARCH_INDEXER_URL=http://127.0.0.1:9
      - QUERY_EXPANSION_URL=http://127.0.0.1:9
      - QUERY_EXPANSION_TIMEOUT=30
      - RERANK_ENABLED=false
      - RERANK_URL=http://127.0.0.1:9
      - RERANK_TIMEOUT=12
      - RAG_PROMPT_VERSION=alpha-v2
      - LLM_BACKEND=ollama
      - LOG_LEVEL=info
    networks:
      - alt-staging
    # rag-orchestrator ships on distroless/static — no wget/curl/shell,
    # and the binary exposes no `healthcheck` subcommand. `up --wait`
    # without a container healthcheck still waits until the process is
    # in `running` state; 00-readiness.hurl's per-request retry block
    # then polls /readyz until the DB pool is live. That keeps the wait
    # inside the test runner where a failed readiness is a named test
    # failure rather than an opaque "unhealthy" state.

  # tag-generator suite — FastAPI service that consumes alt:events:tags
  # and replies via Redis Streams. Scenario 04 reaches the consumer
  # through mq-hub's GenerateTagsForArticle RPC. stub-backend satisfies
  # BACKEND_API_URL reachability. The Postgres-backed /api/v1/tags/batch
  # endpoint has been removed per ADR-000241 / ADR-000397 (Shared
  # Database anti-pattern elimination); tag lookups now flow through
  # alt-backend's BatchGetTagsByArticleIDs Connect-RPC.
  tag-generator:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-tag-generator:${TAG_GENERATOR_IMAGE_TAG:-main}
    container_name: alt-staging-tag-generator
    profiles: [tag-generator]
    depends_on:
      redis-streams:
        condition: service_healthy
      stub-backend:
        condition: service_healthy
    environment:
      - PORT=9400
      - BACKEND_API_URL=http://stub-backend
      - REDIS_STREAMS_URL=redis://redis-streams:6379
      - CONSUMER_ENABLED=true
      - CONSUMER_GROUP=tag-generator-group
      - CONSUMER_NAME=tag-generator-staging
      - MTLS_ENFORCE=false
      - PEER_IDENTITY_TRUSTED=off
      - DEFAULT_USER_ID=hurl-e2e
      - DEFAULT_TENANT_ID=public
      - LOG_LEVEL=info
      # SBERT + transformers otherwise HEAD huggingface.co on every load
      # to check for model updates. The alt-staging network is
      # `internal: true`, so the request hangs until the httpx client
      # gets closed and warmup() raises ModelLoadError, which leaves
      # _background_tag_service as None forever and every
      # /api/v1/extract-tags returns 503. The SBERT weights are already
      # baked into the image by the builder stage, so forcing offline
      # mode is safe and the correct semantic for E2E.
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    ports:
      - "19400:9400"
    networks:
      - alt-staging
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9400/health').read()",
        ]
      interval: 3s
      timeout: 3s
      retries: 30
      # FastAPI lifespan blocks on SBERT warm-up + Redis consumer join.
      # The SBERT cache is baked into the image so this is bounded, but
      # on GitHub-hosted 2-core runners TagExtractor.warmup() has been
      # observed to run past 20 s. The Hurl scenarios carry their own
      # retry budgets for the same reason; this just keeps the Compose
      # up --wait gate from declaring the container unhealthy while
      # FastAPI's lifespan background thread is still warming the ML
      # model.
      start_period: 60s

  # news-creator suite — FastAPI Ollama-proxy service. The real backend
  # is Ollama on an RTX 4060 GPU; staging swaps it for a tiny FastAPI
  # stub that answers `/api/tags` with a fixed model list. That's
  # sufficient for OllamaGateway.list_models() (powering `/health`) and
  # for `/queue/status` (HybridPrioritySemaphore, no Ollama call).
  # Phase 2+ extends the stub with `/api/generate` & friends.
  news-creator-ollama-stub:
    build:
      context: ./news-creator-ollama-stub
    container_name: alt-staging-news-creator-ollama-stub
    profiles: [news-creator, acolyte-orchestrator]
    networks:
      - alt-staging
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:11435/api/tags').read()",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 2s

  news-creator:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-news-creator:${NEWS_CREATOR_IMAGE_TAG:-main}
    container_name: alt-staging-news-creator
    profiles: [news-creator]
    depends_on:
      news-creator-ollama-stub:
        condition: service_healthy
    environment:
      # NewsCreatorConfig refuses to boot without this; plain test value
      # — the staging stack runs unauthenticated and the secret is only
      # consumed by Pact publish helpers, not by request handlers.
      - SERVICE_SECRET=alt-staging-test-service-secret
      # Point the Ollama driver at the in-network stub.
      - LLM_SERVICE_URL=http://news-creator-ollama-stub:11435
      - LLM_MODEL=gemma3:4b-it-qat
      # Keep lifespan startup cheap: skip warm-up (would hit /api/generate
      # which the Phase-1 stub doesn't implement) and disable model
      # routing so a single fixed model name is used everywhere.
      - WARMUP_ENABLED=false
      - MODEL_ROUTING_ENABLED=false
      - MODEL_60K_ENABLED=false
      # No Redis cache wired in this slice — defaults to false anyway,
      # but make it explicit so the lifespan never tries to dial Redis.
      - CACHE_ENABLED=false
      # mTLS off, peer-identity unauthenticated. Matches mq-hub /
      # tag-generator / knowledge-sovereign staging conventions.
      - MTLS_ENFORCE=false
      - PEER_IDENTITY_TRUSTED=off
      # Disable OpenTelemetry — alt-staging has no collector and the
      # exporter would log connect-refused noise on every span.
      - OTEL_ENABLED=false
      - OTEL_SERVICE_NAME=news-creator-staging
      - LOG_LEVEL=info
      # Backpressure knobs — keep defaults for Phase 1 health/queue
      # checks; Phase 4 will override MAX_QUEUE_DEPTH at run time.
      - MAX_QUEUE_DEPTH=10
      - SCHEDULING_RT_RESERVED_SLOTS=1
    ports:
      - "11434:11434"
    networks:
      - alt-staging
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:11434/health').read()",
        ]
      interval: 3s
      timeout: 5s
      retries: 30
      # FastAPI lifespan initializes OllamaGateway (one /api/tags probe
      # against the stub). With warmup disabled this is sub-second, but
      # Python cold-start + uvicorn boot needs a few seconds of headroom.
      start_period: 15s

  # recap-worker suite — Postgres + Atlas migrator + multi-aliased
  # pipeline stub + recap-worker SUT. The stub stands in for
  # recap-subworker, news-creator, alt-backend, and tag-generator so
  # the full recap pipeline (POST /v1/generate/recaps/7days → row in
  # recap_outputs → GET /v1/recaps/7days) runs without GPU-bound deps.
  recap-db:
    # Production image (docker/postgres/Dockerfile.recap-db) bakes in
    # postgresql-18-cron — migration 20260101000000 needs it. Reuse the
    # same Dockerfile so staging schema parity holds with prod.
    build:
      context: ../docker/postgres
      dockerfile: Dockerfile.recap-db
    image: alt-staging/recap-db:local
    container_name: alt-staging-recap-db
    profiles: [recap-worker]
    # Plain env credentials — staging password is a committed test
    # fixture with no meaning outside the alt-staging network. Mirrors
    # the knowledge-sovereign-db pattern above.
    environment:
      POSTGRES_DB: recap
      POSTGRES_USER: recap
      POSTGRES_PASSWORD: alt-staging-test-recap-password
    # pg_cron requires `shared_preload_libraries=pg_cron` at server
    # boot. Staging doesn't bind-mount postgresql-recap.conf, so inline
    # the minimum flags as command args instead.
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=recap
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recap -d recap"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  recap-db-migrator:
    build:
      context: ../recap-migration-atlas
      dockerfile: docker/Dockerfile
    container_name: alt-staging-recap-db-migrator
    profiles: [recap-worker]
    command: ["apply"]
    environment:
      DATABASE_URL: postgres://recap:alt-staging-test-recap-password@recap-db:5432/recap?sslmode=disable&search_path=public
      ATLAS_REVISIONS_SCHEMA: "public"
    depends_on:
      recap-db:
        condition: service_healthy
    networks:
      - alt-staging
    restart: "no"

  recap-pipeline-stub:
    build:
      context: ../e2e/stubs/recap-pipeline-stub
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-recap-pipeline-stub:${RECAP_PIPELINE_STUB_IMAGE_TAG:-main}
    container_name: alt-staging-recap-pipeline-stub
    profiles: [recap-worker]
    networks:
      alt-staging:
        # recap-worker's clients are pointed at these hostnames via env
        # below. Network aliases let one container answer to all four,
        # so we don't ship four near-identical stub services. The
        # `rw-stub-` prefix keeps these aliases disjoint from the real
        # service names used by the other profiles (news-creator,
        # tag-generator, ...) so multiple staging profiles can be up on
        # alt-staging at the same time.
        aliases:
          - rw-stub-subworker
          - rw-stub-news-creator
          - rw-stub-alt-backend
          - rw-stub-tag-generator
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1/health').read()",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  recap-worker:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-recap-worker:${RECAP_WORKER_IMAGE_TAG:-main}
    container_name: alt-staging-recap-worker
    profiles: [recap-worker]
    # Staging-only startup diagnostic. The runtime container has been
    # SIGSEGV'ing (exit 139) during recap-worker init in e2e; the Dockerfile
    # already COPYs the full libtorch layout, so the remaining hypotheses are
    # dlopen resolution order and LD_LIBRARY_PATH. Print ldd, ldconfig, and
    # env before exec so the next CI run surfaces the real failing site,
    # then hand control to the normal entrypoint. Revert once the root
    # cause is fixed.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -x
        echo "--- ldd /usr/local/bin/recap-worker ---"
        ldd /usr/local/bin/recap-worker || true
        echo "--- ldconfig -p | grep -i torch ---"
        ldconfig -p | grep -i torch || true
        echo "--- ls /usr/local/lib/libtorch* (first 20) ---"
        ls /usr/local/lib/ | head -40 || true
        echo "--- env ---"
        env | sort
        echo "--- exec recap-worker ---"
        exec /usr/local/bin/recap-worker
    depends_on:
      recap-db:
        condition: service_healthy
      recap-db-migrator:
        condition: service_completed_successfully
      recap-pipeline-stub:
        condition: service_healthy
    environment:
      # Plaintext upstream URLs — mTLS is off in staging so the worker
      # talks HTTP/1.1 + JSON to every alias of recap-pipeline-stub on
      # port 80. ALT_BACKEND_BASE_URL drives Connect-RPC over JSON
      # (alt_backend.rs:64-78) which the stub serves at the FQSN path.
      - MTLS_ENFORCE=false
      - MTLS_LISTEN=false
      - PEER_IDENTITY_TRUSTED=off
      - RECAP_DB_HOST=recap-db
      - RECAP_DB_PORT=5432
      - RECAP_DB_USER=recap
      - RECAP_DB_NAME=recap
      - RECAP_DB_PASSWORD=alt-staging-test-recap-password
      - NEWS_CREATOR_BASE_URL=http://rw-stub-news-creator/
      - SUBWORKER_BASE_URL=http://rw-stub-subworker/
      - ALT_BACKEND_BASE_URL=http://rw-stub-alt-backend/
      - TAG_GENERATOR_BASE_URL=http://rw-stub-tag-generator/
      - HUGGING_FACE_TOKEN_PATH=/tmp/staging-hf-token-not-used
      - HF_HOME=/tmp/huggingface
      - TRANSFORMERS_CACHE=/tmp/huggingface/transformers
      - RECAP_GENRES=ai
      - RECAP_WORKER_HTTP_BIND=0.0.0.0:9005
      - PORT=9005
      - LOG_LEVEL=info
    ports:
      - "19005:9005"
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD", "/usr/local/bin/recap-worker", "healthcheck"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  # acolyte-orchestrator suite — Postgres + Atlas migrator + the
  # Starlette/Connect-RPC orchestrator. The migrator runs `atlas
  # migrate apply` once and exits; the orchestrator's
  # service_completed_successfully gate guarantees the schema is
  # present before uvicorn binds. mTLS is off and peer-identity is
  # unauthenticated, mirroring the news-creator / tag-generator
  # staging conventions. CHECKPOINT_ENABLED=false keeps the
  # langgraph-checkpoint-postgres schema out of scope for the CRUD
  # slice; the run-lifecycle scenarios stay tolerant of either
  # in-memory or DB-backed checkpointing.
  acolyte-db:
    image: postgres:16-alpine
    container_name: alt-staging-acolyte-db
    profiles: [acolyte-orchestrator]
    environment:
      POSTGRES_DB: acolyte
      POSTGRES_USER: acolyte
      POSTGRES_PASSWORD: alt-staging-test-acolyte-password
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acolyte -d acolyte"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  acolyte-db-migrator:
    build:
      context: ../acolyte-migration-atlas
      dockerfile: docker/Dockerfile
    container_name: alt-staging-acolyte-db-migrator
    profiles: [acolyte-orchestrator]
    command: ["apply"]
    environment:
      DATABASE_URL: postgres://acolyte:alt-staging-test-acolyte-password@acolyte-db:5432/acolyte?sslmode=disable&search_path=public
      ATLAS_REVISIONS_SCHEMA: "public"
    depends_on:
      acolyte-db:
        condition: service_healthy
    networks:
      - alt-staging
    restart: "no"

  acolyte-orchestrator:
    build:
      context: ../acolyte-orchestrator
      dockerfile: Dockerfile
    image: alt-staging/acolyte-orchestrator:local
    container_name: alt-staging-acolyte-orchestrator
    profiles: [acolyte-orchestrator]
    depends_on:
      acolyte-db:
        condition: service_healthy
      acolyte-db-migrator:
        condition: service_completed_successfully
    environment:
      - ACOLYTE_DB_DSN=postgresql://acolyte:alt-staging-test-acolyte-password@acolyte-db:5432/acolyte
      # Acolyte's OllamaGateway calls /api/generate and /api/chat
      # directly. The real news-creator FastAPI only exposes
      # /api/v1/summarize, so the only thing serving Ollama-shaped
      # endpoints inside alt-staging is the news-creator-ollama-stub on
      # :11435. Phase 2's run-lifecycle scenarios bring it up via the
      # acolyte-orchestrator profile activation; Phase 1's CRUD slice
      # never makes an LLM call, so the URL is unused there.
      - NEWS_CREATOR_URL=http://news-creator-ollama-stub:11435
      - SEARCH_INDEXER_URL=http://search-indexer:9300
      - LLM_PROVIDER=ollama
      - DEFAULT_MODEL=gemma4-e4b-12k
      - CHECKPOINT_ENABLED=false
      - LOG_LEVEL=info
      - MTLS_ENFORCE=false
      - PEER_IDENTITY_TRUSTED=off
    ports:
      - "18090:8090"
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  # alt-backend suite — Postgres + Atlas migrator + deps stub + alt-backend
  alt-backend-db:
    image: postgres:17-alpine
    container_name: alt-staging-alt-backend-db
    profiles: [alt-backend]
    # Plain env — staging password is a committed test fixture with no
    # meaning outside the ephemeral alt-staging network. Uses the
    # DB_USER/DB_NAME pair that alt-backend defaults to so the runtime
    # env block doesn't have to override them.
    environment:
      POSTGRES_DB: alt
      POSTGRES_USER: alt_db_user
      POSTGRES_PASSWORD: alt-staging-test-postgres-password
    volumes:
      # Postgres entrypoint runs every *.sh and *.sql in
      # /docker-entrypoint-initdb.d/ on first boot. This init script
      # creates every role the Atlas migrations GRANT to (tag_generator,
      # search_indexer_user, pre_processor_user, ...). Without it the
      # migrator dies on the first cross-service GRANT statement.
      - ../e2e/fixtures/alt-backend/db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alt_db_user -d alt"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  alt-backend-db-migrator:
    build:
      context: ../migrations-atlas
      dockerfile: docker/Dockerfile
    container_name: alt-staging-alt-backend-db-migrator
    profiles: [alt-backend]
    command: ["apply"]
    environment:
      DATABASE_URL: postgres://alt_db_user:alt-staging-test-postgres-password@alt-backend-db:5432/alt?sslmode=disable
      DB_HOST: alt-backend-db
      DB_PORT: "5432"
      DB_USER: alt_db_user
      DB_NAME: alt
      ATLAS_REVISIONS_SCHEMA: "public"
      MIGRATE_BASELINE_VERSION: "20240101000001"
    depends_on:
      alt-backend-db:
        condition: service_healthy
    networks:
      - alt-staging
    restart: "no"

  alt-backend-deps-stub:
    build:
      context: ../e2e/stubs/alt-backend-deps-stub
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-alt-backend-deps-stub:${ALT_BACKEND_DEPS_STUB_IMAGE_TAG:-main}
    container_name: alt-staging-alt-backend-deps-stub
    profiles: [alt-backend]
    # Network aliases let one container answer to all six upstream
    # hostnames + the synthetic `stub.invalid` that RSS registration
    # scenarios fetch. FastAPI routes by path, not Host header.
    networks:
      alt-staging:
        aliases:
          - search-indexer
          - pre-processor
          - recap-worker
          - rag-orchestrator
          - knowledge-sovereign
          - mq-hub
          - auth-hub
          - stub.invalid
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1/health').read()",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  alt-backend:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-alt-backend:${ALT_BACKEND_IMAGE_TAG:-main}
    build:
      context: ../alt-backend
      dockerfile: Dockerfile.backend
    container_name: alt-staging-alt-backend
    profiles: [alt-backend]
    depends_on:
      alt-backend-db:
        condition: service_healthy
      alt-backend-db-migrator:
        condition: service_completed_successfully
      alt-backend-deps-stub:
        condition: service_healthy
    environment:
      # Point alt-backend directly at the staging Postgres (no pgbouncer
      # in the staging slice) and at the deps stub for every upstream.
      - DB_HOST=alt-backend-db
      - DB_PORT=5432
      - DB_USER=alt_db_user
      - DB_PASSWORD=alt-staging-test-postgres-password
      - DB_NAME=alt
      - SERVER_PORT=9000
      # HS256 JWT validation. The secret is read from a file mounted
      # from e2e/fixtures/staging-secrets/ so the fixture is the single
      # source of truth for both compose and the pre-minted test JWT
      # under e2e/fixtures/alt-backend/test-jwt.txt.
      - BACKEND_TOKEN_SECRET_FILE=/run/secrets/alt_backend_token_secret
      - BACKEND_TOKEN_ISSUER=alt-staging-auth-hub
      - BACKEND_TOKEN_AUDIENCE=alt-backend
      # Upstream targets — every alias resolves to alt-backend-deps-stub.
      - SEARCH_INDEXER_CONNECT_URL=http://search-indexer/
      - PRE_PROCESSOR_URL=http://pre-processor/
      - PRE_PROCESSOR_CONNECT_URL=http://pre-processor/
      - RECAP_WORKER_URL=http://recap-worker/
      - RAG_ORCHESTRATOR_URL=http://rag-orchestrator/
      - RAG_ORCHESTRATOR_CONNECT_URL=http://rag-orchestrator/
      # auth-hub is only hit by the internal /system-user handler (not
      # exercised by the Hurl suite), but the alias keeps config parity
      # with prod and unblocks that handler if ever probed.
      - AUTH_HUB_URL=http://auth-hub/
      - MQHUB_CONNECT_URL=http://mq-hub/
      - MQHUB_ENABLED=false
      # SSRF allowlist — only stub.invalid is reachable and feed
      # registration needs to bypass the private-IP guard for it.
      - FEED_ALLOWED_HOSTS=stub.invalid
      # mTLS is off in staging; the Connect-RPC listener speaks plain
      # HTTP/1.1 on :9101.
      - MTLS_LISTEN=false
      - MTLS_ENFORCE=false
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      # Cap connection pool so the ephemeral Postgres isn't stressed.
      - DB_MAX_CONNS=10
      - DB_MIN_CONNS=2
    secrets:
      - alt_backend_token_secret
    ports:
      - "19000:9000"
      - "19101:9101"
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9000/v1/health"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  # auth-hub suite — kratos-db Postgres + Kratos migrator + Kratos + auth-hub.
  # auth-hub is stateless; the "real DB" kept under test is kratos-db, which
  # Kratos owns entirely. No PgBouncer in the staging slice (one fewer
  # cold-start surface without changing what we're testing).
  auth-hub-db:
    image: postgres:16-alpine
    container_name: alt-staging-auth-hub-db
    profiles: [auth-hub]
    environment:
      POSTGRES_DB: kratos
      POSTGRES_USER: kratos_user
      POSTGRES_PASSWORD: alt-staging-test-kratos-password
    volumes:
      # ADR-000781 parity. Kratos owns its own schema so no extra roles
      # are required today, but the hook stays mounted so future seed SQL
      # can land without a compose edit.
      - ../e2e/fixtures/auth-hub/db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kratos_user -d kratos"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  auth-hub-db-migrator:
    image: oryd/kratos:v1.3.0
    container_name: alt-staging-auth-hub-db-migrator
    profiles: [auth-hub]
    # Reuse the prod Kratos entrypoint so ${KRATOS_COOKIE_SECRET} and
    # ${KRATOS_CIPHER_SECRET} in kratos.yml are substituted from the
    # mounted secret files before `kratos migrate` starts. Kratos
    # refuses to boot (even for migrate) with empty cookie/cipher
    # secrets, so the migrator needs them too.
    entrypoint: ["/entrypoint.sh"]
    command:
      ["kratos", "migrate", "sql", "-e", "--yes", "--config", "/etc/config/kratos/kratos.yml"]
    environment:
      - KRATOS_DB_USER=kratos_user
      - KRATOS_DB_PASSWORD=alt-staging-test-kratos-password
      - KRATOS_DB_HOST=auth-hub-db
      - KRATOS_DB_PORT=5432
      - KRATOS_DB_NAME=kratos
      - KRATOS_DB_SSLMODE=disable
      # The reused kratos/entrypoint.sh reads /run/secrets/kratos_cookie_secret
      # and /run/secrets/kratos_cipher_secret (prod names) and sed-substitutes
      # them into the YAML. The compose `secrets:` keys below preserve those
      # filenames while still pointing at the auth-hub-scoped fixture files.
      - KRATOS_COOKIE_SECRET_FILE=/run/secrets/kratos_cookie_secret
      - KRATOS_CIPHER_SECRET_FILE=/run/secrets/kratos_cipher_secret
    secrets:
      - kratos_cookie_secret
      - kratos_cipher_secret
    volumes:
      - ../e2e/fixtures/auth-hub/kratos:/etc/config/kratos:ro
      - ../kratos/entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      auth-hub-db:
        condition: service_healthy
    networks:
      - alt-staging
    restart: "no"

  kratos:
    image: oryd/kratos:v1.3.0
    container_name: alt-staging-kratos
    profiles: [auth-hub]
    # `--dev` relaxes the HTTPS requirement on self-service flows so
    # the api-flow login in 00-setup can run against http://kratos:4433
    # inside the internal staging network. Prod never runs --dev.
    entrypoint: ["/entrypoint.sh"]
    command:
      ["kratos", "serve", "all", "--dev", "--config", "/etc/config/kratos/kratos.yml"]
    environment:
      - KRATOS_DB_USER=kratos_user
      - KRATOS_DB_PASSWORD=alt-staging-test-kratos-password
      - KRATOS_DB_HOST=auth-hub-db
      - KRATOS_DB_PORT=5432
      - KRATOS_DB_NAME=kratos
      - KRATOS_DB_SSLMODE=disable
      - KRATOS_COOKIE_SECRET_FILE=/run/secrets/kratos_cookie_secret
      - KRATOS_CIPHER_SECRET_FILE=/run/secrets/kratos_cipher_secret
    secrets:
      - kratos_cookie_secret
      - kratos_cipher_secret
    volumes:
      - ../e2e/fixtures/auth-hub/kratos:/etc/config/kratos:ro
      - ../kratos/entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      auth-hub-db-migrator:
        condition: service_completed_successfully
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:4434/admin/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  auth-hub:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-auth-hub:${AUTH_HUB_IMAGE_TAG:-main}
    build:
      context: ../auth-hub
      dockerfile: Dockerfile
    container_name: alt-staging-auth-hub
    profiles: [auth-hub]
    depends_on:
      kratos:
        condition: service_healthy
    environment:
      - KRATOS_URL=http://kratos:4433
      - KRATOS_ADMIN_URL=http://kratos:4434
      - PORT=8888
      - CACHE_TTL=5m
      - BACKEND_TOKEN_ISSUER=auth-hub
      - BACKEND_TOKEN_AUDIENCE=alt-backend
      - BACKEND_TOKEN_TTL=5m
      # config.getEnv() resolves *_FILE -> file content. The HS256 secret
      # is shared with alt-backend so the JWT auth-hub issues is
      # verifiable by anyone already trusting alt_backend_token_secret.
      - BACKEND_TOKEN_SECRET_FILE=/run/secrets/alt_backend_token_secret
      - CSRF_SECRET_FILE=/run/secrets/auth_hub_csrf_secret
      - MTLS_LISTEN=false
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    secrets:
      - alt_backend_token_secret
      - auth_hub_csrf_secret
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD", "/auth-hub", "healthcheck"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

networks:
  alt-staging:
    name: alt-staging
    driver: bridge
    # `internal: true` blocks container egress to the Internet while still
    # permitting intra-stack + host-port traffic. Docker daemon-driven
    # image pulls happen outside this network so they're unaffected.
    internal: true

secrets:
  meili_master_key:
    file: ../e2e/fixtures/staging-secrets/meili_master_key.txt
  alt_backend_token_secret:
    file: ../e2e/fixtures/staging-secrets/alt_backend_token_secret.txt
  auth_hub_csrf_secret:
    file: ../e2e/fixtures/staging-secrets/auth_hub_csrf_secret.txt
  # Mounted as /run/secrets/kratos_cookie_secret so the reused
  # kratos/entrypoint.sh picks them up unmodified. The underlying
  # fixture files are auth-hub-scoped to keep ownership clear.
  kratos_cookie_secret:
    file: ../e2e/fixtures/staging-secrets/auth_hub_kratos_cookie_secret.txt
  kratos_cipher_secret:
    file: ../e2e/fixtures/staging-secrets/auth_hub_kratos_cipher_secret.txt
