# compose/compose.staging.yaml
#
# Ephemeral E2E staging stack — brought up per run of the Hurl suite and
# torn down at the end. Project name `alt-staging` keeps it isolated from
# any prod compose stack that may be running on the same host.
#
# Services are tagged with Compose profiles so each Hurl suite brings up
# only its own dependencies:
#   search-indexer suite  → profile `search-indexer`
#     meilisearch, stub-backend, search-indexer
#   mq-hub suite          → profile `mq-hub`
#     redis-streams, mq-hub
# Bring a suite up with:
#   docker compose -f compose.staging.yaml --profile <suite> -p alt-staging up -d --wait
# Services with NO profile are never auto-started (Compose default).
#
# Every secret in this stack is a test fixture committed under
# e2e/fixtures/staging-secrets/ — never reuse these values anywhere else.

name: alt-staging

services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: alt-staging-meilisearch
    profiles: [search-indexer]
    environment:
      MEILI_MASTER_KEY: alt-staging-test-master-key
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "17700:7700"
    networks:
      - alt-staging
    healthcheck:
      # Meilisearch binds IPv4 only (0.0.0.0:7700). On hosts where the
      # runtime resolves `localhost` to ::1 first, wget against localhost
      # gets "connection refused" and the container is marked unhealthy
      # forever. Always use 127.0.0.1 for intra-container loopback probes.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:7700/health | grep -q available"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  stub-backend:
    # Nginx returning 200 to every request — search-indexer only probes
    # BACKEND_API_URL for reachability at startup, it doesn't validate the body.
    image: nginx:1.27-alpine
    container_name: alt-staging-stub-backend
    profiles: [search-indexer]
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 2s

  search-indexer:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-search-indexer:${IMAGE_TAG:-main}
    container_name: alt-staging-search-indexer
    profiles: [search-indexer]
    depends_on:
      meilisearch:
        condition: service_healthy
      stub-backend:
        condition: service_healthy
    environment:
      - MTLS_LISTEN=false
      - MTLS_ENFORCE=false
      - BACKEND_API_URL=http://stub-backend
      - BACKEND_API_MTLS_URL=http://stub-backend
      - BACKEND_MTLS_SERVER_NAME=stub-backend
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_API_KEY_FILE=/run/secrets/meili_master_key
      - MEILISEARCH_SEARCH_API_KEY_FILE=/run/secrets/meili_master_key
      - MEILI_MASTER_KEY_FILE=/run/secrets/meili_master_key
      - CONSUMER_ENABLED=false
      - REDIS_STREAMS_URL=redis://stub-backend:6379
      - RECAP_WORKER_URL=http://stub-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://stub-backend:4318
      - OTEL_SERVICE_NAME=search-indexer-staging
      - LOG_LEVEL=info
    ports:
      - "19300:9300"
    networks:
      - alt-staging
    secrets:
      - meili_master_key
    healthcheck:
      test: ["CMD", "/search-indexer", "healthcheck"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  # mq-hub suite — Redis Streams + mq-hub broker
  redis-streams:
    image: redis:8.4-alpine
    container_name: alt-staging-redis-streams
    profiles: [mq-hub]
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly no
      --save ""
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 2s

  mq-hub:
    image: ghcr.io/${GHCR_OWNER:-kaikei-e}/alt-mq-hub:${IMAGE_TAG:-main}
    container_name: alt-staging-mq-hub
    profiles: [mq-hub]
    depends_on:
      redis-streams:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis-streams:6379
      - CONNECT_PORT=9500
      - LOG_LEVEL=info
      - REDIS_POOL_SIZE=20
      - STREAM_MAX_LEN=10000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://redis-streams:4318
      - OTEL_SERVICE_NAME=mq-hub-staging
    ports:
      - "19500:9500"
    networks:
      - alt-staging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9500/health"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

networks:
  alt-staging:
    name: alt-staging
    driver: bridge
    # `internal: true` blocks container egress to the Internet while still
    # permitting intra-stack + host-port traffic. Docker daemon-driven
    # image pulls happen outside this network so they're unaffected.
    internal: true

secrets:
  meili_master_key:
    file: ../e2e/fixtures/staging-secrets/meili_master_key.txt
