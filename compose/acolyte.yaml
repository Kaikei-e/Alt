# compose/acolyte.yaml - Acolyte report generation orchestrator
# acolyte-db: dedicated PostgreSQL for report versioning tables
# acolyte-db-migrator: Atlas migration runner
# acolyte-orchestrator: Python service (Starlette + Connect-RPC + LangGraph)

include:
  - base.yaml
  - pki.yaml

x-tls-cert-sidecar: &tls-cert-sidecar
  image: smallstep/step-ca:0.27.5
  user: "0:0"
  secrets:
    - step_ca_root_password
  networks:
    - alt-network
  labels:
    - rask.group=pki
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  acolyte-orchestrator-cert-init:
    <<: *tls-cert-sidecar
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -e
        if [ -f /certs/svc-cert.pem ]; then
          exit 0
        fi
        TOKEN=$$(step ca token "acolyte-orchestrator" \
          --san acolyte-orchestrator --san localhost \
          --ca-url https://step-ca:9000 \
          --root /trust/ca-bundle.pem \
          --provisioner bootstrap \
          --password-file /run/secrets/step_ca_root_password 2>/dev/null)
        step ca certificate "acolyte-orchestrator" /certs/svc-cert.pem /certs/svc-key.pem \
          --ca-url https://step-ca:9000 \
          --root /trust/ca-bundle.pem \
          --token "$$TOKEN" --force
        chown 65532:65532 /certs /certs/svc-cert.pem /certs/svc-key.pem
        chmod 0444 /certs/svc-cert.pem
        chmod 0400 /certs/svc-key.pem
    volumes:
      - acolyte_orchestrator_certs:/certs
      - pki_trust_bundle:/trust:ro
    depends_on:
      step-ca-bootstrap:
        condition: service_completed_successfully

  acolyte-orchestrator-cert-renewer:
    <<: *tls-cert-sidecar
    restart: unless-stopped
    entrypoint:
      - step
    command:
      - ca
      - renew
      - --ca-url=https://step-ca:9000
      - --root=/trust/ca-bundle.pem
      - --daemon
      - --expires-in=8h
      - /certs/svc-cert.pem
      - /certs/svc-key.pem
    volumes:
      - acolyte_orchestrator_certs:/certs
      - pki_trust_bundle:/trust:ro
    depends_on:
      acolyte-orchestrator-cert-init:
        condition: service_completed_successfully

  acolyte-orchestrator-tls-sidecar:
    image: nginx:1.27-alpine
    restart: unless-stopped
    network_mode: "service:acolyte-orchestrator"
    environment:
      UPSTREAM_PORT: "8090"
      VERIFY_CLIENT: ${ACOLYTE_ORCHESTRATOR_VERIFY_CLIENT:-off}
    volumes:
      - ../docker/nginx-tls-sidecar/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ../docker/nginx-tls-sidecar/entrypoint.sh:/entrypoint.sh:ro
      - acolyte_orchestrator_certs:/certs:ro
      - pki_trust_bundle:/trust:ro
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      acolyte-orchestrator:
        condition: service_healthy
      acolyte-orchestrator-cert-init:
        condition: service_completed_successfully
    labels:
      - rask.group=acolyte-orchestrator
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  acolyte-db:
    image: postgres:18-alpine
    container_name: acolyte-db
    mem_limit: 192m
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: ${ACOLYTE_DB_NAME:-acolyte}
      POSTGRES_USER: ${ACOLYTE_DB_USER:-acolyte_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/acolyte_db_password
    secrets:
      - acolyte_db_password
    volumes:
      - acolyte_db_data:/var/lib/postgresql
    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U ${ACOLYTE_DB_USER:-acolyte_user} -d ${ACOLYTE_DB_NAME:-acolyte}",
      ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - alt-network
    restart: unless-stopped
    labels:
      - rask.group=acolyte-db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  acolyte-db-migrator:
    build:
      context: ../acolyte-migration-atlas
      dockerfile: docker/Dockerfile
    container_name: acolyte-db-migrator
    command: ["apply"]
    environment:
      - ACOLYTE_DB_HOST=acolyte-db
      - ACOLYTE_DB_PORT=5432
      - ACOLYTE_DB_USER=${ACOLYTE_DB_USER:-acolyte_user}
      - ACOLYTE_DB_NAME=${ACOLYTE_DB_NAME:-acolyte}
      - ACOLYTE_DB_PASSWORD_FILE=/run/secrets/acolyte_db_password
    secrets:
      - acolyte_db_password
    depends_on:
      acolyte-db:
        condition: service_healthy
    networks:
      - alt-network
    restart: "no"
    labels:
      - rask.group=acolyte-db-migrator

  acolyte-orchestrator:
    container_name: acolyte-orchestrator
    mem_limit: 256m
    build:
      context: ../acolyte-orchestrator
      dockerfile: Dockerfile
    environment:
      - ACOLYTE_DB_DSN=postgresql://${ACOLYTE_DB_USER:-acolyte_user}:placeholder@acolyte-db:5432/${ACOLYTE_DB_NAME:-acolyte}
      - ACOLYTE_DB_PASSWORD_FILE=/run/secrets/acolyte_db_password
      # LLM inference: override ACOLYTE_LLM_URL in .env to route to remote host (e.g. AIX)
      - NEWS_CREATOR_URL=${ACOLYTE_LLM_URL:-http://news-creator:11434}
      - LLM_PROVIDER=${ACOLYTE_LLM_PROVIDER:-ollama}
      - VLLM_API_KEY=${ACOLYTE_VLLM_API_KEY:-}
      - SEARCH_INDEXER_URL=${ACOLYTE_SEARCH_URL:-http://search-indexer:9300}
      - DEFAULT_MODEL=${ACOLYTE_MODEL:-gemma4-e4b-12k}
      - SERVICE_TOKEN_FILE=/run/secrets/service_secret
      - LOG_LEVEL=info
      - CHECKPOINT_ENABLED=true
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://rask-log-aggregator:4318
      - OTEL_SERVICE_NAME=acolyte-orchestrator
    secrets:
      - service_secret
      - acolyte_db_password
    extra_hosts:
      - "llm-external:${ACOLYTE_LLM_HOST:-127.0.0.1}"
    ports:
      - "8090:8090"
    networks:
      - alt-network
    depends_on:
      acolyte-db:
        condition: service_healthy
      acolyte-db-migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    labels:
      - rask.group=acolyte-orchestrator
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  acolyte_db_data:
