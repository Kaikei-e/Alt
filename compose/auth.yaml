# compose/auth.yaml - Authentication services
# Kratos identity server and auth-hub

include:
  - base.yaml
  - pki.yaml

x-tls-cert-sidecar: &tls-cert-sidecar
  image: smallstep/step-ca:0.27.5
  user: "0:0"
  secrets:
    - step_ca_root_password
  networks:
    - alt-network
  labels:
    - rask.group=pki
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  auth-hub-cert-init:
    <<: *tls-cert-sidecar
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -e
        if [ -f /certs/svc-cert.pem ]; then
          echo "auth-hub-cert-init: cert already present, skipping"
          exit 0
        fi
        TOKEN=$$(step ca token "auth-hub" \
          --san auth-hub --san localhost \
          --ca-url https://step-ca:9000 \
          --root /trust/ca-bundle.pem \
          --provisioner bootstrap \
          --password-file /run/secrets/step_ca_root_password 2>/dev/null)
        step ca certificate "auth-hub" /certs/svc-cert.pem /certs/svc-key.pem \
          --ca-url https://step-ca:9000 \
          --root /trust/ca-bundle.pem \
          --token "$$TOKEN" --force
        chown 65532:65532 /certs /certs/svc-cert.pem /certs/svc-key.pem
        chmod 0444 /certs/svc-cert.pem
        chmod 0400 /certs/svc-key.pem
        echo "auth-hub-cert-init: cert issued"
    volumes:
      - auth_hub_certs:/certs
      - pki_trust_bundle:/trust:ro
    depends_on:
      step-ca-bootstrap:
        condition: service_completed_successfully

  auth-hub-cert-renewer:
    <<: *tls-cert-sidecar
    restart: unless-stopped
    entrypoint:
      - step
    command:
      - ca
      - renew
      - --ca-url=https://step-ca:9000
      - --root=/trust/ca-bundle.pem
      - --daemon
      - --expires-in=8h
      - /certs/svc-cert.pem
      - /certs/svc-key.pem
    volumes:
      - auth_hub_certs:/certs
      - pki_trust_bundle:/trust:ro
    depends_on:
      auth-hub-cert-init:
        condition: service_completed_successfully

  kratos-db:
    image: postgres:16-alpine
    restart: always
    mem_limit: 128m
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_DB: ${KRATOS_DB_NAME:-kratos}
      POSTGRES_USER: ${KRATOS_DB_USER:-kratos_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/kratos_db_password
    secrets:
      - kratos_db_password
    volumes:
      - kratos_db_data:/var/lib/postgresql/data
      - ../kratos-db/init:/docker-entrypoint-initdb.d:rw
      - ../docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ../docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KRATOS_DB_USER:-kratos_user} -d ${KRATOS_DB_NAME:-kratos}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - alt-network
    tty: true
    labels:
      - rask.group=kratos-db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kratos-migrate:
    image: oryd/kratos:v1.3.0
    command: ["kratos", "migrate", "sql", "-e", "--yes", "--config", "/etc/config/kratos/kratos.yml"]
    environment:
      - KRATOS_DB_USER=${KRATOS_DB_USER:-kratos_user}
      - KRATOS_DB_PASSWORD_FILE=/run/secrets/kratos_db_password
      # マイグレーションはPgBouncerをバイパスし直接DBに接続（DDL/session-level lock必要）
      - KRATOS_DB_HOST=kratos-db
      - KRATOS_DB_PORT=5432
      - KRATOS_DB_NAME=${KRATOS_DB_NAME:-kratos}
      - KRATOS_DB_SSLMODE=${KRATOS_DB_SSLMODE:-disable}
    secrets:
      - kratos_db_password
    volumes:
      - ../kratos:/etc/config/kratos:ro
      - ../kratos/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      kratos-db:
        condition: service_healthy
    restart: "no"
    networks:
      - alt-network

  kratos:
    image: oryd/kratos:v1.3.0
    mem_limit: 128m
    command: ["kratos", "serve", "all", "--config", "/etc/config/kratos/kratos.yml"]
    ports:
      - "4433:4433"
    environment:
      - KRATOS_DB_USER=${KRATOS_DB_USER:-kratos_user}
      - KRATOS_DB_PASSWORD_FILE=/run/secrets/kratos_db_password
      - KRATOS_DB_HOST=pgbouncer-kratos
      - KRATOS_DB_PORT=6432
      - KRATOS_DB_NAME=${KRATOS_DB_NAME:-kratos}
      - KRATOS_DB_SSLMODE=${KRATOS_DB_SSLMODE:-disable}
      - KRATOS_PUBLIC_URL=${KRATOS_PUBLIC_URL:-http://localhost/ory}
      - KRATOS_ADMIN_URL=${KRATOS_ADMIN_URL:-http://kratos-admin:4434/}
      - KRATOS_CORS_ALLOWED_ORIGIN_1=${KRATOS_CORS_ALLOWED_ORIGIN_1:-http://localhost:4173}
      - KRATOS_CORS_ALLOWED_ORIGIN_2=${KRATOS_CORS_ALLOWED_ORIGIN_2:-http://localhost}
      - KRATOS_DEFAULT_BROWSER_RETURN_URL=${KRATOS_DEFAULT_BROWSER_RETURN_URL:-http://localhost:4173/sv/}
      - KRATOS_ALLOWED_RETURN_URL_1=${KRATOS_ALLOWED_RETURN_URL_1:-http://localhost:4173/sv/}
      - KRATOS_ALLOWED_RETURN_URL_2=${KRATOS_ALLOWED_RETURN_URL_2:-http://localhost:4173/sv/home}
      - KRATOS_ALLOWED_RETURN_URL_3=${KRATOS_ALLOWED_RETURN_URL_3:-http://localhost:4173/sv/auth/login}
      - KRATOS_LOGIN_UI_URL=${KRATOS_LOGIN_UI_URL:-http://localhost:4173/sv/auth/login}
      - KRATOS_REGISTRATION_UI_URL=${KRATOS_REGISTRATION_UI_URL:-http://localhost:4173/sv/register}
      - KRATOS_ERROR_UI_URL=${KRATOS_ERROR_UI_URL:-http://localhost:4173/sv/error}
      - KRATOS_SETTINGS_UI_URL=${KRATOS_SETTINGS_UI_URL:-http://localhost:4173/sv/settings}
      - KRATOS_RECOVERY_UI_URL=${KRATOS_RECOVERY_UI_URL:-http://localhost:4173/sv/recovery}
      - KRATOS_VERIFICATION_UI_URL=${KRATOS_VERIFICATION_UI_URL:-http://localhost:4173/sv/verification}
      - KRATOS_COOKIE_SECRET_FILE=/run/secrets/kratos_cookie_secret
      - KRATOS_CIPHER_SECRET_FILE=/run/secrets/kratos_cipher_secret
    secrets:
      - kratos_db_password
      - kratos_cookie_secret
      - kratos_cipher_secret
    volumes:
      - ../kratos:/etc/config/kratos:ro
      - ../kratos/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      pgbouncer-kratos:
        condition: service_healthy
      kratos-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:4434/admin/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - alt-network

  auth-hub:
    build:
      context: ../auth-hub
      dockerfile: Dockerfile
    environment:
      - KRATOS_URL=http://kratos:4433
      - KRATOS_ADMIN_URL=http://kratos:4434
      - PORT=8888
      - CACHE_TTL=5m
      - CSRF_SECRET_FILE=/run/secrets/csrf_secret
      - BACKEND_TOKEN_SECRET_FILE=/run/secrets/backend_token_secret
      - BACKEND_TOKEN_ISSUER=auth-hub
      - BACKEND_TOKEN_AUDIENCE=alt-backend
      - BACKEND_TOKEN_TTL=5m
      - MTLS_LISTEN=${MTLS_LISTEN:-true}
      - MTLS_PORT=9443
      - MTLS_CERT_FILE=/certs/svc-cert.pem
      - MTLS_KEY_FILE=/certs/svc-key.pem
      - MTLS_CA_FILE=/trust/ca-bundle.pem
      - MTLS_CLIENT_AUTH=${AUTH_HUB_MTLS_CLIENT_AUTH:-}
      - MTLS_ALLOWED_PEERS=${AUTH_HUB_MTLS_ALLOWED_PEERS:-}
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://rask-log-aggregator:4318
      - OTEL_SERVICE_NAME=auth-hub
    secrets:
      - csrf_secret
      - backend_token_secret
    volumes:
      - auth_hub_certs:/certs:ro
      - pki_trust_bundle:/trust:ro
    depends_on:
      kratos:
        condition: service_healthy
      auth-hub-cert-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/auth-hub", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - alt-network
    deploy:
      resources:
        reservations:
          memory: 64M
    labels:
      - rask.group=alt-auth
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
