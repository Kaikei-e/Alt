syntax = "proto3";

package services.search.v2;

option go_package = "search-indexer/gen/proto/services/search/v2;searchv2";

// =============================================================================
// Search Articles Messages
// =============================================================================

// SearchArticlesRequest is the request for searching articles
message SearchArticlesRequest {
  // Search query string (required)
  string query = 1;
  // User ID for filtering results (required)
  string user_id = 2;
  // Maximum number of results to return (default: 20, max: 100)
  int32 limit = 3;
  // Offset for pagination (default: 0)
  int32 offset = 4;
}

// SearchHit represents a single search result
message SearchHit {
  // Article ID
  string id = 1;
  // Article title
  string title = 2;
  // Article content snippet
  string content = 3;
  // Tags associated with the article
  repeated string tags = 4;
}

// SearchArticlesResponse contains search results
message SearchArticlesResponse {
  // Original search query
  string query = 1;
  // Search results
  repeated SearchHit hits = 2;
  // Estimated total number of hits (from Meilisearch)
  int64 estimated_total_hits = 3;
}

// =============================================================================
// SearchService Definition
// =============================================================================

// SearchService provides article search operations
service SearchService {
  // SearchArticles searches for articles matching the query
  rpc SearchArticles(SearchArticlesRequest) returns (SearchArticlesResponse);

  // SearchRecaps searches recap genres by tag name via Meilisearch
  // Used by Tag Verse to show historical recaps for a specific tag
  rpc SearchRecaps(SearchRecapsRequest) returns (SearchRecapsResponse);
}

// =============================================================================
// Search Recaps Messages
// =============================================================================

// SearchRecapsRequest is the request for searching recap genres by tag or free text.
message SearchRecapsRequest {
  // Tag name to search for in recap top_terms (legacy, use query for free-text)
  string tag_name = 1;
  // Maximum number of results to return (default: 50, max: 200)
  int32 limit = 2;
  // Free-text search query (when set, takes precedence over tag_name)
  optional string query = 3;
}

// RecapSearchHit represents a matched recap genre
message RecapSearchHit {
  // Composite document ID (job_id__genre)
  string id = 1;
  // Recap job ID
  string job_id = 2;
  // Execution timestamp (RFC3339)
  string executed_at = 3;
  // Window days (3 or 7)
  int32 window_days = 4;
  // Genre name
  string genre = 5;
  // Summary text
  string summary = 6;
  // Top terms/keywords from the matching cluster
  repeated string top_terms = 7;
  // Bullet points extracted from the summary
  repeated string bullets = 8;
  // Semantic tags from tag-generator (KeyBERT)
  repeated string tags = 9;
}

// SearchRecapsResponse contains matching recap genres
message SearchRecapsResponse {
  // Matching recap genres sorted by relevance
  repeated RecapSearchHit hits = 1;
  // Estimated total number of matching documents
  int64 estimated_total_hits = 2;
}
