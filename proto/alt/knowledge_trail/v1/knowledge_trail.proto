syntax = "proto3";

package alt.knowledge_trail.v1;

option go_package = "alt/gen/proto/alt/knowledge_trail/v1;knowledgetrailv1";

// KnowledgeTrailService is the front-facing API for the Knowledge Trail —
// the user's cognitive trail (footprints) with system-proposed branches.
// It currently exposes the read-only footprint spine; branch proposal and
// resolution are separate RPCs.
service KnowledgeTrailService {
  // GetTrail returns the user's footprint spine in reverse-chronological order.
  rpc GetTrail(GetTrailRequest) returns (GetTrailResponse);
  // ResolveBranch records the user's response to a proposed branch (taken or
  // dismissed). Idempotent via a client-supplied UUIDv7. Taking a branch closes
  // the loop: the resolution drops the branch from the open set and the user's
  // engagement with the target re-surfaces as a footprint (return-diff).
  rpc ResolveBranch(ResolveBranchRequest) returns (ResolveBranchResponse);
  // EmitTrailOutcome records the observed consequence of a taken branch: the
  // raw visible dwell on the article the branch opened. Raw measurement only —
  // engagement classification is a projector-side derivation, never baked into
  // the emitted fact. One outcome per branch (first write wins server-side),
  // so retries need no client-minted id.
  rpc EmitTrailOutcome(EmitTrailOutcomeRequest) returns (EmitTrailOutcomeResponse);
  // SearchTrail is the trail's single rediscovery instrument (D25): full-text
  // search over what the user has actually read (title/content/tags via the
  // article index, intersected with the user's spine). Hits come back as their
  // containing episodes so every result keeps its time context.
  rpc SearchTrail(SearchTrailRequest) returns (SearchTrailResponse);
  // GetItemBranches returns the open branches anchored on one item — the
  // patch-exit surface (D26): the article page shows at most 1-2 proposals
  // anchored on the article the user just finished reading.
  rpc GetItemBranches(GetItemBranchesRequest) returns (GetItemBranchesResponse);
}

message GetItemBranchesRequest {
  // item_key of the anchor (e.g. "article:<id>" — the article just read).
  string item_key = 1;
  int32 limit = 2;
}

message GetItemBranchesResponse {
  repeated Branch branches = 1;
}

message SearchTrailRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchTrailResponse {
  // episodes containing at least one matching item, newest first.
  repeated Episode episodes = 1;
  // matched_item_keys marks which member items matched, so the UI can
  // highlight the hit inside its episode.
  repeated string matched_item_keys = 2;
}

message EmitTrailOutcomeRequest {
  // branch_key of the taken branch this outcome observes.
  string branch_key = 1;
  // item_key of the article the branch opened (e.g. "article:<id>").
  string item_key = 2;
  // dwell_ms is the raw visible-time in milliseconds (Page Visibility aware).
  int64 dwell_ms = 3;
}

message EmitTrailOutcomeResponse {
  bool ok = 1;
}

message ResolveBranchRequest {
  string branch_key = 1;
  // resolution: "taken" | "dismissed".
  string resolution = 2;
  // client_resolution_id is a UUIDv7 the caller mints so retries are idempotent.
  string client_resolution_id = 3;
  // dismiss_reason is the optional one-tap scrutability signal (D28), e.g.
  // "not_following_topic" | "already_known" | "wrong_relation". Only
  // meaningful with resolution "dismissed"; recorded on the resolution event
  // for planner learning, never required.
  string dismiss_reason = 4;
}

message ResolveBranchResponse {
  bool ok = 1;
}

message GetTrailRequest {
  optional string cursor = 1;
  int32 limit = 2;
  // filter_tags applies the theme lens: only footprints whose item carries one
  // of these tags are returned. Empty means the full spine.
  repeated string filter_tags = 3;
}

message GetTrailResponse {
  // footprints is the legacy flat spine. Superseded by episodes; empty once
  // the episode spine ships.
  repeated Footprint footprints = 1;
  string next_cursor = 2;
  bool has_more = 3;
  string generated_at = 4;
  // branches are the open, system-proposed next steps anchored on the spine.
  repeated Branch branches = 5;
  // episodes are the spine's default display unit (D24): footprints folded by
  // same-article identity and cleaned-tag chaining. Cursor/limit page over
  // episodes, newest (by latest contact) first.
  repeated Episode episodes = 6;
}

// Episode is one derived "line of inquiry": a group of collapsed footprints
// linked by same-article contacts and cleaned-tag overlap (D30). It is a pure
// derivation over the spine — never a stored entity, never a second spine.
// Header facts (title, date range, contact summary) derive from footprints:
// the representative is the newest footprint.
message Episode {
  // episode_key is deterministic for a given spine state (derivation output,
  // not identity — it may change as new contacts join the episode).
  string episode_key = 1;
  // wear is the deepest path-wear band among member items.
  string wear = 2;
  // thumbnail_url is the representative article's preview image ("" when
  // unavailable; display falls back to text per the visual-preview contract).
  string thumbnail_url = 3;
  // footprints are the member rows, newest first (collapsed per D24).
  repeated Footprint footprints = 4;
}

// Branch is a system-proposed next step on the trail. It ALWAYS carries the
// four-tuple — relation_kind, why, evidence_refs, confidence — or it is not
// surfaced. Untyped branches (the Loop "decorated feed" failure) are forbidden.
message Branch {
  string branch_key = 1;
  // anchor_item_key is the footprint/item this branch forks from.
  string anchor_item_key = 2;
  // relation_kind: "continuation" | "cluster" | "contradiction" | "inquiry".
  string relation_kind = 3;
  // why is the plain-English reason this is surfaced now.
  string why = 4;
  repeated TrailEvidenceRef evidence_refs = 5;
  // confidence: calibrated band "speculative" | "plausible" | "corroborated".
  string confidence = 6;
  // target_item_key is what taking the branch opens.
  string target_item_key = 7;
  string target_title = 8;
}

message TrailEvidenceRef {
  string ref_id = 1;
  string label = 2;
  // kind: "article" | "summary" | "tag" | "version".
  string kind = 3;
}

// Footprint is one user cognitive act on the trail spine. It is a pure
// projection of the event log; the system never authors a footprint.
message Footprint {
  string footprint_key = 1;
  // verb is the user-facing action: "read" | "asked" | "returned" | "listened" | "dismissed".
  string verb = 2;
  string item_key = 3;
  string title = 4;
  string excerpt = 5;
  repeated string tags = 6;
  // note is a derived hint (e.g. "2nd visit"), never a stage label.
  string note = 7;
  // occurred_at is the event-time of the act (RFC3339). For a collapsed
  // footprint this is the LATEST contact.
  string occurred_at = 8;
  // wear is the derived path-wear band: "thin" | "worn" | "deep". Never a number.
  string wear = 9;
  // contact_count is how many acts of this verb on this item are collapsed
  // into this row (>= 1). Repeated reads never add spine rows (D24).
  int32 contact_count = 10;
  // first_occurred_at is the event-time of the EARLIEST collapsed contact
  // (RFC3339). Equal to occurred_at when contact_count is 1.
  string first_occurred_at = 11;
}
