syntax = "proto3";

package alt.knowledge.loop.v1;

option go_package = "alt/gen/proto/alt/knowledge/loop/v1;knowledgeloopv1";

import "google/protobuf/timestamp.proto";

// KnowledgeLoopService is the read and transition API for the Knowledge Loop state-machine UI.
// The Loop is a new read model layered on top of knowledge_events; it is not a new source of truth.
// Invariants (see docs/plan/knowledge-loop-canonical-contract.md and ADR-000831):
//   - Business-fact timestamps derive from event.occurred_at; wall-clock is never exposed.
//   - Tenant/lens scope comes from verified JWT claims; request body user_id is ignored.
//   - TransitionKnowledgeLoop requires a UUIDv7 client_transition_id for idempotency.
service KnowledgeLoopService {
  // GetKnowledgeLoop returns foreground entries, surface state, and session state for the
  // authenticated user. Reads go through the knowledge_loop_entries_public view which excludes
  // projected_at.
  rpc GetKnowledgeLoop(GetKnowledgeLoopRequest) returns (GetKnowledgeLoopResponse);
  // TransitionKnowledgeLoop records a session stage transition. Server enforces UUIDv7
  // format on client_transition_id, dedupes on (user_id, client_transition_id), and rejects
  // DWELL triggers that do not target OBSERVE.
  rpc TransitionKnowledgeLoop(TransitionKnowledgeLoopRequest) returns (TransitionKnowledgeLoopResponse);
  // StreamKnowledgeLoopUpdates subscribes the client to revision updates. The server
  // terminates with a stream_expired envelope when the JWT exp is reached.
  rpc StreamKnowledgeLoopUpdates(StreamKnowledgeLoopUpdatesRequest) returns (stream StreamKnowledgeLoopUpdatesResponse);
  // EmitActOutcome lets the frontend close the OODA loop in real time
  // instead of waiting for the 7-day no_engagement fallback cron
  // (ADR-000908 §Δ1). The server appends a
  // knowledge_loop.act_outcome.v1 event whose dedupe_key is derived from
  // (user_id, entry_key, client_outcome_id) so the cron and the frontend
  // can share the same UUIDv7 namespace and a duplicate emit collapses to
  // a no-op. ADR-000912.
  rpc EmitActOutcome(EmitActOutcomeRequest) returns (EmitActOutcomeResponse);
}

// ============================================================================
// Enums — all zero values are UNSPECIFIED per proto3 best practice.
// ============================================================================

enum LoopStage {
  LOOP_STAGE_UNSPECIFIED = 0;
  LOOP_STAGE_OBSERVE = 1;
  LOOP_STAGE_ORIENT = 2;
  LOOP_STAGE_DECIDE = 3;
  LOOP_STAGE_ACT = 4;
}

enum SurfaceBucket {
  SURFACE_BUCKET_UNSPECIFIED = 0;
  SURFACE_BUCKET_NOW = 1;
  SURFACE_BUCKET_CONTINUE = 2;
  SURFACE_BUCKET_CHANGED = 3;
  SURFACE_BUCKET_REVIEW = 4;
}

// RelationKind classifies how an entry situates against the user's existing
// orientation (ADR-000937). Continuation is the first kind wired end-to-end.
enum RelationKind {
  RELATION_KIND_UNSPECIFIED = 0;
  RELATION_KIND_CONTINUATION = 1;
  RELATION_KIND_CONTRADICTION = 2;
  RELATION_KIND_CLUSTER = 3;
  RELATION_KIND_INQUIRY = 4;
}

// RelationState is the lifecycle position of a relation. The transition shown
// on the next observe is the visible "loop closed": a continuation surfaces
// OPEN, advances to ADVANCING after the user returns once, ADVANCED after
// repeated engagement, and RESOLVED when the thread is internalized.
enum RelationState {
  RELATION_STATE_UNSPECIFIED = 0;
  RELATION_STATE_OPEN = 1;
  RELATION_STATE_ADVANCING = 2;
  RELATION_STATE_ADVANCED = 3;
  RELATION_STATE_RESOLVED = 4;
}

enum DismissState {
  DISMISS_STATE_UNSPECIFIED = 0;
  DISMISS_STATE_ACTIVE = 1;
  DISMISS_STATE_DEFERRED = 2;
  DISMISS_STATE_DISMISSED = 3;
  DISMISS_STATE_COMPLETED = 4;
  // ADR-000908 §Δ3: terminal "knowledge internalized" state. The entry has
  // been understood and graduated out of the Loop's read model. The event
  // log retains the transition so reproject can rebuild this row, and the
  // read path filters `dismiss_state=internalized` rows from foreground /
  // bucket entries. macroState.recentInternalizedCount surfaces a 7-day
  // count as the "卒業" feedback to the user.
  DISMISS_STATE_INTERNALIZED = 5;
}

// ConfidenceLadder is the qualitative tier the projector publishes alongside
// the optional numeric `WhyPayload.confidence`. The ladder gives downstream
// UIs a coarse anchor for "how sure should I be" without forcing readers to
// reason about a 0..1 float. ADR-000908 §Δ4.
enum ConfidenceLadder {
  CONFIDENCE_LADDER_UNSPECIFIED = 0;
  // SPECULATION: derived from a single low-strength signal (e.g. one open).
  CONFIDENCE_LADDER_SPECULATION = 1;
  // PATTERN: multiple weak signals align (tag overlap + recall, etc.).
  CONFIDENCE_LADDER_PATTERN = 2;
  // EVIDENCE: at least one strong, recent versioned-artifact bound signal.
  CONFIDENCE_LADDER_EVIDENCE = 3;
  // VERIFIED: user has acted on (saved/asked-and-followed) similar entries.
  CONFIDENCE_LADDER_VERIFIED = 4;
}

// ActOutcomeKind classifies the observed downstream signal of a prior
// KnowledgeLoopActed event. System-emitted; the projector consumes it as
// `act_outcome_signal` input to Surface Planner v2 so the Loop learns from
// the user's behaviour (ADR-000908 §Δ1).
enum ActOutcomeKind {
  ACT_OUTCOME_KIND_UNSPECIFIED = 0;
  // ENGAGED: open intent followed by ≥ 30s article dwell.
  ACT_OUTCOME_KIND_ENGAGED = 1;
  // DEEP_ENGAGEMENT: ask intent followed by ≥ 3 conversation turns.
  ACT_OUTCOME_KIND_DEEP_ENGAGEMENT = 2;
  // STALE_SAVE: save intent followed by ≥ 7 days without re-open.
  ACT_OUTCOME_KIND_STALE_SAVE = 3;
  // ACCEPTED_CHANGE: compare intent followed by dismiss (user reconciled).
  ACT_OUTCOME_KIND_ACCEPTED_CHANGE = 4;
  // NO_ENGAGEMENT: 7-day fallback emitted by act_outcome_cron when no
  // explicit outcome signal arrived.
  ACT_OUTCOME_KIND_NO_ENGAGEMENT = 5;
}

enum ServiceQuality {
  SERVICE_QUALITY_UNSPECIFIED = 0;
  SERVICE_QUALITY_FULL = 1;
  SERVICE_QUALITY_DEGRADED = 2;
  SERVICE_QUALITY_FALLBACK = 3;
}

enum WhyKind {
  WHY_KIND_UNSPECIFIED = 0;
  WHY_KIND_SOURCE = 1;
  WHY_KIND_PATTERN = 2;
  WHY_KIND_RECALL = 3;
  WHY_KIND_CHANGE = 4;
  // Surfaces because the entry's topic terms overlap with the user's recent
  // reading corpus (recap clusters within event.occurred_at - 7d).
  WHY_KIND_TOPIC_AFFINITY = 5;
  // Surfaces because one or more of the entry's tags are rising in frequency
  // across the user's recent tag_set_versions (within event.occurred_at - 7d).
  WHY_KIND_TAG_TRENDING = 6;
  // Surfaces because the entry continues an unfinished Augur thread or
  // partially-read article. Linkage carried by AugurConversationLinked or by
  // payload-resident continue_context fields.
  WHY_KIND_UNFINISHED_CONTINUE = 7;
}

enum RenderDepthHint {
  RENDER_DEPTH_HINT_UNSPECIFIED = 0;
  RENDER_DEPTH_HINT_FLAT = 1;
  RENDER_DEPTH_HINT_LIGHT = 2;
  RENDER_DEPTH_HINT_STRONG = 3;
  RENDER_DEPTH_HINT_CRITICAL = 4;
}

enum LoopPriority {
  LOOP_PRIORITY_UNSPECIFIED = 0;
  LOOP_PRIORITY_CRITICAL = 1;
  LOOP_PRIORITY_CONTINUING = 2;
  LOOP_PRIORITY_CONFIRM = 3;
  LOOP_PRIORITY_REFERENCE = 4;
}

enum ActTargetType {
  ACT_TARGET_TYPE_UNSPECIFIED = 0;
  ACT_TARGET_TYPE_ARTICLE = 1;
  ACT_TARGET_TYPE_ASK = 2;
  ACT_TARGET_TYPE_RECAP = 3;
  ACT_TARGET_TYPE_DIFF = 4;
  ACT_TARGET_TYPE_CLUSTER = 5;
  ACT_TARGET_TYPE_CONVERSATION = 6;
  ACT_TARGET_TYPE_ENTRY = 7;
}

enum DecisionIntent {
  DECISION_INTENT_UNSPECIFIED = 0;
  DECISION_INTENT_OPEN = 1;
  DECISION_INTENT_ASK = 2;
  DECISION_INTENT_SAVE = 3;
  DECISION_INTENT_COMPARE = 4;
  DECISION_INTENT_REVISIT = 5;
  DECISION_INTENT_SNOOZE = 6;
}

enum TransitionTrigger {
  TRANSITION_TRIGGER_UNSPECIFIED = 0;
  TRANSITION_TRIGGER_USER_TAP = 1;
  TRANSITION_TRIGGER_DWELL = 2; // valid only when to_stage == OBSERVE
  TRANSITION_TRIGGER_KEYBOARD = 3;
  TRANSITION_TRIGGER_PROGRAMMATIC = 4;
  // Soft dismiss / snooze. Routes to KnowledgeLoopDeferred (canonical contract
  // §8.2). Same-stage transitions (from_stage == to_stage) are allowed only
  // when paired with this trigger.
  TRANSITION_TRIGGER_DEFER = 5;
  // Review-lane re-evaluation triggers (fb.md §F: Review re-evaluation engine).
  // Each routes to KnowledgeLoopReviewed and requires from_stage == to_stage,
  // mirroring the DEFER constraint. The action distinction (recheck /
  // archive / mark_reviewed) is in the trigger value itself; the projector
  // patches dismiss_state per action.
  TRANSITION_TRIGGER_RECHECK = 6;
  TRANSITION_TRIGGER_ARCHIVE = 7;
  TRANSITION_TRIGGER_MARK_REVIEWED = 8;
  // ADR-000914: intent-driven same-stage signals. All three require
  // from_stage == to_stage. The classifier dispatches to the canonical
  // event_type; payload.acted_intent / target_type carries the enrichment.
  // The trigger encodes the stage-gate decision, not routing logic, so the
  // "trigger = stage gate, payload = enrichment" invariant from §canonical
  // contract §7 holds.
  TRANSITION_TRIGGER_COMPARE = 9;        // CHANGED bucket compare CTA → KnowledgeLoopActed (intent recording)
  TRANSITION_TRIGGER_INTERNALIZE = 10;   // "I got this" graduation → KnowledgeLoopInternalized (dismiss_state flip)
  TRANSITION_TRIGGER_INTENT_SIGNAL = 11; // Generic payload-driven intent recording (future Acolyte / recap signals) → KnowledgeLoopActed
}

// SurfacePlannerVersion gates which planner produced a given entry's
// surface_bucket assignment. Bumping this value requires a full reproject
// (see runbooks/knowledge-loop-reproject.md) so that legacy entries pick up
// the new bucket placement deterministically.
enum SurfacePlannerVersion {
  SURFACE_PLANNER_VERSION_UNSPECIFIED = 0;
  // v1: event-type → bucket fixed mapping. SummaryVersionCreated → NOW,
  // HomeItemOpened → CONTINUE, HomeItemSuperseded → CHANGED,
  // HomeItemDismissed → REVIEW.
  SURFACE_PLANNER_VERSION_V1 = 1;
  // v2: knowledge-state-based scoring. Inputs are immutable evidence
  // (topic_overlap_count, tag_overlap_count, augur_link_id,
  // version_drift_count, freshness_at). decideBucketV2 is a pure function
  // of these inputs — same inputs always yield the same bucket.
  SURFACE_PLANNER_VERSION_V2 = 2;
}

// ReviewReason explains why an entry landed in the Review bucket so the
// UI can pick a deterministic guidance line (ADR-000907). The projector's
// decideReviewReason is a pure function of SurfaceScoreInputs, so a full
// reproject produces the same reason for the same event log.
enum ReviewReason {
  REVIEW_REASON_UNSPECIFIED = 0;
  REVIEW_REASON_STALENESS = 1;
  REVIEW_REASON_CONTRADICTION = 2;
  REVIEW_REASON_VERSION_DRIFT = 3;
  REVIEW_REASON_UNFINISHED_THREAD = 4;
  REVIEW_REASON_NONE = 5;
}

// ============================================================================
// Payloads
// ============================================================================

// EvidenceKind discriminates how `EvidenceRef.ref_id` should be interpreted
// downstream: WEB means `ref_id` is an absolute URL; ARTICLE / SUMMARY mean
// `ref_id` is an alt-db UUID (articles.id or summary_versions.summary_version_id)
// and the UI builds `/articles/<ref_id>`. Mirrors alt.augur.v2.CitationKind so
// the Knowledge Loop ↔ Augur handshake can carry the same discriminator end
// to end without ambiguous URL-vs-UUID heuristics.
enum EvidenceKind {
  EVIDENCE_KIND_UNSPECIFIED = 0;
  EVIDENCE_KIND_WEB = 1;
  EVIDENCE_KIND_ARTICLE = 2;
  EVIDENCE_KIND_SUMMARY = 3;
}

message EvidenceRef {
  string ref_id = 1;
  string label = 2;
  EvidenceKind kind = 3;
}

message WhyPayload {
  WhyKind kind = 1;
  // Plain text only. 1..512 chars. No Markdown or HTML.
  string text = 2;
  optional float confidence = 3;
  // Length <= 8 (server-validated).
  repeated EvidenceRef evidence_refs = 4;

  // ADR-000908 §Δ4: counter-evidence and confidence ladder turn Why into a
  // verifiable claim rather than one-way trust advertising. All optional and
  // back-compat: older readers ignore these fields.
  // Length <= 4 (server-validated).
  repeated EvidenceRef counter_evidence_refs = 5;
  optional ConfidenceLadder confidence_ladder = 6;
  // Plain text. 1..256 chars. Articulates what observation would invalidate
  // this why narrative, enabling epistemic transparency.
  optional string what_would_change_my_mind = 7;

  reserved 8 to 10;
}

message ArtifactVersionRef {
  optional string summary_version_id = 1;
  optional string tag_set_version_id = 2;
  optional string lens_version_id = 3;

  reserved 4 to 10;
}

message ChangeSummary {
  string summary = 1;
  repeated string changed_fields = 2;
  optional string previous_entry_key = 3;

  // Redline-proof diff fields. Populated by the projector when the
  // SummarySuperseded event payload carries both old_summary_version_id and
  // new_summary_version_id and both versions resolve under the same user_id
  // and article_id. Fully additive — older clients render summary +
  // changed_fields and ignore these.
  repeated string added_phrases = 4;
  repeated string removed_phrases = 5;
  optional uint32 unchanged_phrases_count = 6;
  repeated string added_tags = 7;
  repeated string removed_tags = 8;
}

message ContinueContext {
  string summary = 1;
  repeated string recent_action_labels = 2;
  optional google.protobuf.Timestamp last_interacted_at = 3;
}

message DecisionOption {
  string action_id = 1;
  optional string label = 2; // UI may derive label from intent; override only
  DecisionIntent intent = 3;
}

message ActTarget {
  ActTargetType target_type = 1;
  string target_ref = 2;
  // route is the internal SPA navigation target (e.g. "/articles/<id>",
  // "/recap/topic/<id>"). It is server-relative and MUST NOT be used as a
  // public source URL. Used for display in the workspace and for in-app
  // navigation when the target is itself an internal SPA route.
  optional string route = 3;
  // source_url is the article's external HTTPS source URL when the target is
  // an article. It is read from the event payload (reproject-safe) and used
  // by the SPA reader as `?url=`. Independent of `route`. Empty / absent for
  // legacy events that did not carry the URL in their payload.
  optional string source_url = 4;
}

// Relation is a first-class edge from an entry to the user's existing
// orientation (ADR-000937). The relation-set is the Orient surface.
message Relation {
  RelationKind kind = 1;
  // Stable natural key of the related anchor (article id / entry key /
  // versioned artifact id). Server-relative; never used as a public source URL.
  string target_ref = 2;
  // Strength of the relation (e.g. number of continuation contacts). Ranking
  // hint only; the UI reads kind + state for placement.
  int32 magnitude = 3;
  RelationState state = 4;
  // Plain text why at the relation grain. 1..512 chars, no markup.
  string why_text = 5;
}

// KnowledgeLoopEntry is one Loop proposal unit.
// projected_at is intentionally absent and reserved against accidental reintroduction.
message KnowledgeLoopEntry {
  // hot fields (1-15 use 1-byte tags on the wire)
  string entry_key = 1;
  string source_item_key = 2;
  LoopStage proposed_stage = 3;
  SurfaceBucket surface_bucket = 4;

  int64 projection_revision = 5;
  int64 projection_seq_hiwater = 6;
  int64 source_event_seq = 7;
  google.protobuf.Timestamp freshness_at = 8;

  DismissState dismiss_state = 9;
  RenderDepthHint render_depth_hint = 10;
  LoopPriority loop_priority = 11;
  WhyPayload why_primary = 12;

  ArtifactVersionRef artifact_version_ref = 13;
  repeated EvidenceRef why_evidence_refs = 14;
  optional google.protobuf.Timestamp source_observed_at = 15;

  // colder fields
  optional ChangeSummary change_summary = 16;
  optional ContinueContext continue_context = 17;
  repeated DecisionOption decision_options = 18;
  repeated ActTarget act_targets = 19;
  optional string superseded_by_entry_key = 20;

  reserved 21 to 29;
  reserved "updated_at", "last_modified", "loop_priority_label", "projected_at", "wall_clock", "ingest_time";

  // ADR-000907 epistemic-change review driver. review_reason is populated
  // when the projector places an entry into the Review bucket; the UI uses
  // it to deterministically pick the right guidance line. Reproject-safe:
  // decideReviewReason is a pure function of SurfaceScoreInputs. UNSPECIFIED
  // and NONE are wire-equivalent and both indicate "no review driver"; the
  // explicit NONE value lets older clients ignore the field without losing
  // semantics when the projector emits a real value.
  ReviewReason review_reason = 30;

  // surface_planner_version records which planner placed this entry into its
  // bucket. Older rows default to UNSPECIFIED (treated as v1 by clients) so
  // additivity holds. Bumping the planner requires a full reproject.
  optional SurfacePlannerVersion surface_planner_version = 31;

  // current_entry_stage is the user's per-entry progress. It is distinct from
  // proposed_stage, which remains the projector's recommendation for this card.
  optional LoopStage current_entry_stage = 32;
  optional google.protobuf.Timestamp current_entry_stage_entered_at = 33;

  // ADR-000937 relation-set. The Orient surface renders these directly instead
  // of a collapsed single bucket; surface_bucket is demoted to a lens derived
  // from the set. Each Relation situates the entry against the user's existing
  // orientation and carries the State that drives the visible "loop closed"
  // return diff. Reproject-safe — derived from the same SurfaceScoreInputs.
  repeated Relation relations = 34;
}

message SurfaceState {
  SurfaceBucket surface_bucket = 1;
  optional string primary_entry_key = 2;
  repeated string secondary_entry_keys = 3;

  int64 projection_revision = 4;
  int64 projection_seq_hiwater = 5;
  google.protobuf.Timestamp freshness_at = 6;
  ServiceQuality service_quality = 7;

  reserved "projected_at";
}

message KnowledgeLoopSessionState {
  LoopStage current_stage = 1;
  // current_stage_entered_at derives from the triggering event's occurred_at.
  google.protobuf.Timestamp current_stage_entered_at = 2;

  optional string focused_entry_key = 3;
  optional string foreground_entry_key = 4;

  optional string last_observed_entry_key = 5;
  optional string last_oriented_entry_key = 6;
  optional string last_decided_entry_key = 7;
  optional string last_acted_entry_key = 8;
  optional string last_returned_entry_key = 9;
  optional string last_deferred_entry_key = 10;

  int64 projection_revision = 11;
  int64 projection_seq_hiwater = 12;

  reserved 13 to 20;
  reserved "updated_at", "projected_at";

  // Macro (day-to-week) cognitive footprint. Optional — older projectors omit
  // this field and the UI hides the macro byline. ADR-000909 §Δ2 supplement
  // (2026-05-24): the field landed alongside macro_state_builder so Lens
  // switches surface the multi-scale loop overview that was previously
  // hardcoded to zeros in the frontend.
  //
  // Reproject-safety: every count derives from event payload only —
  // active_continue_threads aggregates knowledge_loop.acted.v1 with
  // continue_flag=true; pending_review_count aggregates
  // knowledge_loop.reviewed.v1 with trigger=TRANSITION_TRIGGER_RECHECK and
  // no superseding mark_reviewed/archive in window; recent_internalized_count
  // aggregates knowledge_loop.act_outcome.v1 with outcome=internalized.
  // window_end_at echoes the triggering event's occurred_at, never wall-clock.
  optional KnowledgeLoopMacroState macro_state = 21;
}

// KnowledgeLoopMacroState is the disposable 7d projection of the user's macro
// layer (multi-scale loop, ADR-000909 §Δ2). Field semantics live alongside
// the projector contract: knowledge-sovereign/usecase/knowledge_loop_session_state.
message KnowledgeLoopMacroState {
  // Distinct entries with an in-window knowledge_loop.acted.v1 carrying
  // continue_flag=true whose latest signal has not been internalized or
  // explicitly closed.
  uint32 active_continue_threads = 1;

  // Distinct entries with an in-window TRANSITION_TRIGGER_RECHECK reviewed
  // event with no later TRANSITION_TRIGGER_MARK_REVIEWED / ARCHIVE.
  uint32 pending_review_count = 2;

  // Distinct entries with an in-window knowledge_loop.act_outcome.v1 whose
  // outcome string equals "internalized" (the "卒業" graduation signal).
  uint32 recent_internalized_count = 3;

  // Qualitative load hint derived from the lens-versioned weights table.
  // UNSPECIFIED means the projector has nothing to report — the byline is
  // hidden entirely.
  CognitiveLoadHint cognitive_load_hint = 4;

  // window_end_at echoes the triggering event's occurred_at (event-time
  // purity). window_start_at = window_end_at - 7d.
  google.protobuf.Timestamp window_end_at = 5;
  google.protobuf.Timestamp window_start_at = 6;

  // seq_hiwater is the max(event_seq) of in-window events the projector
  // consumed when it computed this state. Used as the merge-safe upsert
  // guard on the knowledge_loop_macro_state projection table.
  int64 seq_hiwater = 7;

  // lens_weights_version pins which compile-time weights table produced
  // cognitive_load_hint. A bump signals operators to schedule a full
  // reproject (knowledge-loop-reproject runbook).
  int32 lens_weights_version = 8;
}

// CognitiveLoadHint is the qualitative summary the UI uses to bias macro-
// layer affordances. Order is monotonic — higher value means heavier load.
enum CognitiveLoadHint {
  COGNITIVE_LOAD_HINT_UNSPECIFIED = 0;
  COGNITIVE_LOAD_HINT_LIGHT = 1;
  COGNITIVE_LOAD_HINT_MEDIUM = 2;
  COGNITIVE_LOAD_HINT_HEAVY = 3;
}

// ============================================================================
// GetKnowledgeLoop
// ============================================================================

message GetKnowledgeLoopRequest {
  // lens_mode_id is client-specified; server resolves against tenant via JWT claim.
  string lens_mode_id = 1;
  optional bool reduced_motion = 2;
  // Max foreground entries to include (default 3, capped at 5).
  optional uint32 foreground_limit = 3;

  reserved 4 to 10;
  reserved "user_id", "tenant_id"; // these come from JWT, never from the body
}

message GetKnowledgeLoopResponse {
  repeated KnowledgeLoopEntry foreground_entries = 1;
  repeated SurfaceState surfaces = 2;
  KnowledgeLoopSessionState session_state = 3;
  ServiceQuality overall_service_quality = 4;
  google.protobuf.Timestamp generated_at = 5;
  int64 projection_seq_hiwater = 6;

  // Non-NOW bucket entries for /loop mid-context/deep-focus planes.
  // Each entry carries its own surface_bucket so the client partitions into
  // Continue / Changed / Review. Server caps per-bucket at 5 to avoid flooding.
  // Field 7 is additive; clients built against the 2026-04-24 contract default
  // to an empty list and render the legacy bucket-index view.
  repeated KnowledgeLoopEntry bucket_entries = 7;
}

// ============================================================================
// TransitionKnowledgeLoop
// ============================================================================

message TransitionKnowledgeLoopRequest {
  string lens_mode_id = 1;
  // UUIDv7. Server rejects non-v7 or timestamps outside [-48h, +5min].
  string client_transition_id = 2;
  string entry_key = 3;
  LoopStage from_stage = 4;
  LoopStage to_stage = 5;
  TransitionTrigger trigger = 6;
  int64 observed_projection_revision = 7;

  reserved 8 to 15;
  reserved "user_id", "tenant_id";

  // Optional UI intent metadata. These are not used for authorization or
  // classification; they make the appended KnowledgeLoopDecisionPresented /
  // KnowledgeLoopActed payload self-describing under replay.
  repeated DecisionIntent presented_intents = 16;
  optional DecisionIntent acted_intent = 17;
  optional string action_id = 18;
  optional ActTargetType target_type = 19;
  optional string target_ref = 20;
  bool continue_flag = 21;
}

message TransitionKnowledgeLoopResponse {
  bool accepted = 1;
  optional string canonical_entry_key = 2;
  optional string message = 3;
  int64 projection_seq_hiwater = 4;
}

// ============================================================================
// StreamKnowledgeLoopUpdates
// ============================================================================

message StreamKnowledgeLoopUpdatesRequest {
  string lens_mode_id = 1;
  optional string foreground_entry_key = 2;
  optional int64 foreground_projection_revision = 3;
  optional bool reduced_motion = 4;
  // Resume from the given event seq (inclusive). 0 means start fresh.
  optional int64 resume_from_seq = 5;

  reserved 6 to 15;
  reserved "user_id", "tenant_id";
}

message EntryAppended {
  string entry_key = 1;
  int64 revision = 2;
  optional KnowledgeLoopEntry inline_entry = 3;
}

message EntryRevised {
  string entry_key = 1;
  int64 revision = 2;
  optional KnowledgeLoopEntry inline_entry = 3;
}

message EntrySuperseded {
  string entry_key = 1;
  string new_entry_key = 2;
  int64 revision = 3;
}

message EntryWithdrawn {
  string entry_key = 1;
  int64 revision = 2;
}

message SurfaceRebalanced {
  SurfaceBucket surface_bucket = 1;
  int64 revision = 2;
}

// StreamExpired is a terminal envelope. Clients should close the stream and may reconnect
// after refreshing their JWT.
message StreamExpired {
  string reason = 1;
}

// ============================================================================
// Loop Event Payloads (append-only into knowledge_events)
// ============================================================================
// Each payload is the JSON body of a corresponding event_type string in knowledge_events:
//   KnowledgeLoopObserved         -> knowledge_loop.observed.v1
//   KnowledgeLoopOriented         -> knowledge_loop.oriented.v1
//   KnowledgeLoopDecisionPresented-> knowledge_loop.decision_presented.v1
//   KnowledgeLoopActed            -> knowledge_loop.acted.v1
//   KnowledgeLoopReturned         -> knowledge_loop.returned.v1
//   KnowledgeLoopDeferred         -> knowledge_loop.deferred.v1
//   KnowledgeLoopReviewed         -> knowledge_loop.reviewed.v1
//   KnowledgeLoopSessionReset     -> knowledge_loop.session_reset.v1
//   KnowledgeLoopLensModeSwitched -> knowledge_loop.lens_mode_switched.v1
//
// Reproject-safe contract: payloads carry every field needed to compute projection
// deltas without reading latest projection state. Projectors derive business-fact
// timestamps from the event's occurred_at.

message KnowledgeLoopObservedPayload {
  string entry_key = 1;
  string lens_mode_id = 2;
  LoopStage from_stage = 3;
  LoopStage to_stage = 4;
  TransitionTrigger trigger = 5;
  int64 observed_projection_revision = 6;
  optional string client_transition_id = 7;
}

message KnowledgeLoopOrientedPayload {
  string entry_key = 1;
  string lens_mode_id = 2;
  LoopStage from_stage = 3;
  LoopStage to_stage = 4;
  TransitionTrigger trigger = 5;
  int64 observed_projection_revision = 6;
  optional string client_transition_id = 7;
}

message KnowledgeLoopDecisionPresentedPayload {
  string entry_key = 1;
  string lens_mode_id = 2;
  LoopStage from_stage = 3;
  LoopStage to_stage = 4;
  TransitionTrigger trigger = 5;
  int64 observed_projection_revision = 6;
  optional string client_transition_id = 7;
  repeated DecisionIntent presented_intents = 8;
}

message KnowledgeLoopActedPayload {
  string entry_key = 1;
  string lens_mode_id = 2;
  LoopStage from_stage = 3;
  LoopStage to_stage = 4;
  TransitionTrigger trigger = 5;
  int64 observed_projection_revision = 6;
  optional string client_transition_id = 7;
  optional DecisionIntent acted_intent = 8;
  // true when the act should land on SurfaceBucket.CONTINUE rather than loop back to OBSERVE.
  bool continue_flag = 9;
  optional string action_id = 10;
  optional ActTargetType target_type = 11;
  optional string target_ref = 12;
}

message KnowledgeLoopReturnedPayload {
  string entry_key = 1;
  string lens_mode_id = 2;
  LoopStage from_stage = 3;
  LoopStage to_stage = 4;
  TransitionTrigger trigger = 5;
  int64 observed_projection_revision = 6;
  optional string client_transition_id = 7;
}

message KnowledgeLoopDeferredPayload {
  string entry_key = 1;
  string lens_mode_id = 2;
  LoopStage from_stage = 3;
  LoopStage to_stage = 4;
  TransitionTrigger trigger = 5;
  int64 observed_projection_revision = 6;
  optional string client_transition_id = 7;
}

message KnowledgeLoopReviewedPayload {
  string entry_key = 1;
  string lens_mode_id = 2;
  LoopStage from_stage = 3;
  LoopStage to_stage = 4;
  // Action distinction lives in this trigger value:
  // RECHECK re-arms; ARCHIVE and MARK_REVIEWED complete.
  TransitionTrigger trigger = 5;
  int64 observed_projection_revision = 6;
  optional string client_transition_id = 7;
}

message KnowledgeLoopSessionResetPayload {
  string lens_mode_id = 1;
  LoopStage from_stage = 2;
  optional string reason = 3;
  optional string client_transition_id = 4;
}

message KnowledgeLoopLensModeSwitchedPayload {
  string previous_lens_mode_id = 1;
  string lens_mode_id = 2;
  optional string client_transition_id = 3;
}

// KnowledgeLoopSurfacePlanRecomputedPayload is a system-only event. It is
// emitted by knowledge-sovereign when a planner version bump or a fresh
// snapshot of cross-source signals causes one or more entries to change
// buckets. It is NEVER user-emittable: the BFF rejects this payload type on
// the user transition path.
//
// Reproject-safe: every input listed is a versioned id (immutable) or a count
// derived from versioned tables, scoped to event.occurred_at. Replaying the
// event against the same versioned tables always yields the same bucket.
message KnowledgeLoopSurfacePlanRecomputedPayload {
  string lens_mode_id = 1;
  SurfacePlannerVersion planner_version = 2;
  int64 plan_seq = 3;

  message EntryScoreInput {
    string entry_key = 1;
    optional uint32 topic_overlap_count = 2;
    optional uint32 tag_overlap_count = 3;
    optional string augur_link_id = 4;
    optional uint32 version_drift_count = 5;
    google.protobuf.Timestamp freshness_at = 6;
    optional string recap_topic_snapshot_id = 7;
  }
  repeated EntryScoreInput entry_inputs = 4;
}

// KnowledgeLoopActOutcomePayload (ADR-000908 §Δ1) — system-emitted closure
// signal for a prior KnowledgeLoopActed event. The projector uses this to
// down-weight act intents that did not turn into engagement and to boost
// those that did. Bound to the originating act_event_id so reproject is
// deterministic. The 7-day NO_ENGAGEMENT fallback is emitted by
// `app/cron/act_outcome_cron.go`; immediate ENGAGED / DEEP_ENGAGEMENT
// signals come from alt-backend view trackers.
message KnowledgeLoopActOutcomePayload {
  // event_id of the originating KnowledgeLoopActed event.
  string acted_event_id = 1;
  // entry_key carried for the projector's UPSERT path; mirrors the Acted
  // event's payload so the projector can look up the row without joining.
  string entry_key = 2;
  string lens_mode_id = 3;
  ActOutcomeKind outcome = 4;
  // observed_at is event-time and MUST equal the consuming
  // knowledge_events.occurred_at; the field is duplicated in payload so
  // reproject can derive signals without dereferencing the event header.
  google.protobuf.Timestamp observed_at = 5;
  // Stable IDs that justify the outcome (e.g. article_dwell event id,
  // conversation_turn event id chain, recap_snapshot id). Length <= 4.
  repeated EvidenceRef signal_evidence_refs = 6;
}

message StreamKnowledgeLoopUpdatesResponse {
  oneof update {
    EntryAppended appended = 1;
    EntryRevised revised = 2;
    EntrySuperseded superseded = 3;
    EntryWithdrawn withdrawn = 4;
    SurfaceRebalanced rebalanced = 5;
    StreamExpired stream_expired = 6;
  }

  int64 projection_seq_hiwater = 10;

  reserved 7 to 9;
  reserved "kind";
}

// ============================================================================
// EmitActOutcome (ADR-000912)
// ============================================================================

// EmitActOutcomeRequest carries the FE-derived closure signal for a prior
// KnowledgeLoopActed event. The frontend collapses dwell timers, ask-turn
// counts, and "I got this" CTAs into one of the canonical ActOutcomeKind
// values; the server appends the matching knowledge_loop.act_outcome.v1
// event with payload that mirrors the cron's NO_ENGAGEMENT fallback (so a
// projector cannot tell the two emitters apart from the event log).
//
// Idempotency: client_outcome_id is a client-generated UUIDv7. The
// server-side dedupe table (knowledge_loop_act_outcome_dedupes) keys on
// (user_id, entry_key, client_outcome_id) so a retried emit is a no-op.
// The cron derives its own UUIDv7 deterministically from
// (user_id, entry_key, 7-day window_id) so FE emits in the same window
// collapse with the cron's fallback emit and never produce a duplicate
// signal.
message EmitActOutcomeRequest {
  string entry_key = 1;
  ActOutcomeKind outcome = 2;
  string client_outcome_id = 3; // UUIDv7
  google.protobuf.Timestamp occurred_at = 4; // event-time, not wall-clock
  optional uint32 dwell_seconds = 5;
  optional uint32 ask_turns = 6;
  optional string lens_mode_id = 7;

  reserved 8 to 15;
  reserved "user_id", "tenant_id"; // sourced from JWT claims, never request body
}

message EmitActOutcomeResponse {
  // Whether the server accepted the emit or treated it as a duplicate.
  // `accepted=true` means a new event was appended; `accepted=false` with
  // `deduplicated=true` means the (user_id, entry_key, client_outcome_id)
  // tuple has already been seen and the response is idempotent-OK.
  bool accepted = 1;
  bool deduplicated = 2;

  // event_seq of the appended (or previously-appended) event so the FE can
  // pair the outcome with its stream cursor for reconciliation.
  int64 event_seq = 3;
}
