version: v2
inputs:
  - directory: .
    paths:
      - services/backend
plugins:
  # Python protobuf messages (pinned to v33.5 for protobuf 6.x runtime compatibility)
  - remote: buf.build/protocolbuffers/python:v33.5
    out: ../tag-generator/app/tag_generator/gen/proto
  # Python protobuf type stubs
  - remote: buf.build/protocolbuffers/pyi:v33.5
    out: ../tag-generator/app/tag_generator/gen/proto
  # Connect-RPC Python service stubs
  - remote: buf.build/connectrpc/python
    out: ../tag-generator/app/tag_generator/gen/proto
