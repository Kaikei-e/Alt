compose:
  files:
    - compose/compose.yaml
  project_name: alt

broker:
  base_url: http://localhost:9292
  # Credentials live in env:
  #   PACT_BROKER_USERNAME / PACT_BROKER_PASSWORD
  # scripts/deploy.sh exports these from secrets/pact_broker_basic_auth_password.txt.

versioning:
  strategy: git_sha
  options:
    short: true

deploy:
  wait: true
  wait_timeout: 180s
  smoke:
    command: ./scripts/smoke.sh
    timeout: 30s
    env:
      SMOKE_WAIT_SECONDS: "10"

environments:
  production:
    all_or_nothing: true
    # Services block regenerated from services.yaml. The block below is
    # overwritten in place by scripts/regen-service-registry.py; do not
    # hand-edit. tts-speaker is flagged `kind: external` in the registry
    # because it runs on a separate GPU host and is intentionally NOT
    # declared in compose/compose.yaml on this box. We still need the
    # broker to treat its version as known during the aggregate
    # can-i-deploy gate (otherwise alt-butterfly-facade's consumer-side
    # pact against tts-speaker shows up as "no verification result").
    # If c2quay ever refuses or tries to recreate that entry, flip the
    # registry's `kind: external` back out and fall back to
    # scripts/record-remote-pacticipant.sh.
    services:
      # <<<SERVICES-REGISTRY-BEGIN>>>
      alt-backend:          { pacticipant: alt-backend }
      alt-butterfly-facade: { pacticipant: alt-butterfly-facade }
      auth-hub:             { pacticipant: auth-hub }
      pre-processor:        { pacticipant: pre-processor }
      search-indexer:       { pacticipant: search-indexer }
      mq-hub:               { pacticipant: mq-hub }
      rag-orchestrator:     { pacticipant: rag-orchestrator }
      recap-worker:         { pacticipant: recap-worker }
      recap-subworker:      { pacticipant: recap-subworker }
      recap-evaluator:      { pacticipant: recap-evaluator }
      news-creator:         { pacticipant: news-creator }
      tag-generator:        { pacticipant: tag-generator }
      acolyte-orchestrator: { pacticipant: acolyte-orchestrator }
      knowledge-sovereign:  { pacticipant: knowledge-sovereign }
      tts-speaker:          { pacticipant: tts-speaker }
      # <<<SERVICES-REGISTRY-END>>>
