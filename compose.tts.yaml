services:
  tts-speaker:
    build:
      context: ./tts-speaker
      dockerfile: Dockerfile
    container_name: tts-speaker
    ports:
      - "9700:9700"
    environment:
      - TTS_DEFAULT_VOICE=${TTS_DEFAULT_VOICE:-qwen-ja-1}
      - TTS_DEFAULT_SPEED=${TTS_DEFAULT_SPEED:-1.0}
      - TTS_QWEN_MODEL_ID=${TTS_QWEN_MODEL_ID:-Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice}
      - TTS_QWEN_DTYPE=${TTS_QWEN_DTYPE:-bfloat16}
      - TTS_QWEN_ATTN=${TTS_QWEN_ATTN:-sdpa}
      - TTS_QWEN_KEEPALIVE_INTERVAL_SEC=${TTS_QWEN_KEEPALIVE_INTERVAL_SEC:-15}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_HOME=/app/.cache/huggingface
      # ROCm runtime tuning (per AMD ROCm 7.2 + community Qwen3-TTS recipes).
      # HSA_OVERRIDE 11.0.0 = gfx1100 binary compat path; works on RDNA 3.5 iGPU.
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
      - PYTORCH_HIP_ALLOC_CONF=expandable_segments:True
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=${TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL:-1}
      - GPU_MAX_ALLOC_PERCENT=${GPU_MAX_ALLOC_PERCENT:-100}
      - GPU_MAX_HEAP_SIZE=${GPU_MAX_HEAP_SIZE:-100}
      - HSA_ENABLE_SDMA=${HSA_ENABLE_SDMA:-0}
      - GPU_MAX_HW_QUEUES=${GPU_MAX_HW_QUEUES:-4}
      - HIP_VISIBLE_DEVICES=0
      - TTS_ALLOW_CPU_FALLBACK=1
      # MIOpen workspace=0 → naive solver fallback was the gfx1150 RTF blow-up.
      # FAST mode + disabling the direct-naive forward solver pushes MIOpen onto
      # FindDb-backed real solvers. See TheRock#3077, MIOpen#3650, pytorch#150168.
      - MIOPEN_FIND_MODE=${MIOPEN_FIND_MODE:-FAST}
      - MIOPEN_DEBUG_CONV_DIRECT_NAIVE_CONV_FWD=${MIOPEN_DEBUG_CONV_DIRECT_NAIVE_CONV_FWD:-0}
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"  # video
      - "992" # render
    ipc: host
    shm_size: "2g"
    volumes:
      - tts_models:/app/.cache/huggingface
    networks:
      - tts-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  tts-network:

volumes:
  tts_models:
