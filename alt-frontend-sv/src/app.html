<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
		<meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
		<meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
		<!-- alt:chunk-bootstrap:begin -->
		<!-- Recovery for stale /_app/immutable/* 404s. Mirrors the logic
		     exported as BOOTSTRAP_SCRIPT_BODY in src/lib/safari-error-bootstrap.ts
		     (drift-tested in safari-error-bootstrap.test.ts via normalized
		     whitespace comparison). Must run before any SvelteKit runtime
		     so the entry-chunk 404 case is covered — at that point
		     hooks.client.ts has not been parsed. -->
		<script>
			(() => {
				if (typeof window === "undefined") return;
				const K = "alt:chunk-reload-attempts";
				const L = 3;
				let fired = false;
				const go = () => {
					if (fired) return;
					fired = true;
					try {
						const n = Number(window.sessionStorage.getItem(K) || "0");
						if (n >= L) return;
						window.sessionStorage.setItem(K, String(n + 1));
					} catch (e) {}
					window.setTimeout(() => { window.location.reload(); }, 0);
				};
				const isChunk = (t) => {
					if (!t) return false;
					const s = t.src || t.href || "";
					return typeof s === "string" && s.indexOf("/_app/immutable/") !== -1;
				};
				window.addEventListener("error", (e) => { if (isChunk(e.target)) go(); }, true);
				window.addEventListener("vite:preloadError", () => { go(); });
			})();
		</script>
		<!-- alt:chunk-bootstrap:end -->
		%sveltekit.head%
		<style>
			/* Splash screen styles - inline for immediate availability */
																								#splash {
																									position: fixed;
																									inset: 0;
																									z-index: 9999;
																									display: flex;
																									flex-direction: column;
																									align-items: center;
																									justify-content: center;
																									gap: 1.5rem;
																									background: #dedede;
																									transition: opacity 0.3s ease-out;
																								}
																								#splash-text {
																									font-size: 1.125rem;
																									font-weight: 500;
																									color: #1a1a1a;
																									font-family: system-ui, -apple-system, sans-serif;
																								}
																								#splash-spinner {
																									width: 2rem;
																									height: 2rem;
																									border: 3px solid rgba(47, 79, 79, 0.2);
																									border-top-color: #2f4f4f;
																									border-radius: 50%;
																									animation: splash-spin 1s linear infinite;
																								}
																								@keyframes splash-spin {
																									to { transform: rotate(360deg); }
																								}
																								/* Hide splash after hydration */
																								body.hydrated #splash {
																									opacity: 0;
																									pointer-events: none;
																								}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Splash screen outside hydration zone -->
		<div id="splash">
			<img src="/favicon.svg" alt="Alt Logo" width="64" height="64" />
			<p id="splash-text">Loading Alt</p>
			<div id="splash-spinner"></div>
		</div>

		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
