# Knowledge Loop projector alerting rules.
#
# Surfaces the four counters wired in Wave 3 (ADR-000852) plus a
# computed projector lag gauge for the Wave 4 rollout. Pair with
# observability/grafana/dashboards/knowledge-loop-projector.json.
#
# These rules are written in Prometheus-native YAML so they slot
# directly into prometheus.yml's `rule_files`. The Grafana Unified
# Alerting variants in observability/grafana/provisioning/alerting/
# can be derived from this file when needed; keeping the source of
# truth here avoids the verbose Grafana JSON drift problem the other
# rule sets have hit.

groups:
  - name: knowledge-loop-projector
    interval: 30s
    rules:
      # F-001 cross-tenant isolation breach. Even one hit means a
      # projector path queried evidence outside the user's scope and
      # the resolver caught it. This is a hard-error alert: page on
      # the first occurrence, no smoothing.
      - alert: KnowledgeLoopCrossUserIsolationViolation
        expr: increase(knowledge_loop_projector_cross_user_isolation_violation_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          service: knowledge-sovereign
          source: knowledge-loop-projector
        annotations:
          summary: "Knowledge Loop projector observed cross-user isolation breach"
          description: |
            knowledge_loop_projector_cross_user_isolation_violation_total
            increased in the last 5m. The projector tried to surface
            evidence_refs from one user against another tenant scope.
            Investigate immediately — quarantine the affected user
            partition and replay events through the audited resolver.
          runbook_url: "docs/runbooks/knowledge-loop-rls-rollout.md"

      # Event drop spike. The projector skips events when it cannot
      # bind the caller's user_id (Wave 4-A reject path) or when the
      # resolver returns a hard error. A modest steady-state drop is
      # OK during rollout; anything above 0.1/s sustained for 5m
      # warrants investigation.
      - alert: KnowledgeLoopEventDropSpike
        expr: rate(knowledge_loop_projector_event_dropped_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: knowledge-sovereign
          source: knowledge-loop-projector
        annotations:
          summary: "Knowledge Loop projector dropping events"
          description: |
            knowledge_loop_projector_event_dropped_total is rising at
            >0.1 events/s for 5m. Check projector logs for the most
            common drop reason: user_mismatch (Wave 4-A tenant header
            absent) is the likely root cause during rollout.

      # Projection lag. When events outpace the projector by more
      # than 1000 rows for 10m, downstream surfaces (Knowledge Loop
      # Decide bucket, Continue plane) silently fall behind. The
      # threshold is chosen so a single batch dip doesn't fire.
      - alert: KnowledgeLoopProjectorLag
        expr: |
          (
            max(knowledge_events_max_event_seq) -
            max(knowledge_projection_checkpoint_last_event_seq{projector="knowledge-loop-projector"})
          ) > 1000
        for: 10m
        labels:
          severity: warning
          service: knowledge-sovereign
          source: knowledge-loop-projector
        annotations:
          summary: "Knowledge Loop projector is >1000 events behind"
          description: |
            The projector's last_event_seq is more than 1000 rows
            behind knowledge_events.max(event_seq) for 10m. UI may
            show stale Stage / Surface placement until it catches up.
            Check the projector container's CPU + DB write throughput.

      # Surface bucket assignment ratio. Once Wave 4-A / 4-B are
      # landed and emitting, v2 placements should rise. This rule
      # is informational (no severity), kept as a recording rule so
      # the dashboard's stacked area chart has a stable input.
      - record: knowledge_loop:surface_bucket_v2_ratio_5m
        expr: |
          sum(rate(knowledge_loop_projector_surface_bucket_assigned_total{version="v2"}[5m]))
          /
          clamp_min(sum(rate(knowledge_loop_projector_surface_bucket_assigned_total[5m])), 1)

      # PM-2026-045 action #4 — JWT TTL drift on the SSE delivery path.
      # The 4-week silent failure was masked because stream_jwt_expired
      # was log-only. With the alt_knowledge_loop_stream_ended_total
      # counter wired, a rising jwt_expired share is now alertable in
      # real time.
      - alert: KnowledgeLoopStreamJwtExpiredRate
        expr: rate(alt_knowledge_loop_stream_ended_total{reason="jwt_expired"}[5m]) * 300 > 3
        for: 5m
        labels:
          severity: warning
          service: alt-backend
          source: knowledge-loop-stream
        annotations:
          summary: "Knowledge Loop SSE JWT expiring too often"
          description: |
            More than 3 stream_ended{reason="jwt_expired"} events in
            5 minutes. Verify auth-hub BACKEND_TOKEN_TTL and the
            alt-backend streamStaleTimeout are aligned (both 30m).
          runbook_url: "docs/runbooks/connect-rpc-streaming-checklist.md"

      # PM-2026-045 action #3 — reconnect storm pattern.
      # Healthy sessions terminate via ctx_done when the client closes
      # the tab. When started:ctx_done > 3:1 the catch-race or nginx
      # buffering is back; this is the symptom that hid the outage for
      # 4 weeks.
      - alert: KnowledgeLoopStreamReconnectStorm
        expr: |
          rate(alt_knowledge_loop_stream_started_total[10m])
          /
          clamp_min(rate(alt_knowledge_loop_stream_ended_total{reason="ctx_done"}[10m]), 0.001)
          > 3
        for: 10m
        labels:
          severity: warning
          service: alt-backend
          source: knowledge-loop-stream
        annotations:
          summary: "Knowledge Loop SSE reconnecting faster than it ends cleanly"
          description: |
            stream_started rate is more than 3× the clean ctx_done rate
            over 10m. Likely cause: regression in useKnowledgeLoopStream
            catch-race guard or nginx SSE buffering.
          runbook_url: "docs/runbooks/connect-rpc-streaming-checklist.md"

      # Recording rule for the streaming health panel on the Grafana
      # knowledge-loop-projector dashboard.
      - record: knowledge_loop:stream_jwt_expired_ratio_5m
        expr: |
          sum(rate(alt_knowledge_loop_stream_ended_total{reason="jwt_expired"}[5m]))
          /
          clamp_min(sum(rate(alt_knowledge_loop_stream_started_total[5m])), 0.001)
