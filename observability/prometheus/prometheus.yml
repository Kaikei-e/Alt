# Prometheus Configuration for Alt Platform
# Collects metrics from nginx-exporter and other services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'docker'
    platform: 'alt'

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Nginx metrics via nginx-exporter
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: 'nginx'
    scrape_interval: 10s
    metrics_path: /metrics

  # cAdvisor for container resource metrics (CPU, memory, disk, network)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
    scrape_interval: 15s
    metrics_path: /metrics

  # mq-hub message queue hub metrics (Go/promhttp)
  - job_name: 'mq-hub'
    static_configs:
      - targets: ['mq-hub:9500']
        labels:
          service: 'mq-hub'
    scrape_interval: 15s
    metrics_path: /metrics

  # pre-processor: /metrics/prometheus is defined in code (metrics/collector.go)
  # but not wired into bootstrap/server.go yet — nothing listens on :9201 inside
  # the container. Re-enable this job when the collector is started by main.
  # Tracked as a follow-up to ADR-000704 (Admin Observability UI).
  #
  # - job_name: 'pre-processor'
  #   static_configs:
  #     - targets: ['pre-processor:9201']
  #       labels:
  #         service: 'pre-processor'
  #   scrape_interval: 15s
  #   metrics_path: /metrics/prometheus

  # recap-worker recap pipeline metrics (Rust/Axum)
  - job_name: 'recap-worker'
    static_configs:
      - targets: ['recap-worker:9005']
        labels:
          service: 'recap-worker'
    scrape_interval: 15s
    metrics_path: /metrics

  # recap-subworker LLM subworker metrics (Python/FastAPI instrumentator)
  - job_name: 'recap-subworker'
    static_configs:
      - targets: ['recap-subworker:8002']
        labels:
          service: 'recap-subworker'
    scrape_interval: 15s
    metrics_path: /metrics

  # news-creator distributed BE dispatch metrics (OTel -> Prometheus exporter)
  - job_name: 'news-creator'
    static_configs:
      - targets: ['news-creator:11434']
        labels:
          service: 'news-creator'
    scrape_interval: 15s
    metrics_path: /metrics

  # alt-backend feed read performance metrics (Go/OTel Prometheus exporter)
  - job_name: 'alt-backend'
    static_configs:
      - targets: ['alt-backend:9000']
        labels:
          service: 'alt-backend'
    scrape_interval: 15s
    metrics_path: /metrics

  # pki-agent sidecars: one per east-west service. Expose cert expiry and
  # rotation outcomes so cert-lifecycle regressions (like the 2026-04-15
  # Knowledge Home outage) are paged before they go dark.
  - job_name: 'pki-agent'
    static_configs:
      - targets: ['pki-agent-alt-backend:9510']
        labels: { service: 'pki-agent', subject: 'alt-backend' }
      - targets: ['pki-agent-alt-butterfly-facade:9510']
        labels: { service: 'pki-agent', subject: 'alt-butterfly-facade' }
      - targets: ['pki-agent-auth-hub:9510']
        labels: { service: 'pki-agent', subject: 'auth-hub' }
      - targets: ['pki-agent-pre-processor:9510']
        labels: { service: 'pki-agent', subject: 'pre-processor' }
      - targets: ['pki-agent-search-indexer:9510']
        labels: { service: 'pki-agent', subject: 'search-indexer' }
      - targets: ['pki-agent-tag-generator:9510']
        labels: { service: 'pki-agent', subject: 'tag-generator' }
      - targets: ['pki-agent-recap-worker:9510']
        labels: { service: 'pki-agent', subject: 'recap-worker' }
      - targets: ['pki-agent-acolyte-orchestrator:9510']
        labels: { service: 'pki-agent', subject: 'acolyte-orchestrator' }
    scrape_interval: 30s
    metrics_path: /metrics
