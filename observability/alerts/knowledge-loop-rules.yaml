# Prometheus alerting rules for Knowledge Loop v2.
#
# ADR-000910 §Prometheus alert rules.
#
# Source counters:
#   knowledge-sovereign/app/usecase/knowledge_loop_projector/metrics.go
#
# Reload after edits:
#   docker compose exec prometheus kill -HUP 1
#
# Runbooks:
#   F-001 leak               → docs/runbooks/knowledge-loop-reproject.md#F-001
#   Event drop spike         → docs/runbooks/knowledge-loop-reproject.md#event-drop
#   Projector lag            → docs/runbooks/knowledge-loop-reproject.md#lag
#   Outcome emitter coverage → docs/runbooks/knowledge-loop-reproject.md#outcome-cron

groups:
  - name: knowledge-loop
    rules:
      - alert: KnowledgeLoopCrossUserIsolation
        expr: increase(knowledge_loop_projector_cross_user_isolation_violation_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          subsystem: knowledge-loop
        annotations:
          summary: "Knowledge Loop projector observed a cross-user evidence_refs leak"
          description: |
            knowledge_loop_projector_cross_user_isolation_violation_total
            rose by {{ printf "%.0f" $value }} in the last 5 minutes. The
            projector rejected an event that referenced an evidence_ref
            belonging to a different user (F-001 defense-in-depth).
          runbook_url: "https://github.com/Kaikei-e/Alt/blob/main/docs/runbooks/knowledge-loop-reproject.md#F-001"

      - alert: KnowledgeLoopEventDropSpike
        expr: sum by (reason) (rate(knowledge_loop_projector_event_dropped_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          subsystem: knowledge-loop
        annotations:
          summary: "Knowledge Loop projector dropping events ({{ $labels.reason }})"
          description: |
            Event drop rate exceeded 0.1/s for the last 5 minutes, reason
            label `{{ $labels.reason }}`. Typical causes: bad payload from a
            consumer that skipped Pact CDC, projector schema drift, or an
            upstream service emitting events with mismatched user_id.

      - alert: KnowledgeLoopProjectorLag
        expr: knowledge_loop_projector_lag_events > 1000
        for: 10m
        labels:
          severity: warning
          subsystem: knowledge-loop
        annotations:
          summary: "Knowledge Loop projector lag > 1000 events"
          description: |
            Difference between MAX(knowledge_events.event_seq) and the
            projector checkpoint exceeded 1000 events for 10 minutes. v2
            placements may be stale.

      - alert: KnowledgeLoopOutcomeMissingSpike
        expr: rate(knowledge_loop_projector_outcome_missing_total[1h]) > 10
        for: 30m
        labels:
          severity: warning
          subsystem: knowledge-loop
        annotations:
          summary: "Act outcome cron filling no_engagement too often"
          description: |
            act_outcome_cron filled {{ printf "%.0f" $value }} `no_engagement`
            outcomes per hour over the last 30 minutes. The immediate outcome
            emitter (alt-backend view tracker) is likely missing engagement
            events; investigate before the cron-emitted backlog skews v2
            placements toward Review.

      # PM-2026-045 action #4: stream_jwt_expired rate.
      # JWT TTL is now 30m (ADR-000929); a sustained expiry rate above
      # 3 events / 5m means either tokens are not refreshing or
      # streamStaleTimeout drifted again. Either way, the silent 5-minute
      # churn that hid the 4-week outage must be visible immediately.
      - alert: KnowledgeLoopStreamJwtExpiredRate
        expr: rate(alt_knowledge_loop_stream_ended_total{reason="jwt_expired"}[5m]) * 300 > 3
        for: 5m
        labels:
          severity: warning
          subsystem: knowledge-loop
        annotations:
          summary: "Knowledge Loop SSE JWT expiring too often"
          description: |
            More than 3 `stream_ended_total{reason="jwt_expired"}` events in
            5 minutes. JWT TTL × streamStaleTimeout drift suspected. Check
            BACKEND_TOKEN_TTL (auth-hub) and streamStaleTimeout (alt-backend
            knowledge_loop handler) are aligned (both should be 30m).
          runbook_url: "https://github.com/Kaikei-e/Alt/blob/main/docs/runbooks/connect-rpc-streaming-checklist.md"

      # PM-2026-045 action #3: streaming session churn.
      # A healthy session stays open until ctx_done or the 30m stale timer.
      # Repeated openings (ratio of started:ctx_done > 3:1 over 10m) means
      # clients are reconnecting in tight loops — the 5-minute churn pattern
      # that produced the 4-week silent failure.
      - alert: KnowledgeLoopStreamReconnectStorm
        expr: |
          rate(alt_knowledge_loop_stream_started_total[10m])
          /
          clamp_min(rate(alt_knowledge_loop_stream_ended_total{reason="ctx_done"}[10m]), 0.001)
          > 3
        for: 10m
        labels:
          severity: warning
          subsystem: knowledge-loop
        annotations:
          summary: "Knowledge Loop SSE reconnecting faster than it ends cleanly"
          description: |
            `stream_started_total` is climbing more than 3× faster than
            clean `stream_ended_total{reason="ctx_done"}`. The
            useKnowledgeLoopStream catch-race or a nginx buffering
            regression is suspected. Verify the
            connect-rpc-streaming-checklist runbook still holds.
          runbook_url: "https://github.com/Kaikei-e/Alt/blob/main/docs/runbooks/connect-rpc-streaming-checklist.md"
