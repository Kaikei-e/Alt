[database]
# SQLite WAL mode — prevents "database is locked" errors
# ref: https://github.com/grafana/grafana/issues/65115
wal = true

[unified_alerting]
# Explicit scheduler interval (default 10s)
# Alert rule intervals must be divisible by this value
min_interval = 10s

[alerting]
# Disable legacy alerting (Unified Alerting only)
enabled = false
