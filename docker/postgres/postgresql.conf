# SSLはローカル環境では無効化
ssl = off

# 基本設定
listen_addresses = '*'
port = 5432
max_connections = 200
shared_buffers = 256MB
work_mem = 16MB
effective_cache_size = 1536MB

# ログ設定
log_connections = on
log_disconnections = on
log_statement = 'all'

# アイドルトランザクションタイムアウト（5分）
# トランザクションがアイドル状態のまま5分経過すると自動終了
# PgBouncer transaction poolingとの相互作用を考慮し余裕を持たせる
idle_in_transaction_session_timeout = '5min'
