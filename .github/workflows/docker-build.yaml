name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}

    steps:
      - name: Get workspace parent GID
        if: runner.environment == 'self-hosted'
        id: get-gid
        run: echo "gid=$(stat -c '%g' "$GITHUB_WORKSPACE/..")" >> $GITHUB_OUTPUT

      - name: Pre-checkout cleanup
        if: runner.environment == 'self-hosted'
        uses: docker://alpine:latest
        env:
          RUNNERS_GID: ${{ steps.get-gid.outputs.gid }}
        with:
          entrypoint: /bin/sh
          args: -c "rm -rf /github/workspace/.git /github/workspace/* /github/workspace/.[!.]* 2>/dev/null; chgrp $RUNNERS_GID /github/workspace 2>/dev/null; chmod 2775 /github/workspace"

      - uses: actions/checkout@v5
        with:
          # Full history so we can diff against the correct base across
          # squash-merges, rebase-merges, and first pushes where HEAD~1
          # would resolve to the wrong commit (or not exist at all).
          fetch-depth: 0

      - name: Configure logging (mask)
        if: runner.environment == 'self-hosted'
        run: |
          echo "::add-mask::$(hostname)"
          echo "::add-mask::$(whoami)"
          [ -n "$HOME" ] && echo "::add-mask::$HOME"

      - name: Detect changed services
        id: set-matrix
        env:
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Service list regenerated from services.yaml by
          # scripts/regen-service-registry.py. Do not hand-edit the
          # SERVICES=(...) block below — edit services.yaml and run the
          # regen script. CI (.github/workflows/services-registry-lint.yaml)
          # fails on drift.
          #
          # Scope: every Pact pacticipant from c2quay.yml (so ADR-000763's
          # pull-based deploy has an image per gate check) plus the runtime
          # services referenced by compose that need versioned images
          # (pki-agent, knowledge-sovereign, dashboard, etc.). Migration
          # containers, DB containers, and local perf tooling are excluded.
          # tts-speaker is external (separate GPU host); it is in c2quay
          # but not here.
          # <<<SERVICES-REGISTRY-BEGIN>>>
          SERVICES=(
            # --- 13 Pact pacticipants (mirrors c2quay.yml) ---
            "alt-backend"
            "alt-butterfly-facade"
            "auth-hub"
            "pre-processor"
            "search-indexer"
            "mq-hub"
            "rag-orchestrator"
            "recap-worker"
            "recap-subworker"
            "recap-evaluator"
            "news-creator"
            "tag-generator"
            "acolyte-orchestrator"
            # --- Additional runtime services used by compose ---
            "alt-frontend-sv"
            "pre-processor-sidecar"
            "auth-token-manager"
            "rask-log-aggregator"
            "rask-log-forwarder"
            "pki-agent"
            "knowledge-sovereign"
            "dashboard"
          )
          # <<<SERVICES-REGISTRY-END>>>

          CHANGED=""
          ZERO_SHA="0000000000000000000000000000000000000000"

          # Resolve BASE…HEAD across event kinds:
          #   push:tag       → build all
          #   push:branch    → $BEFORE..$AFTER (two-dot, linear history)
          #                    $BEFORE == zero SHA: first push to branch → build all
          #   pull_request   → $BASE...$HEAD (three-dot, merge-base aware)
          # $CHANGED_FILES is newline-separated, fed to the prefix match.
          BUILD_ALL=false
          CHANGED_FILES=""
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            BUILD_ALL=true
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            BASE="${PR_BASE_SHA}"
            HEAD="${PR_HEAD_SHA}"
            if [[ -n "$BASE" && -n "$HEAD" && "$BASE" != "$HEAD" ]]; then
              CHANGED_FILES=$(git diff --name-only "$BASE...$HEAD" 2>/dev/null || true)
            fi
          else
            BEFORE="${PUSH_BEFORE}"
            AFTER="${GITHUB_SHA}"
            if [[ "$BEFORE" == "$ZERO_SHA" || -z "$BEFORE" ]]; then
              BUILD_ALL=true    # first push to branch — no historical diff
            elif [[ "$BEFORE" != "$AFTER" ]]; then
              CHANGED_FILES=$(git diff --name-only "$BEFORE..$AFTER" 2>/dev/null || true)
            fi
          fi

          # Shared-paths escape hatch: a change to any file outside a
          # specific service directory can still affect every service.
          # Examples: shared proto definitions, docker base images,
          # docker-build.yaml itself, Go workspace pinning. Paths that
          # are intentionally excluded:
          #   - compose/compose.staging.yaml (E2E stack only; production
          #     rebuild not required when staging profiles change)
          #   - docs/, README, tests outside service dirs, etc.
          if [[ "$BUILD_ALL" != "true" && -n "$CHANGED_FILES" ]]; then
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              case "$file" in
                compose/compose.staging.yaml)
                  ;;   # staging-only — not a production trigger
                compose/*|docker/*|proto/*|go.work|go.work.sum|.github/workflows/docker-build.yaml)
                  BUILD_ALL=true
                  break ;;
              esac
            done <<< "$CHANGED_FILES"
            if [[ "$BUILD_ALL" == "true" ]]; then
              echo "Shared-path change detected — rebuilding all services."
            fi
          fi

          if [[ "$BUILD_ALL" == "true" ]]; then
            for svc in "${SERVICES[@]}"; do
              CHANGED="$CHANGED\"$svc\","
            done
          else
            for svc in "${SERVICES[@]}"; do
              if echo "$CHANGED_FILES" | grep -q "^$svc/"; then
                CHANGED="$CHANGED\"$svc\","
              fi
            done
          fi

          if [ -n "$CHANGED" ]; then
            MATRIX="{\"service\":[${CHANGED%,}]}"
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed services: ${CHANGED%,}"
          else
            echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No service changes detected"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}

    steps:
      - name: Set lowercase owner
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Get workspace parent GID
        if: runner.environment == 'self-hosted'
        id: get-gid
        run: echo "gid=$(stat -c '%g' "$GITHUB_WORKSPACE/..")" >> $GITHUB_OUTPUT

      - name: Pre-checkout cleanup
        if: runner.environment == 'self-hosted'
        uses: docker://alpine:latest
        env:
          RUNNERS_GID: ${{ steps.get-gid.outputs.gid }}
        with:
          entrypoint: /bin/sh
          args: -c "rm -rf /github/workspace/.git /github/workspace/* /github/workspace/.[!.]* 2>/dev/null; chgrp $RUNNERS_GID /github/workspace 2>/dev/null; chmod 2775 /github/workspace"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          clean: false
          sparse-checkout: |
            ${{ matrix.service }}
            docker
          sparse-checkout-cone-mode: true

      - name: Configure logging (mask)
        if: runner.environment == 'self-hosted'
        run: |
          echo "::add-mask::$(hostname)"
          echo "::add-mask::$(whoami)"
          [ -n "$HOME" ] && echo "::add-mask::$HOME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.owner }}/alt-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Find Dockerfile
        id: dockerfile
        run: |
          # Try to find the Dockerfile in the service directory
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then
            echo "path=${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT
          elif [ -f "${{ matrix.service }}/Dockerfile.${{ matrix.service }}" ]; then
            echo "path=${{ matrix.service }}/Dockerfile.${{ matrix.service }}" >> $GITHUB_OUTPUT
          else
            # Find any Dockerfile in the directory
            DOCKERFILE=$(find ${{ matrix.service }} -maxdepth 1 -name 'Dockerfile*' | head -1)
            if [ -n "$DOCKERFILE" ]; then
              echo "path=$DOCKERFILE" >> $GITHUB_OUTPUT
            else
              echo "::error::No Dockerfile found for ${{ matrix.service }}"
              exit 1
            fi
          fi

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ${{ steps.dockerfile.outputs.path }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(fromJSON('["recap-subworker","news-creator","recap-evaluator","tag-generator","recap-worker"]'), matrix.service) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache: 常時 read/write 可 (GHCR ACL で保護)。
          # GHA cache: public repo だと fork PR から読める仕様のため、cache-from/to
          # とも main branch への push イベント限定。PR ビルドは registry のみ参照。
          # OWASP A08 / CWE-494 (cache poisoning) 対策。
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.repo.outputs.owner }}/alt-${{ matrix.service }}:buildcache
            ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && format('type=gha,scope={0}', matrix.service) || '' }}
          cache-to: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && format('type=registry,ref=ghcr.io/{0}/alt-{1}:buildcache,mode=max', steps.repo.outputs.owner, matrix.service) || '' }}

      - name: Enforce image-size budget and smoke-check core imports
        if: contains(fromJSON('["recap-subworker","news-creator","recap-evaluator","tag-generator","recap-worker"]'), matrix.service) && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IMAGE_TAG: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          case "$SERVICE" in
            recap-subworker)  MAX_MB=2900 ;;
            news-creator)     MAX_MB=1800 ;;
            recap-evaluator)  MAX_MB=2500 ;;
            tag-generator)    MAX_MB=2200 ;;
            recap-worker)     MAX_MB=1800 ;;
          esac
          SIZE_BYTES=$(docker image inspect "$IMAGE_TAG" --format '{{.Size}}')
          SIZE_MB=$(( SIZE_BYTES / 1024 / 1024 ))
          echo "$SERVICE image size: ${SIZE_MB} MiB (budget ${MAX_MB} MiB)"
          if [ "$SIZE_MB" -gt "$MAX_MB" ]; then
            echo "::error::$SERVICE image (${SIZE_MB} MiB) exceeds budget (${MAX_MB} MiB)"
            exit 1
          fi
          # security-auditor F-004: smoke-check runs unprivileged with no network.
          # Any imports that need DNS/egress should be caught by this isolation.
          RUN_OPTS="--rm --network=none --read-only --tmpfs /tmp --cap-drop=ALL"
          if [ "$SERVICE" = "news-creator" ]; then
            docker run $RUN_OPTS -e SERVICE_SECRET=ci "$IMAGE_TAG" python -c "
          import sys, importlib
          import torch
          assert not torch.cuda.is_available(), 'torch CUDA must be disabled'
          for m in ('nvidia', 'triton'):
              try:
                  importlib.import_module(m)
                  sys.exit(f'{m} must not be installed')
              except ImportError:
                  pass
          from sentence_transformers import CrossEncoder  # noqa: F401
          from news_creator.usecase import rerank_usecase  # noqa: F401
          import main  # noqa: F401
          print('smoke OK', torch.__version__)
          "
          elif [ "$SERVICE" = "recap-evaluator" ]; then
            docker run $RUN_OPTS "$IMAGE_TAG" python -c "
          import sys, importlib
          import asyncpg, torch, bert_score, rouge_score, recap_evaluator  # noqa: F401
          assert not torch.cuda.is_available(), 'torch CUDA must be disabled'
          for m in ('nvidia', 'triton'):
              try:
                  importlib.import_module(m)
                  sys.exit(f'{m} must not be installed')
              except ImportError:
                  pass
          print('smoke OK', torch.__version__, asyncpg.__version__)
          "
          elif [ "$SERVICE" = "tag-generator" ]; then
            docker run $RUN_OPTS "$IMAGE_TAG" python -c "
          import sys, importlib
          import torch, sentence_transformers, keybert, transformers, onnxruntime, fugashi, nltk  # noqa: F401
          from sentence_transformers import SentenceTransformer  # noqa: F401
          assert not torch.cuda.is_available(), 'torch CUDA must be disabled'
          for m in ('nvidia', 'triton'):
              try:
                  importlib.import_module(m)
                  sys.exit(f'{m} must not be installed')
              except ImportError:
                  pass
          print('smoke OK', torch.__version__, sentence_transformers.__version__)
          "
          elif [ "$SERVICE" = "recap-worker" ]; then
            # Rust binary: Python インタプリタは同梱しないので ldd で動的リンク解決を確認。
            # libtorch_cpu / libc10 / libgomp が必須 (libtorch prune で欠落していないこと)。
            docker run $RUN_OPTS --entrypoint=/bin/sh "$IMAGE_TAG" -c '
              set -e
              LDD_OUT=$(ldd /usr/local/bin/recap-worker)
              echo "$LDD_OUT"
              if echo "$LDD_OUT" | grep -q "not found"; then
                echo "::error::recap-worker has unresolved shared libraries"
                exit 1
              fi
              echo "$LDD_OUT" | grep -q libtorch_cpu.so || { echo "::error::libtorch_cpu.so missing"; exit 1; }
              echo "$LDD_OUT" | grep -q libc10.so       || { echo "::error::libc10.so missing"; exit 1; }
              echo "$LDD_OUT" | grep -q libgomp         || { echo "::error::libgomp missing"; exit 1; }
              echo "smoke OK recap-worker"
            '
          else
            docker run $RUN_OPTS "$IMAGE_TAG" python -c "
          import sys, importlib
          import asyncpg, torch
          assert not torch.cuda.is_available(), 'torch CUDA must be disabled'
          for m in ('nvidia', 'triton'):
              try:
                  importlib.import_module(m)
                  sys.exit(f'{m} must not be installed')
              except ImportError:
                  pass
          print('smoke OK', torch.__version__, asyncpg.__version__)
          "
          fi

