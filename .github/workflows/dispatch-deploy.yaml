# Cross-repo dispatch: when main advances, notify the private alt-deploy repo
# to kick off build / gate / E2E / deploy against the new HEAD. This is the
# only public-repo workflow that talks to the deploy side, and it does so
# only on `push: branches: [main]` — fork PRs cannot reach this job.
#
# The fine-grained PAT `ALT_DEPLOY_DISPATCH_PAT` is scoped to
# repository_dispatch on `Kaikei-e/alt-deploy` and nothing else. It is not
# accessible from fork-PR contexts (GitHub withholds secrets there on push
# events by construction), so a malicious PR cannot exfiltrate it even if it
# modifies this file — the attacker's version never runs on `main`.
#
# When the PAT is missing (pre-bootstrap state), the workflow logs a warning
# and exits successfully instead of failing — the deploy pipeline isn't
# production-gating the mainline build, it's an additive notifier.
#
# All third-party actions should migrate to commit-SHA pins once Renovate is
# configured with `pinDigests: true` (tracked under the deploy-strategy
# security-hardening checklist). Tag pins are kept as a bootstrapping step.

name: dispatch-deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dispatch-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT availability
        id: check
        env:
          PAT: ${{ secrets.ALT_DEPLOY_DISPATCH_PAT }}
        run: |
          if [[ -z "${PAT}" ]]; then
            echo "::warning::ALT_DEPLOY_DISPATCH_PAT is not configured yet. Skipping dispatch — see docs/runbooks/runner-setup.md step 4."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fire repository_dispatch at alt-deploy
        if: steps.check.outputs.ready == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ALT_DEPLOY_DISPATCH_PAT }}
          script: |
            const sha = context.sha;
            const ref = context.ref;
            const changed = (context.payload.commits || [])
              .flatMap(c => [...(c.added || []), ...(c.modified || []), ...(c.removed || [])]);
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'Kaikei-e',
                repo: 'alt-deploy',
                event_type: 'deploy',
                client_payload: { sha, ref, changed },
              });
              core.info(`Dispatched deploy event for ${sha} on ${ref}`);
            } catch (err) {
              if (err.status === 403) {
                core.setFailed(
                  'Dispatch rejected with 403 "Resource not accessible by personal access token". ' +
                  'The fine-grained PAT stored as ALT_DEPLOY_DISPATCH_PAT needs Contents: Read and write ' +
                  'on Kaikei-e/alt-deploy — Contents: Read alone returns exactly this error. ' +
                  'Regenerate the PAT per docs/runbooks/runner-setup.md step 4 and overwrite the repo secret.'
                );
                return;
              }
              if (err.status === 404) {
                core.setFailed(
                  'Dispatch rejected with 404 from Kaikei-e/alt-deploy. ' +
                  'Either the PAT is not scoped to that repository (Fine-grained PATs only expose the ' +
                  'repos listed under "Only select repositories"), or the repository name is typoed.'
                );
                return;
              }
              throw err;
            }
