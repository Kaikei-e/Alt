# Release Gate — can-i-deploy enforcement.
#
# Blocks docker image publish + deploy if the Pact Broker says the current
# commit is not compatible with the pact-verified counterparts in production.
#
# Invocation:
#   - As a blocker before Deploy to Production (see deploy.yaml: needs: release-gate)
#   - Standalone via workflow_dispatch for dry-runs
#
# Requires self-hosted runner so it can reach the on-host Pact Broker at
# localhost:9292 (per single-machine architecture — see memory).
name: Release Gate (can-i-deploy)

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Environment to check compatibility against'
        required: false
        default: 'production'
  workflow_call:
    inputs:
      target_environment:
        type: string
        required: false
        default: 'production'
    secrets:
      PACT_BROKER_PASSWORD:
        required: true
    outputs:
      can_deploy:
        description: 'true if all pacticipants can deploy to the target environment'
        value: ${{ jobs.can-i-deploy.outputs.can_deploy }}

permissions:
  contents: read

jobs:
  can-i-deploy:
    name: can-i-deploy check
    runs-on: self-hosted
    timeout-minutes: 10
    outputs:
      can_deploy: ${{ steps.gate.outputs.can_deploy }}
    env:
      PACT_BROKER_BASE_URL: http://localhost:9292
      PACT_BROKER_USERNAME: pact
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
      TARGET_ENV: ${{ inputs.target_environment || 'production' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install pact-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh \
            | PACT_CLI_VERSION=v2.4.10 bash
          echo "${PWD}/pact/bin" >> "$GITHUB_PATH"

      - name: Verify broker reachable
        run: |
          curl -fsS -u "${PACT_BROKER_USERNAME}:${PACT_BROKER_PASSWORD}" \
            "${PACT_BROKER_BASE_URL}/diagnostic/status/heartbeat" | tee /tmp/heartbeat.json
          test "$(jq -r '.ok' /tmp/heartbeat.json)" = "true"

      - name: Run can-i-deploy for each pacticipant
        id: gate
        run: |
          set -e
          PACTICIPANTS=(
            alt-backend
            pre-processor
            search-indexer
            mq-hub
            rag-orchestrator
            recap-worker
            recap-subworker
            recap-evaluator
            news-creator
            tag-generator
            tts-speaker
            acolyte-orchestrator
            alt-butterfly-facade
            auth-hub
          )
          VERSION="${GITHUB_SHA:0:7}"
          FAIL=0
          FAILED_LIST=""
          for svc in "${PACTICIPANTS[@]}"; do
            echo "::group::can-i-deploy ${svc} @ ${VERSION} → ${TARGET_ENV}"
            if pact-broker can-i-deploy \
                 --pacticipant "${svc}" \
                 --version "${VERSION}" \
                 --to-environment "${TARGET_ENV}" \
                 --broker-base-url "${PACT_BROKER_BASE_URL}" \
                 --broker-username "${PACT_BROKER_USERNAME}" \
                 --broker-password "${PACT_BROKER_PASSWORD}"; then
              echo "::notice::${svc} is safe to deploy"
            else
              FAIL=$((FAIL + 1))
              FAILED_LIST="${FAILED_LIST} ${svc}"
              echo "::error::${svc} FAILED can-i-deploy against ${TARGET_ENV}"
            fi
            echo "::endgroup::"
          done
          if [[ $FAIL -gt 0 ]]; then
            echo "Release blocked — ${FAIL} pacticipants failed can-i-deploy:${FAILED_LIST}"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "All pacticipants green for ${TARGET_ENV}."
          echo "can_deploy=true" >> "$GITHUB_OUTPUT"

  record-deployment:
    name: record-deployment on success
    runs-on: self-hosted
    needs: can-i-deploy
    if: needs.can-i-deploy.outputs.can_deploy == 'true' && inputs.target_environment == 'production'
    env:
      PACT_BROKER_BASE_URL: http://localhost:9292
      PACT_BROKER_USERNAME: pact
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Install pact-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh \
            | PACT_CLI_VERSION=v2.4.10 bash
          echo "${PWD}/pact/bin" >> "$GITHUB_PATH"

      - name: record-deployment for each pacticipant
        run: |
          set -e
          VERSION="${GITHUB_SHA:0:7}"
          for svc in alt-backend pre-processor search-indexer mq-hub \
                     rag-orchestrator recap-worker recap-subworker recap-evaluator \
                     news-creator tag-generator tts-speaker acolyte-orchestrator \
                     alt-butterfly-facade auth-hub; do
            pact-broker record-deployment \
              --pacticipant "${svc}" \
              --version "${VERSION}" \
              --environment production \
              --broker-base-url "${PACT_BROKER_BASE_URL}" \
              --broker-username "${PACT_BROKER_USERNAME}" \
              --broker-password "${PACT_BROKER_PASSWORD}" || echo "record-deployment failed for ${svc} (non-fatal)"
          done
