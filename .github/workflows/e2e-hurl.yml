# E2E Hurl suites (one job per service under e2e/hurl/).
#
# Gating is per-suite via path filters: each job only runs when the
# service code, its compose wiring, its Hurl suite, its fixtures, or
# this workflow changes. Unrelated PRs don't pay the build + stack
# bring-up cost.
#
# To add another service's suite later (e.g. search-indexer), add a
# matching `paths:` block and a sibling job; keep existing job names
# stable.

name: E2E Hurl

on:
  pull_request:
    paths:
      - 'mq-hub/**'
      - 'tag-generator/**'
      - 'news-creator/**'
      - 'compose/compose.staging.yaml'
      - 'compose/news-creator-ollama-stub/**'
      - 'e2e/hurl/mq-hub/**'
      - 'e2e/hurl/tag-generator/**'
      - 'e2e/hurl/news-creator/**'
      - 'e2e/fixtures/mq-hub/**'
      - 'e2e/fixtures/tag-generator/**'
      - 'e2e/fixtures/news-creator/**'
      - 'e2e/fixtures/staging-secrets/**'
      - '.github/workflows/e2e-hurl.yml'
  push:
    branches: [main]
    paths:
      - 'mq-hub/**'
      - 'tag-generator/**'
      - 'news-creator/**'
      - 'compose/compose.staging.yaml'
      - 'compose/news-creator-ollama-stub/**'
      - 'e2e/hurl/mq-hub/**'
      - 'e2e/hurl/tag-generator/**'
      - 'e2e/hurl/news-creator/**'
      - 'e2e/fixtures/mq-hub/**'
      - 'e2e/fixtures/tag-generator/**'
      - 'e2e/fixtures/news-creator/**'
      - 'e2e/fixtures/staging-secrets/**'
      - '.github/workflows/e2e-hurl.yml'

permissions:
  contents: read

concurrency:
  group: e2e-hurl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mq-hub:
    name: mq-hub Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build mq-hub image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-mq-hub:ci \
            -f mq-hub/Dockerfile \
            mq-hub

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run mq-hub Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          # Leave stack up on failure so the next step can dump logs; the
          # runner VM is torn down after the job anyway.
          KEEP_STACK: 1
        run: bash e2e/hurl/mq-hub/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            logs --no-color --tail=200 || true

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mq-hub-hurl-reports
          path: e2e/reports/mq-hub-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true

  news-creator:
    name: news-creator Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build news-creator image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-news-creator:ci \
            -f news-creator/Dockerfile.app \
            news-creator

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run news-creator Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/news-creator/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            logs --no-color --tail=300 || true

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-creator-hurl-reports
          path: e2e/reports/news-creator-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true

  tag-generator:
    name: tag-generator Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tag-generator image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-tag-generator:ci \
            -f tag-generator/Dockerfile.tag-generator \
            tag-generator

      # Scenario 04 round-trips through mq-hub's GenerateTagsForArticle
      # RPC, so we need its image available to the staging stack too.
      - name: Build mq-hub image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-mq-hub:ci \
            -f mq-hub/Dockerfile \
            mq-hub

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run tag-generator Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/tag-generator/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          # docker compose logs without --profile silently omits services
          # whose profile isn't active, which is exactly the services we
          # need to diagnose. Go directly through docker logs on the
          # explicit container names from compose.staging.yaml.
          echo "===== docker ps -a ====="
          docker ps -a --filter "name=alt-staging-" || true
          for svc in tag-generator mq-hub redis-streams stub-backend; do
            echo "===== alt-staging-$svc logs (tail=500) ====="
            docker logs --tail=500 "alt-staging-$svc" 2>&1 || true
          done

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tag-generator-hurl-reports
          path: e2e/reports/tag-generator-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true
