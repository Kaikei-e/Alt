      - name: Run knowledge-sovereign Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/knowledge-sovereign/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          # knowledge-sovereign's profile-gated services aren't surfaced by
          # `docker compose logs` without the profile flag. Go through
          # docker logs on the explicit container names instead.
          echo "===== docker ps -a ====="
          docker ps -a --filter "name=alt-staging-" || true
          for svc in knowledge-sovereign knowledge-sovereign-db knowledge-sovereign-db-migrator; do
            echo "===== alt-staging-$svc logs (tail=500) ====="
            docker logs --tail=500 "alt-staging-$svc" 2>&1 || true
          done

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: knowledge-sovereign-hurl-reports
          path: e2e/reports/knowledge-sovereign-*
