# E2E Hurl suites (one job per service under e2e/hurl/).
#
# Gating is per-suite via path filters: each job only runs when the
# service code, its compose wiring, its Hurl suite, its fixtures, or
# this workflow changes. Unrelated PRs don't pay the build + stack
# bring-up cost.
#
# To add another service's suite later (e.g. search-indexer), add a
# matching `paths:` block and a sibling job; keep existing job names
# stable.

name: E2E Hurl

on:
  pull_request:
    paths:
      - 'alt-backend/**'
      - 'mq-hub/**'
      - 'tag-generator/**'
      - 'news-creator/**'
      - 'recap-worker/**'
      - 'recap-migration-atlas/**'
      - 'acolyte-orchestrator/**'
      - 'acolyte-migration-atlas/**'
      - 'auth-hub/**'
      - 'kratos/entrypoint.sh'
      - 'migrations-atlas/**'
      - 'rag-orchestrator/**'
      - 'rag-migration-atlas/**'
      - 'rag-db/**'
      - 'knowledge-sovereign/**'
      - 'compose/compose.staging.yaml'
      - 'compose/news-creator-ollama-stub/**'
      - 'e2e/hurl/alt-backend/**'
      - 'e2e/hurl/mq-hub/**'
      - 'e2e/hurl/tag-generator/**'
      - 'e2e/hurl/news-creator/**'
      - 'e2e/hurl/recap-worker/**'
      - 'e2e/hurl/acolyte-orchestrator/**'
      - 'e2e/hurl/auth-hub/**'
      - 'e2e/hurl/rag-orchestrator/**'
      - 'e2e/hurl/knowledge-sovereign/**'
      - 'e2e/fixtures/alt-backend/**'
      - 'e2e/fixtures/mq-hub/**'
      - 'e2e/fixtures/tag-generator/**'
      - 'e2e/fixtures/news-creator/**'
      - 'e2e/fixtures/recap-worker/**'
      - 'e2e/fixtures/acolyte-orchestrator/**'
      - 'e2e/fixtures/auth-hub/**'
      - 'e2e/fixtures/rag-orchestrator/**'
      - 'e2e/fixtures/staging-secrets/**'
      - 'e2e/stubs/alt-backend-deps-stub/**'
      - 'e2e/stubs/recap-pipeline-stub/**'
      - '.github/workflows/e2e-hurl.yml'
  push:
    branches: [main]
    paths:
      - 'alt-backend/**'
      - 'mq-hub/**'
      - 'tag-generator/**'
      - 'news-creator/**'
      - 'recap-worker/**'
      - 'recap-migration-atlas/**'
      - 'acolyte-orchestrator/**'
      - 'acolyte-migration-atlas/**'
      - 'auth-hub/**'
      - 'kratos/entrypoint.sh'
      - 'migrations-atlas/**'
      - 'rag-orchestrator/**'
      - 'rag-migration-atlas/**'
      - 'rag-db/**'
      - 'knowledge-sovereign/**'
      - 'compose/compose.staging.yaml'
      - 'compose/news-creator-ollama-stub/**'
      - 'e2e/hurl/alt-backend/**'
      - 'e2e/hurl/mq-hub/**'
      - 'e2e/hurl/tag-generator/**'
      - 'e2e/hurl/news-creator/**'
      - 'e2e/hurl/recap-worker/**'
      - 'e2e/hurl/acolyte-orchestrator/**'
      - 'e2e/hurl/auth-hub/**'
      - 'e2e/hurl/rag-orchestrator/**'
      - 'e2e/hurl/knowledge-sovereign/**'
      - 'e2e/fixtures/alt-backend/**'
      - 'e2e/fixtures/mq-hub/**'
      - 'e2e/fixtures/tag-generator/**'
      - 'e2e/fixtures/news-creator/**'
      - 'e2e/fixtures/recap-worker/**'
      - 'e2e/fixtures/acolyte-orchestrator/**'
      - 'e2e/fixtures/auth-hub/**'
      - 'e2e/fixtures/rag-orchestrator/**'
      - 'e2e/fixtures/staging-secrets/**'
      - 'e2e/stubs/alt-backend-deps-stub/**'
      - 'e2e/stubs/recap-pipeline-stub/**'
      - '.github/workflows/e2e-hurl.yml'

permissions:
  contents: read

concurrency:
  group: e2e-hurl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alt-backend:
    name: alt-backend Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build alt-backend image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-alt-backend:ci \
            -f alt-backend/Dockerfile.backend \
            alt-backend

      - name: Build alt-backend-deps-stub image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-alt-backend-deps-stub:ci \
            e2e/stubs/alt-backend-deps-stub

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run alt-backend Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/alt-backend/run.sh

      - name: Dump alt-staging logs on failure
        # Delegate to `docker compose logs` so container naming drift
        # (compose suffixes a `-1` index when -p collides with the
        # `container_name:` directive) cannot hide the backend's error
        # logs. Matches the dump step used by mq-hub / rag-orchestrator
        # / auth-hub / knowledge-sovereign jobs below.
        if: failure()
        run: |
          docker ps -a --filter "name=alt-staging-" || true
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            --profile alt-backend logs --no-color --tail=500 || true

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: alt-backend-hurl-reports
          path: e2e/reports/alt-backend-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true

  mq-hub:
    name: mq-hub Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build mq-hub image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-mq-hub:ci \
            -f mq-hub/Dockerfile \
            mq-hub

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run mq-hub Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          # Leave stack up on failure so the next step can dump logs; the
          # runner VM is torn down after the job anyway.
          KEEP_STACK: 1
        run: bash e2e/hurl/mq-hub/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            logs --no-color --tail=200 || true

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mq-hub-hurl-reports
          path: e2e/reports/mq-hub-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true

  recap-worker:
    name: recap-worker Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # recap-worker's image bundles libtorch (~600MB download) +
      # cargo-chef cooks the workspace, so the cold build is the
      # dominant cost of this job. Pre-warming via cargo cache is left
      # for a follow-up if wall-clock pain becomes an issue.
      - name: Build recap-worker image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-recap-worker:ci \
            -f recap-worker/Dockerfile.recap-worker \
            recap-worker

      - name: Warmup rust-bert cache (internet-connected, bind mount)
        # The staging compose brings the stack up on an `internal: true`
        # network, so rust-bert cannot reach HuggingFace from inside.
        # Populate /opt/rustbert-cache on the runner host before the
        # staging stack starts; compose mounts the same path read-only.
        # recap uid/gid are pinned to 999 in the image, so the host dir
        # must be chown'd to 999:999 for the warmup container to write.
        run: |
          sudo mkdir -p /opt/rustbert-cache
          sudo chown -R 999:999 /opt/rustbert-cache
          docker run --rm \
            -v /opt/rustbert-cache:/opt/rustbert-cache \
            ghcr.io/kaikei-e/alt-recap-worker:ci warmup

      - name: Build recap-pipeline-stub image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-recap-pipeline-stub:ci \
            e2e/stubs/recap-pipeline-stub

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run recap-worker Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/recap-worker/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          # recap-worker is profile-gated in compose.staging.yaml, so a
          # bare `docker compose logs` silently returns nothing. Pass
          # --profile recap-worker so the dump actually matches the
          # services run.sh brought up (observed on run 24752223343
          # where the profile omission hid a SIGSEGV diagnostic).
          docker compose -f compose/compose.staging.yaml --profile recap-worker -p alt-staging \
            logs --no-color --tail=300 || true

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: recap-worker-hurl-reports
          path: e2e/reports/recap-worker-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true

  news-creator:
    name: news-creator Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build news-creator image locally (tag `ci`)
        run: |
