            news-creator

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run news-creator Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/news-creator/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            logs --no-color --tail=300 || true

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: news-creator-hurl-reports
          path: e2e/reports/news-creator-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true

  acolyte-orchestrator:
    name: acolyte-orchestrator Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run acolyte-orchestrator Hurl suite
        env:
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/acolyte-orchestrator/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          # acolyte-orchestrator's profile-gated services aren't surfaced
          # by `docker compose logs` without the profile flag. Go through
          # docker logs on the explicit container names instead.
          echo "===== docker ps -a ====="
          docker ps -a --filter "name=alt-staging-" || true
          # Cover every container run.sh brings up so a request that
          # never reached its peer is visible from both ends of the wire.
          for svc in acolyte-orchestrator acolyte-db acolyte-db-migrator \
                     news-creator-ollama-stub \
                     search-indexer meilisearch stub-backend; do
            echo "===== alt-staging-$svc logs (tail=300) ====="
            docker logs --tail=300 "alt-staging-$svc" 2>&1 || true
          done

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: acolyte-orchestrator-hurl-reports
          path: e2e/reports/acolyte-orchestrator-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true

  tag-generator:
    name: tag-generator Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build tag-generator image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-tag-generator:ci \
            -f tag-generator/Dockerfile.tag-generator \
            tag-generator

      # Scenario 04 round-trips through mq-hub's GenerateTagsForArticle
      # RPC, so we need its image available to the staging stack too.
      - name: Build mq-hub image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-mq-hub:ci \
            -f mq-hub/Dockerfile \
            mq-hub

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run tag-generator Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/tag-generator/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          # docker compose logs without --profile silently omits services
          # whose profile isn't active, which is exactly the services we
          # need to diagnose. Go directly through docker logs on the
          # explicit container names from compose.staging.yaml.
          echo "===== docker ps -a ====="
          docker ps -a --filter "name=alt-staging-" || true
          for svc in tag-generator mq-hub redis-streams stub-backend; do
            echo "===== alt-staging-$svc logs (tail=500) ====="
            docker logs --tail=500 "alt-staging-$svc" 2>&1 || true
          done

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: tag-generator-hurl-reports
          path: e2e/reports/tag-generator-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true

  auth-hub:
    name: auth-hub Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build auth-hub image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-auth-hub:ci \
            -f auth-hub/Dockerfile \
            auth-hub

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run auth-hub Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/auth-hub/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          # auth-hub's profile-gated services aren't surfaced by
          # `docker compose logs` without the profile flag. Go through
          # docker logs on the explicit container names instead.
          echo "===== docker ps -a ====="
          docker ps -a --filter "name=alt-staging-" || true
          for svc in auth-hub auth-hub-db auth-hub-db-migrator kratos; do
            echo "===== alt-staging-$svc logs (tail=500) ====="
            docker logs --tail=500 "alt-staging-$svc" 2>&1 || true
          done

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: auth-hub-hurl-reports
          path: e2e/reports/auth-hub-*
          if-no-files-found: ignore

      - name: Tear down alt-staging stack
        if: always()
        run: |
          docker compose -f compose/compose.staging.yaml -p alt-staging \
            down -v --remove-orphans || true

  rag-orchestrator:
    name: rag-orchestrator Hurl suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build rag-orchestrator image locally (tag `ci`)
        run: |
          docker build \
            -t ghcr.io/kaikei-e/alt-rag-orchestrator:ci \
            -f rag-orchestrator/Dockerfile \
            rag-orchestrator

      - name: Pre-pull Hurl image
        run: docker pull ghcr.io/orange-opensource/hurl:7.1.0

      - name: Run rag-orchestrator Hurl suite
        env:
          IMAGE_TAG: ci
          GHCR_OWNER: kaikei-e
          HURL_IMAGE: ghcr.io/orange-opensource/hurl:7.1.0
          KEEP_STACK: 1
        run: bash e2e/hurl/rag-orchestrator/run.sh

      - name: Dump alt-staging logs on failure
        if: failure()
        run: |
          # rag-orchestrator's profile-gated services aren't surfaced by
          # `docker compose logs` without the profile flag. Go through
          # docker logs on the explicit container names instead.
          echo "===== docker ps -a ====="
          docker ps -a --filter "name=alt-staging-" || true
          for svc in rag-orchestrator rag-db rag-db-migrator; do
            echo "===== alt-staging-$svc logs (tail=500) ====="
            docker logs --tail=500 "alt-staging-$svc" 2>&1 || true
          done

      - name: Upload Hurl reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rag-orchestrator-hurl-reports
          path: e2e/reports/rag-orchestrator-*
