# Proto & Contract Validation — blocking gate.
#
# This workflow runs on every PR to main. The following jobs MUST be listed in
# the `main` branch protection as required status checks so the merge is
# blocked on contract/regression failures:
#
#   - "Proto & Contract Validation / Pact CDC Consumer Tests (Go)"
#   - "Proto & Contract Validation / Pact CDC Consumer Tests (Rust)"
#   - "Proto & Contract Validation / Pact CDC Consumer Tests (Python)"
#   - "Proto & Contract Validation / Pact Publish & Provider Verification"
#   - "Proto & Contract Validation / Buf Lint & Breaking Change Detection"
#   - "Proto & Contract Validation / Contract Conformance Tests (FE)"
#
# `Pact Publish & Provider Verification` is an aggregator that waits on
# `pact-verify-go` and `pact-verify-python` (matrix). Those two jobs carry the
# actual publish + verify work; the aggregator keeps the historical required-
# check name stable so branch-protection does not need to be re-wired on every
# split. tts-speaker provider verification is not run in CI by design — it is
# hosted separately and its can-i-deploy record is published via
# scripts/pact-check.sh against the persistent deploy-host broker.
#
# Enforcement: see docs/runbooks/pact-broker-ops.md for the branch-protection
# recipe. PR-level verification here is paired with a local `can-i-deploy`
# gate (c2quay, invoked via scripts/deploy.sh) run on the deploy host itself;
# the production gate and record-deployment are intentionally kept off GitHub
# Actions (OSS repo — no prod credentials or state in CI).

name: Proto & Contract Validation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/proto-contract.yaml'
      - 'proto/**'
      - 'alt-frontend-sv/src/lib/gen/**'
      - 'alt-frontend-sv/src/test/contracts/**'
      - 'alt-backend/app/driver/preprocessor_connect/contract/**'
      - 'alt-backend/app/driver/contract/**'
      - 'pre-processor/app/driver/contract/**'
      - 'rag-orchestrator/internal/adapter/contract/**'
      - 'search-indexer/app/driver/contract/**'
      - 'mq-hub/app/driver/contract/**'
      - 'news-creator/app/tests/contract/**'
      - 'recap-subworker/tests/contract/**'
      - 'tag-generator/app/tests/contract/**'
      - 'recap-evaluator/tests/contract/**'
      - 'recap-worker/recap-worker/src/clients/*contract*'
      - 'alt-butterfly-facade/internal/handler/contract/**'
      - 'auth-hub/internal/adapter/gateway/contract/**'
      - 'tts-speaker/tests/contract/**'
      - 'acolyte-orchestrator/tests/contract/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/proto-contract.yaml'
      - 'proto/**'
      - 'alt-frontend-sv/src/lib/gen/**'
      - 'alt-frontend-sv/src/test/contracts/**'
      - 'alt-backend/app/driver/preprocessor_connect/contract/**'
      - 'alt-backend/app/driver/contract/**'
      - 'pre-processor/app/driver/contract/**'
      - 'rag-orchestrator/internal/adapter/contract/**'
      - 'search-indexer/app/driver/contract/**'
      - 'mq-hub/app/driver/contract/**'
      - 'news-creator/app/tests/contract/**'
      - 'recap-subworker/tests/contract/**'
      - 'tag-generator/app/tests/contract/**'
      - 'recap-evaluator/tests/contract/**'
      - 'recap-worker/recap-worker/src/clients/*contract*'
      - 'alt-butterfly-facade/internal/handler/contract/**'
      - 'auth-hub/internal/adapter/gateway/contract/**'
      - 'tts-speaker/tests/contract/**'
      - 'acolyte-orchestrator/tests/contract/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  buf-lint-breaking:
    name: Buf Lint & Breaking Change Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: latest

      - name: Buf lint
        working-directory: proto
        run: buf lint

      - name: Buf breaking change detection
        if: github.event_name == 'pull_request'
        uses: bufbuild/buf-breaking-action@v1
        with:
          input: proto
          against: 'https://github.com/Kaikei-e/Alt.git#branch=main,subdir=proto'

  contract-conformance:
    name: Contract Conformance Tests (FE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: alt-frontend-sv
        run: bun install

      - name: Run contract tests
        working-directory: alt-frontend-sv
        run: bun test src/test/contracts/

  pact-cdc-go:
    name: Pact CDC Consumer Tests (Go)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: alt-backend/app
            test-path: ./driver/preprocessor_connect/contract/
            sparse-checkout: alt-backend
            pact-dir: alt-backend/pacts
          - service: pre-processor/app
            test-path: ./driver/contract/
            sparse-checkout: pre-processor
            pact-dir: pacts
          - service: rag-orchestrator
            test-path: ./internal/adapter/contract/
            sparse-checkout: rag-orchestrator
            pact-dir: rag-orchestrator/pacts
          - service: search-indexer/app
            test-path: ./driver/contract/
            sparse-checkout: search-indexer
            pact-dir: pacts
          - service: mq-hub/app
            test-path: ./driver/contract/
            sparse-checkout: mq-hub
            pact-dir: pacts
          - service: alt-butterfly-facade
            test-path: ./internal/handler/contract/
            sparse-checkout: alt-butterfly-facade
            pact-dir: pacts
          - service: auth-hub
            test-path: ./internal/adapter/gateway/contract/
            sparse-checkout: auth-hub
            pact-dir: pacts
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: ${{ matrix.sparse-checkout }}
          sparse-checkout-cone-mode: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install pact FFI library
        run: |
          mkdir -p "$HOME/.pact/lib"
          curl -fsSL https://github.com/pact-foundation/pact-reference/releases/download/libpact_ffi-v0.4.28/libpact_ffi-linux-x86_64.so.gz \
            | gunzip > "$HOME/.pact/lib/libpact_ffi.so"
          echo "LD_LIBRARY_PATH=$HOME/.pact/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L$HOME/.pact/lib" >> "$GITHUB_ENV"

      - name: Run Pact consumer tests
        working-directory: ${{ matrix.service }}
        env:
          CGO_ENABLED: "1"
        run: go test -tags=contract ${{ matrix.test-path }} -v

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pacts-${{ matrix.sparse-checkout }}
          path: ${{ matrix.pact-dir }}/*.json
          if-no-files-found: error

  pact-verify-go:
    name: Pact Provider Verify (Go)
    runs-on: ubuntu-latest
    needs: [pact-cdc-go, pact-cdc-rust, pact-cdc-python-consumer]
    services:
      pact-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB: pact
        options: >-
          --health-cmd "pg_isready -U pact"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      pact-broker:
        image: pactfoundation/pact-broker:latest
        env:
          PACT_BROKER_DATABASE_URL: postgres://pact:pact@pact-db/pact
          PACT_BROKER_BASIC_AUTH_USERNAME: pact
          PACT_BROKER_BASIC_AUTH_PASSWORD: pact
          PACT_BROKER_ALLOW_PUBLIC_READ: "true"
          PACT_BROKER_LOG_LEVEL: WARN
        ports:
          - 9292:9292
        options: >-
          --health-cmd "ruby -e \"require 'net/http'; require 'json'; r = Net::HTTP.get(URI('http://localhost:9292/diagnostic/status/dependencies')); exit(JSON.parse(r).dig('database','ok') ? 0 : 1)\""
          --health-interval 5s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 60s
    steps:
      - name: Free disk space
        if: runner.environment != 'self-hosted'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v5

      - name: Download all pact artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected-pacts
          pattern: pacts-*
          merge-multiple: true

      - name: Wait for Pact Broker database connection
        run: |
          for i in {1..30}; do
            RESPONSE=$(curl -sS -u "pact:pact" http://localhost:9292/diagnostic/status/dependencies 2>/dev/null || echo '{}')
            if echo "$RESPONSE" | jq -e '.database.ok == true' > /dev/null 2>&1; then
              echo "Pact Broker ready."
              exit 0
            fi
            echo "Attempt $i/30: not ready, waiting..."
            sleep 2
          done
          echo "Pact Broker failed to become ready"; exit 1

      - name: Publish all pact files to Broker
        env:
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_BROKER_USERNAME: pact
          PACT_BROKER_PASSWORD: pact
        run: |
          VERSION="${GITHUB_SHA:0:7}"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.10 bash
          export PATH="${PATH}:${PWD}/pact/bin"
          pact-broker publish collected-pacts \
            --consumer-app-version "${VERSION}" \
            --branch "${BRANCH}" \
            --broker-base-url "${PACT_BROKER_BASE_URL}" \
            --broker-username "${PACT_BROKER_USERNAME}" \
            --broker-password "${PACT_BROKER_PASSWORD}"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install pact FFI library
        run: |
          mkdir -p "$HOME/.pact/lib"
          curl -fsSL https://github.com/pact-foundation/pact-reference/releases/download/libpact_ffi-v0.4.28/libpact_ffi-linux-x86_64.so.gz \
            | gunzip > "$HOME/.pact/lib/libpact_ffi.so"
          echo "LD_LIBRARY_PATH=$HOME/.pact/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L$HOME/.pact/lib" >> "$GITHUB_ENV"

      - name: Run alt-backend provider verification
        working-directory: alt-backend/app
        env:
          CGO_ENABLED: "1"
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_BROKER_USERNAME: pact
          PACT_BROKER_PASSWORD: pact
          PACT_PROVIDER_VERSION: ${{ github.sha }}
          PACT_PROVIDER_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: go test -tags=contract ./driver/contract/ -v

      - name: Run search-indexer provider verification
        working-directory: search-indexer/app
        env:
          CGO_ENABLED: "1"
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_BROKER_USERNAME: pact
          PACT_BROKER_PASSWORD: pact
          PACT_PROVIDER_VERSION: ${{ github.sha }}
          PACT_PROVIDER_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: go test -tags=contract -run TestVerifySearchIndexerProviderContracts ./driver/contract/ -v

      - name: Run mq-hub provider verification
        working-directory: mq-hub/app
        env:
          CGO_ENABLED: "1"
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_BROKER_USERNAME: pact
          PACT_BROKER_PASSWORD: pact
          PACT_PROVIDER_VERSION: ${{ github.sha }}
          PACT_PROVIDER_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: go test -tags=contract -run TestVerifySearchIndexerMqHubMessagePact ./driver/contract/ -v

  pact-verify-python:
    name: Pact Provider Verify (Python)
    runs-on: ubuntu-latest
    needs: [pact-cdc-go, pact-cdc-rust, pact-cdc-python-consumer]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: news-creator/app
            python: "3.13"
            lock: news-creator/app/uv.lock
          - service: recap-subworker
            python: "3.13"
            lock: recap-subworker/uv.lock
            extra-env: PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
          - service: tag-generator/app
            python: "3.13"
            lock: tag-generator/app/uv.lock
    services:
      pact-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB: pact
        options: >-
          --health-cmd "pg_isready -U pact"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      pact-broker:
        image: pactfoundation/pact-broker:latest
        env:
          PACT_BROKER_DATABASE_URL: postgres://pact:pact@pact-db/pact
          PACT_BROKER_BASIC_AUTH_USERNAME: pact
          PACT_BROKER_BASIC_AUTH_PASSWORD: pact
          PACT_BROKER_ALLOW_PUBLIC_READ: "true"
          PACT_BROKER_LOG_LEVEL: WARN
        ports:
          - 9292:9292
        options: >-
          --health-cmd "ruby -e \"require 'net/http'; require 'json'; r = Net::HTTP.get(URI('http://localhost:9292/diagnostic/status/dependencies')); exit(JSON.parse(r).dig('database','ok') ? 0 : 1)\""
          --health-interval 5s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 60s
    steps:
      - name: Free disk space
        if: runner.environment != 'self-hosted'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v5

      - name: Download all pact artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected-pacts
          pattern: pacts-*
          merge-multiple: true

      - name: Wait for Pact Broker database connection
        run: |
          for i in {1..30}; do
            RESPONSE=$(curl -sS -u "pact:pact" http://localhost:9292/diagnostic/status/dependencies 2>/dev/null || echo '{}')
            if echo "$RESPONSE" | jq -e '.database.ok == true' > /dev/null 2>&1; then
              echo "Pact Broker ready."
              exit 0
            fi
            echo "Attempt $i/30: not ready, waiting..."
            sleep 2
          done
          echo "Pact Broker failed to become ready"; exit 1

      - name: Publish all pact files to Broker
        env:
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_BROKER_USERNAME: pact
          PACT_BROKER_PASSWORD: pact
        run: |
          VERSION="${GITHUB_SHA:0:7}"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | PACT_CLI_VERSION=v2.4.10 bash
          export PATH="${PATH}:${PWD}/pact/bin"
          pact-broker publish collected-pacts \
            --consumer-app-version "${VERSION}" \
            --branch "${BRANCH}" \
            --broker-base-url "${PACT_BROKER_BASE_URL}" \
            --broker-username "${PACT_BROKER_USERNAME}" \
            --broker-password "${PACT_BROKER_PASSWORD}"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.lock }}

      - name: Install Python
        run: uv python install ${{ matrix.python }}

      - name: Install ${{ matrix.service }} dependencies
        working-directory: ${{ matrix.service }}
        run: |
          if [[ -n "${{ matrix.extra-env }}" ]]; then
            export ${{ matrix.extra-env }}
          fi
          uv sync --dev

      - name: Run ${{ matrix.service }} provider verification
        working-directory: ${{ matrix.service }}
        env:
          PACT_BROKER_BASE_URL: http://localhost:9292
          PACT_BROKER_USERNAME: pact
          PACT_BROKER_PASSWORD: pact
          PACT_PROVIDER_VERSION: ${{ github.sha }}
          PACT_PROVIDER_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: uv run pytest tests/contract/ -v

  pact-publish-and-verify:
    # Aggregator that preserves the existing required-status-check name.
    # Actual work happens in pact-verify-go and pact-verify-python (matrix).
    # tts-speaker's provider verification is intentionally not included: the
    # service runs on a separate GPU host (see c2quay.yml) and its verification
    # is handled via manual publish in scripts/pact-check.sh against the
    # persistent deploy-host broker, not the ephemeral CI broker.
    name: Pact Publish & Provider Verification
    runs-on: ubuntu-latest
    needs: [pact-verify-go, pact-verify-python]
    steps:
      - name: All provider verifications passed
        run: echo "Go + Python provider verifications succeeded."

  pact-cdc-rust:
    name: Pact CDC Consumer Tests (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: recap-worker
          sparse-checkout-cone-mode: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            recap-worker/recap-worker/target
          key: ${{ runner.os }}-cargo-contract-${{ hashFiles('recap-worker/recap-worker/Cargo.lock') }}

      - name: Run Pact consumer tests
        working-directory: recap-worker/recap-worker
        run: cargo test --lib contract -- --ignored

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pacts-recap-worker
          path: pacts/*.json
          if-no-files-found: error

  pact-cdc-python-consumer:
    name: Pact CDC Consumer Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python
        run: uv python install 3.13

      - name: Install recap-evaluator dependencies
        working-directory: recap-evaluator
        run: uv sync --dev

      - name: Run recap-evaluator consumer tests
        working-directory: recap-evaluator
        run: uv run pytest tests/contract/ -v --no-cov

      - name: Upload pact files (recap-evaluator)
        uses: actions/upload-artifact@v4
        with:
          name: pacts-recap-evaluator
          path: pacts/recap-evaluator-recap-worker.json
          if-no-files-found: error

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install acolyte-orchestrator dependencies
        working-directory: acolyte-orchestrator
        run: uv sync --dev

      - name: Run acolyte-orchestrator consumer tests
        working-directory: acolyte-orchestrator
        run: uv run pytest tests/contract/ -v --no-cov

      - name: Upload pact files (acolyte-orchestrator)
        uses: actions/upload-artifact@v4
        with:
          name: pacts-acolyte-orchestrator
          path: pacts/acolyte-orchestrator-*.json
          if-no-files-found: error
