name: News-Creator Quality Gates
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "news-creator/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "news-creator/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    uses: ./.github/workflows/reusable-test-python.yaml
    with:
      working-directory: "news-creator/app"
      python-version: "3.14"
      sparse-checkout: "news-creator"
      coverage-flags: "news-creator"
      upload-coverage: true
      job-type: "test"
      test-command: "pytest -v --cov=news_creator --cov-report=xml --junit-xml=tests/results.xml"
    permissions:
      contents: read
    secrets: inherit

  lint:
    uses: ./.github/workflows/reusable-test-python.yaml
    with:
      working-directory: "news-creator/app"
      python-version: "3.14"
      sparse-checkout: "news-creator"
      job-type: "lint"
    permissions:
      contents: read

  security:
    uses: ./.github/workflows/reusable-test-python.yaml
    with:
      working-directory: "news-creator/app"
      python-version: "3.14"
      sparse-checkout: "news-creator"
      job-type: "security"
    permissions:
      contents: read

  typecheck:
    uses: ./.github/workflows/reusable-test-python.yaml
    with:
      working-directory: "news-creator/app"
      python-version: "3.14"
      sparse-checkout: "news-creator"
      job-type: "typecheck"
    permissions:
      contents: read

  pact-verification:
    name: Pact Provider Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            news-creator
            pacts
            pre-processor/pacts
            rag-orchestrator/pacts
          sparse-checkout-cone-mode: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "news-creator/app/uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        working-directory: news-creator/app
        run: uv sync --all-extras --dev

      - name: Run Pact Provider Verification
        working-directory: news-creator/app
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
          PACT_PROVIDER_VERSION: ${{ github.sha }}
          PACT_PROVIDER_BRANCH: ${{ github.ref_name }}
        run: |
          uv run pytest tests/contract/ -v --tb=short

      - name: Publish verification results
        if: success() && github.ref == 'refs/heads/main'
        working-directory: news-creator/app
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        run: |
          if [ -n "$PACT_BROKER_BASE_URL" ]; then
            echo "Publishing verification results to Pact Broker"
          else
            echo "PACT_BROKER_BASE_URL not set, skipping publish"
          fi

  quality-gate:
    runs-on: ubuntu-latest
    needs: [tests, lint, security, typecheck, pact-verification]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.tests.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.pact-verification.result }}" != "success" ]; then
            echo "One or more quality gates failed"
            exit 1
          fi
          echo "All quality gates passed"
