# workflow-safety-lint — mechanically enforce the fork-PR safety rules from
# ADR-000763. Fails the build if:
#   (1) any workflow defines `pull_request_target:` or `workflow_run:` triggers
#       (both run with elevated trust and are common exfil / RCE vectors for
#       OSS repos), or
#   (2) a workflow has a `pull_request:` trigger AND a job with
#       `runs-on:` that enlists the `self-hosted` label (fork PRs would land
#       on privileged infrastructure).
#
# Scope boundary: this lint only inspects `.github/workflows/**`. Composite
# actions under `.github/actions/**` cannot declare their own triggers or
# runners, so they are out of scope here; guard them separately if the trust
# model ever requires it.
#
# Implementation note: the structural check lives in a sibling script file
# (scripts/workflow-safety-check.py) rather than an inline heredoc, because
# the script body contains literal `${{` sequences (GitHub Actions template
# expressions) which GitHub would otherwise try to expand before the runner
# executes the `run:` block.
#
# This workflow itself must stay on ubuntu-latest with no secrets, which is
# why it's listed among the safe exceptions the policy expects.

name: workflow-safety-lint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install PyYAML
        # ubuntu-latest ships python3 but not PyYAML. Pin to the 6.x line so
        # supply-chain drift is bounded.
        run: pip install --quiet 'pyyaml==6.*'

      - name: Reject pull_request_target and workflow_run (grep, defence in depth)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          violations=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            matches=$(grep -nE '^[[:space:]]*(pull_request_target|workflow_run)[[:space:]]*:' "$f" || true)
            if [ -n "$matches" ]; then
              while IFS= read -r line; do
                ln="${line%%:*}"
                echo "::error file=$f,line=$ln::Forbidden trigger — 'pull_request_target' and 'workflow_run' run with elevated trust and must not be introduced (ADR-000763 security hardening)."
              done <<< "$matches"
              violations=$((violations + 1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "FAIL: $violations workflow file(s) use forbidden triggers (grep check)."
            exit 1
          fi
          echo "OK: grep check clean."

      - name: Structural check (PyYAML — authoritative)
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/workflows/scripts/workflow-safety-check.py
