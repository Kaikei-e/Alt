# workflow-safety-lint — mechanically enforce the fork-PR safety rules from
# ADR-000763. Fails the build if:
#   (1) any workflow defines `pull_request_target:` or `workflow_run:` triggers
#       (both run with elevated trust and are common exfil / RCE vectors for
#       OSS repos), or
#   (2) a workflow has a `pull_request:` trigger AND a job with
#       `runs-on:` that enlists the `self-hosted` label (fork PRs would land
#       on privileged infrastructure).
#
# Scope boundary: this lint only inspects `.github/workflows/**`. Composite
# actions under `.github/actions/**` cannot declare their own triggers or
# runners, so they are out of scope here; guard them separately if the trust
# model ever requires it.
#
# This workflow itself must stay on ubuntu-latest with no secrets, which is
# why it's listed among the safe exceptions the policy expects.

name: workflow-safety-lint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install PyYAML
        # ubuntu-latest ships python3 but not PyYAML. Pin to the 6.x line so
        # supply-chain drift is bounded.
        run: pip install --quiet 'pyyaml==6.*'

      - name: Reject pull_request_target and workflow_run (grep, defence in depth)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          violations=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            matches=$(grep -nE '^[[:space:]]*(pull_request_target|workflow_run)[[:space:]]*:' "$f" || true)
            if [ -n "$matches" ]; then
              while IFS= read -r line; do
                ln="${line%%:*}"
                echo "::error file=$f,line=$ln::Forbidden trigger — 'pull_request_target' and 'workflow_run' run with elevated trust and must not be introduced (ADR-000763 security hardening)."
              done <<< "$matches"
              violations=$((violations + 1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "FAIL: $violations workflow file(s) use forbidden triggers (grep check)."
            exit 1
          fi
          echo "OK: grep check clean."

      - name: Structural check (PyYAML — authoritative)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob
          import sys
          import yaml

          FORBIDDEN_TRIGGERS = {'pull_request_target', 'workflow_run'}

          bad = 0
          files = sorted(glob.glob('.github/workflows/*.yml')
                         + glob.glob('.github/workflows/*.yaml'))

          def extract_labels(runs_on):
              """Return (labels, had_expression) from any `runs-on` shape."""
              if runs_on is None:
                  return [], False
              # Simple string form: "ubuntu-latest" or "${{ vars.X }}"
              if isinstance(runs_on, str):
                  return [runs_on], ('${{' in runs_on)
              # List form: [self-hosted, linux] or ["${{ ... }}", "linux"]
              if isinstance(runs_on, list):
                  labels = [str(x) for x in runs_on]
                  return labels, any('${{' in l for l in labels)
              # Mapping form: { group: my-group, labels: [self-hosted] }
              if isinstance(runs_on, dict):
                  labels = runs_on.get('labels', [])
                  if isinstance(labels, str):
                      labels = [labels]
                  elif not isinstance(labels, list):
                      labels = []
                  labels = [str(x) for x in labels]
                  group = runs_on.get('group')
                  had_expr = any('${{' in l for l in labels) or (
                      isinstance(group, str) and '${{' in group
                  )
                  return labels, had_expr
              return [], False

          for path in files:
              with open(path) as fh:
                  try:
                      doc = yaml.safe_load(fh)
                  except yaml.YAMLError as e:
                      print(f'::error file={path}::failed to parse YAML: {e}',
                            file=sys.stderr)
                      bad += 1
                      continue

              if not isinstance(doc, dict):
                  continue

              # PyYAML parses the `on:` key as Python True (YAML 1.1 boolean).
              triggers = doc.get(True)
              if triggers is None:
                  triggers = doc.get('on', {})

              trigger_names = set()
              if isinstance(triggers, dict):
                  trigger_names = set(triggers.keys())
              elif isinstance(triggers, list):
                  trigger_names = set(triggers)
              elif isinstance(triggers, str):
                  trigger_names = {triggers}

              # Rule 1 (authoritative) — forbidden trigger names.
              used = trigger_names & FORBIDDEN_TRIGGERS
              if used:
                  for t in sorted(used):
                      print(
                          f'::error file={path}::workflow uses forbidden '
                          f'trigger {t!r} (ADR-000763 security hardening).',
                          file=sys.stderr,
                      )
                  bad += 1

              # Rule 2 — self-hosted on pull_request-triggered jobs.
              if 'pull_request' not in trigger_names:
                  continue
              for job_name, job in (doc.get('jobs') or {}).items():
                  if not isinstance(job, dict):
                      continue
                  labels, had_expr = extract_labels(job.get('runs-on'))
                  if any('self-hosted' in l for l in labels):
                      print(
                          f'::error file={path}::job {job_name!r} has a '
                          f'pull_request trigger and runs on self-hosted. '
                          f'Route PR validation through ubuntu-latest only '
                          f'(ADR-000763 security hardening).',
                          file=sys.stderr,
                      )
                      bad += 1
                  elif had_expr:
                      # Expression-derived runner labels can't be resolved
                      # statically. Force a reviewer to justify.
                      print(
                          f'::error file={path}::job {job_name!r} has a '
                          f'pull_request trigger and an expression-derived '
                          f"runs-on (${{{{ ... }}}}). Static analysis can't "
                          f'confirm it is not self-hosted — either pin the '
                          f'runner literal or split PR and self-hosted into '
                          f'separate workflows.',
                          file=sys.stderr,
                      )
                      bad += 1

          if bad:
              sys.exit(1)
          print('OK: no forbidden triggers and no self-hosted on pull_request.')
          PY
