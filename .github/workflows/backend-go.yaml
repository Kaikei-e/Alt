name: Backend Go Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'alt-backend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'alt-backend/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/reusable-test-go.yaml
    with:
      working-directory: 'alt-backend/app'
      # 固定したいなら明示。go.modに従うなら空でOK
      coverage-flags: 'alt-backend'
      # GitHub-hosted runner では GitHub Actions Cache を使用
      use-local-persistent-cache: false

  # M-001: govulncheck と gosec を SARIF として GitHub Code Scanning に
  # アップロードして PR 時点で依存 CVE / コードの脆弱性を検出する。
  # 既存の reusable-go-quality-gates.yaml をそのまま再利用する。
  quality:
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/reusable-go-quality-gates.yaml
    with:
      working-directory: 'alt-backend/app'
      lint-only-new: true
      upload-sarif: true
