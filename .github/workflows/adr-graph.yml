name: ADR supersedes graph

on:
  push:
    paths:
      - "docs/ADR/**"
      - "scripts/adr_graph.py"
      - "scripts/tests/test_adr_graph.py"
      - ".github/workflows/adr-graph.yml"
  pull_request:
    paths:
      - "docs/ADR/**"
      - "scripts/adr_graph.py"
      - "scripts/tests/test_adr_graph.py"
      - ".github/workflows/adr-graph.yml"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests
        run: python3 -m unittest scripts.tests.test_adr_graph -v
      - name: Corpus check
        run: python3 scripts/adr_graph.py check
