name: Alt Frontend SV Tests

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'alt-frontend-sv/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'alt-frontend-sv/**'
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      test-type:
        required: false
        type: string
        default: "playwright"
  workflow_dispatch:
    inputs:
      working-directory:
        description: "Working directory for the test"
        required: true
        type: string
        default: "alt-frontend-sv"
      test-type:
        description: "Type of test to run"
        required: false
        type: string
        default: "playwright"

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    env:
      CI: true
      FORCE_COLOR: "1"
      PLAYWRIGHT_SKIP_GIT_INFO: "1"

    steps:
      - name: Pre-checkout cleanup
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            rm -rf "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.[!.]* 2>/dev/null || true
          fi

      - uses: actions/checkout@v5
        with:
          clean: false

      - name: Mask sensitive paths and git information
        run: |
          echo "::group::Masking Configuration"

          echo "::add-mask::$(hostname)"
          echo "::add-mask::$(whoami)"

          [ -n "$HOME" ] && echo "::add-mask::$HOME"
          [ -n "$GITHUB_WORKSPACE" ] && echo "::add-mask::$GITHUB_WORKSPACE"
          [ -n "$RUNNER_TEMP" ] && echo "::add-mask::$RUNNER_TEMP"

          if command -v git >/dev/null 2>&1; then
            GIT_AN="$(git log -1 --pretty=format:'%an' 2>/dev/null || true)"
            GIT_AE="$(git log -1 --pretty=format:'%ae' 2>/dev/null || true)"
            GIT_CN="$(git log -1 --pretty=format:'%cn' 2>/dev/null || true)"
            GIT_CE="$(git log -1 --pretty=format:'%ce' 2>/dev/null || true)"
            [ -n "$GIT_AN" ] && echo "::add-mask::$GIT_AN"
            [ -n "$GIT_AE" ] && echo "::add-mask::$GIT_AE"
            [ -n "$GIT_CN" ] && echo "::add-mask::$GIT_CN"
            [ -n "$GIT_CE" ] && echo "::add-mask::$GIT_CE"
          fi

          echo "::endgroup::"

      - name: Install Bun
        env:
          BUN_VERSION: "1.2.14"
        run: |
          set -eu
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            BUN_ARCH="bun-linux-aarch64"
          else
            BUN_ARCH="bun-linux-x64"
          fi
          BUN_BASE="https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}"
          curl -fsSL "${BUN_BASE}/${BUN_ARCH}.zip" -o /tmp/bun.zip
          curl -fsSL "${BUN_BASE}/SHASUMS256.txt"  -o /tmp/bun-sha256.txt
          grep "  ${BUN_ARCH}\.zip$" /tmp/bun-sha256.txt | sha256sum -c -
          python3 - "$BUN_ARCH" <<'PYEOF'
          import sys, zipfile
          arch = sys.argv[1]
          entry = f"{arch}/bun"
          with zipfile.ZipFile("/tmp/bun.zip") as z:
              if entry not in z.namelist():
                  sys.exit(f"expected entry {entry!r} not found in zip")
              data = z.read(entry)
          with open("/usr/local/bin/bun", "wb") as f:
              f.write(data)
          PYEOF
          chmod +x /usr/local/bin/bun
          bun --version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('alt-frontend-sv/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install
        working-directory: ${{ inputs.working-directory || 'alt-frontend-sv' }}

      - name: Run Playwright tests
        run: bunx playwright test --project=auth --project=desktop-chromium --project=mobile-chrome --shard=${{ matrix.shard }}
        working-directory: ${{ inputs.working-directory || 'alt-frontend-sv' }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: |
            ${{ inputs.working-directory || 'alt-frontend-sv' }}/playwright-report/
            ${{ inputs.working-directory || 'alt-frontend-sv' }}/test-results/
          retention-days: 30
