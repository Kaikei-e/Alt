# hide nginx version
server_tokens off;

# Performance
gzip on;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    application/x-font-ttf
    font/opentype;
gzip_comp_level 6;
gzip_min_length 1100;
gzip_buffers 16 8k;
gzip_proxied any;
gzip_vary on;
gzip_disable "MSIE [1-6]\.";

# Docker DNS resolver for dynamic upstream resolution
# 127.0.0.11 is Docker's embedded DNS server
resolver 127.0.0.11 valid=10s ipv6=off;

# All upstreams use dynamic DNS resolution via set $variable in location blocks
# This ensures nginx re-resolves hostnames when containers restart
# (static upstream blocks would cache DNS at startup and break on container IP changes)

server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 1. Browser-direct SSE (^~ prefix match takes priority over regex)
    location ^~ /api/v1/sse/ {
        set $backend_addr "http://alt-backend:9000";
        rewrite ^/api(/v1/sse/.*)$ $1 break;
        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical: Pass ALL cookies for authentication (EventSource uses cookies automatically)
        proxy_set_header Cookie $http_cookie;

        # SSE specific settings
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;

        # Disable gzip for SSE
        gzip off;

        # Longer timeouts for SSE
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # CORS headers
        set $cors_origin "";
        if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin = "https://curionoah.com") {
            set $cors_origin $http_origin;
        }
        if ($cors_origin != "") {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
        }
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Cache-Control, Cookie" always;
        add_header Access-Control-Expose-Headers "Content-Type, Cache-Control" always;

        # Security headers for SSE
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Dashboard SSE endpoint - proxy to dashboard service
    # Uses variable for lazy DNS resolution (dashboard may not be running)
    location /sse/dashboard/ {
        set $dashboard_backend "http://dashboard:8000";
        proxy_pass $dashboard_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # SSE specific settings
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;

        # Disable gzip for SSE
        gzip off;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # CORS headers
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Cache-Control, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Type, Cache-Control" always;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Kratos authentication proxy
    location /ory/ {
        set $kratos_addr "http://kratos:4433";
        rewrite ^/ory/(.*)$ /$1 break;
        proxy_pass $kratos_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://$host" always;
            add_header Vary Origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Cookie, X-Csrf-Token, X-Session-Token" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Auth validation endpoint (internal use only)
    location = /auth-validate {
        internal;
        set $auth_hub_addr "http://auth-hub:8888";
        proxy_pass $auth_hub_addr/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # OGP Image proxy - unauthenticated (HMAC signature serves as auth token)
    location /v1/images/proxy/ {
        set $backend_addr "http://alt-backend:9000";
        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache image_proxy_cache;
        proxy_cache_key "$uri";
        proxy_cache_valid 200 304 12h;
        proxy_cache_valid 502 504 1m;
        proxy_cache_valid 404 1m;
        proxy_cache_valid any 0;

        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_background_update on;

        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;

        add_header X-Cache-Status $upstream_cache_status always;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 64k;
        proxy_busy_buffers_size 128k;

        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # 2. SvelteKit SSE/streaming endpoints (case-insensitive for Connect-RPC /Stream... URLs)
    location ~* ^/api/.*(stream|sse) {
        set $sveltekit_sse_backend "http://alt-frontend-sv:4173";
        proxy_pass $sveltekit_sse_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;

        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 1h;
        proxy_read_timeout 1h;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-cache, no-transform" always;
    }

    # 3. Immutable static assets (Vite-built JS/CSS with content hash)
    location /_app/immutable/ {
        set $sveltekit_backend "http://alt-frontend-sv:4173";
        proxy_pass $sveltekit_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1y;
        add_header Cache-Control "public, immutable";

        gzip on;
        gzip_types text/javascript application/javascript text/css;
        gzip_min_length 256;
    }

    # 4. Favicon
    location = /favicon.svg {
        set $sveltekit_backend "http://alt-frontend-sv:4173";
        proxy_pass $sveltekit_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 5. Connect-RPC streaming endpoints (Augur, MorningLetter)
    location ~ ^/api/v2/alt\.(augur|morning_letter)\.v2\..+/Stream {
        gzip off;
        proxy_buffering off;
        proxy_cache off;

        set $sveltekit_backend "http://alt-frontend-sv:4173";
        proxy_pass $sveltekit_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_http_version 1.1;
        proxy_set_header Connection '';

        add_header X-Accel-Buffering no always;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 5b. Connect-RPC streaming: Knowledge Home
    location ~ ^/api/v2/alt\.knowledge_home\.v1\..+/Stream {
        gzip off;
        proxy_buffering off;
        proxy_cache off;

        set $sveltekit_backend "http://alt-frontend-sv:4173";
        proxy_pass $sveltekit_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_http_version 1.1;
        proxy_set_header Connection '';

        add_header X-Accel-Buffering no always;

        proxy_connect_timeout 60s;
        proxy_send_timeout 2400s;
        proxy_read_timeout 2400s;
    }

    # 6. SvelteKit API (Connect-RPC and REST) - gzip off for Connect-RPC compatibility
    location /api/ {
        gzip off;

        set $sveltekit_backend "http://alt-frontend-sv:4173";
        proxy_pass $sveltekit_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # 7. SvelteKit pages (catch-all) - SSR HTML responses
    location / {
        # HTML は再検証必須にし、再ビルド後の旧チャンク 404 を防止
        add_header Cache-Control "no-cache" always;

        gzip on;
        gzip_types text/css application/javascript application/json text/javascript;
        gzip_min_length 256;

        set $sveltekit_backend "http://alt-frontend-sv:4173";
        proxy_pass $sveltekit_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        return 500 "Server Error";
    }
}
