# Shared baseline security headers.
#
# nginx's add_header inheritance rule discards ALL add_header directives
# inherited from an outer level (http/server) the moment a location block
# declares even one add_header of its own. Every location in default.conf
# that sets its own add_header (e.g. Cache-Control) must `include` this
# file so X-Frame-Options / X-Content-Type-Options / X-XSS-Protection are
# not silently dropped for that location.
#
# This file lives in a subdirectory of conf.d/ (not conf.d/*.conf itself)
# so nginx.conf's `include /etc/nginx/conf.d/*.conf;` glob does not also
# load it as a stray top-level server context.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
